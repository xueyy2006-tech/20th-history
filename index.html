<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20世纪世界史 · 期末复习仪表盘</title>
<style>
/* ========== CSS CUSTOM PROPERTIES ========== */
:root {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #242836;
  --text: #e0e2ec; --text2: #a0a4b8; --text3: #6b6f85;
  --accent: #7c9ff5; --accent2: #5b7ed4; --accent-glow: rgba(124,159,245,0.15);
  --red: #f57c7c; --green: #7ccf8a; --yellow: #f5d77c; --orange: #f5a97c;
  --purple: #c7a0f5; --cyan: #7cd4f5; --pink: #f57cad;
  --sys-versailles: #f5a97c; --sys-washington: #7cd4f5;
  --sys-yalta: #f57c7c; --sys-sanfrancisco: #7ccf8a;
  --sys-other: #c7a0f5;
  --radius: 8px; --radius-sm: 4px; --radius-lg: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.2s ease;
  --sidebar-w: 280px;
  --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
}
@media print {
  :root { --bg: #fff; --bg2: #f5f5f5; --bg3: #eee; --text: #111; --text2: #555; --text3: #888; }
  .sidebar, .view-tabs, .modal-overlay, .flashcard-actions, .quiz-submit { display: none !important; }
  .main { margin-left: 0 !important; }
  .view-panel { display: block !important; page-break-inside: avoid; }
  .event-card, .tree-node, .flashcard { break-inside: avoid; box-shadow: none !important; border: 1px solid #ddd !important; }
}

/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; line-height: 1.6;
}
a { color: var(--accent); text-decoration: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

/* ========== SIDEBAR ========== */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg2); border-right: 1px solid var(--bg3);
  height: 100vh; position: fixed; top: 0; left: 0;
  display: flex; flex-direction: column; z-index: 100;
  overflow-y: auto; padding: 20px 16px;
}
.sidebar-header { margin-bottom: 20px; }
.sidebar-header h1 { font-size: 1.15rem; font-weight: 700; line-height: 1.3; }
.sidebar-header .subtitle { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap input {
  width: 100%; padding: 10px 14px 10px 36px; border-radius: var(--radius);
  border: 1px solid var(--bg3); background: var(--bg); color: var(--text);
  font-size: 0.85rem; outline: none; transition: var(--transition);
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 0.9rem; }
.search-results {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius);
  max-height: 240px; overflow-y: auto; z-index: 200; margin-top: 4px;
}
.search-results.active { display: block; }
.search-result-item {
  padding: 8px 12px; cursor: pointer; font-size: 0.8rem; border-bottom: 1px solid var(--bg3);
}
.search-result-item:hover { background: var(--bg3); }

/* Sidebar filter groups */
.filter-group { margin-bottom: 14px; }
.filter-group-label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text3); margin-bottom: 6px; font-weight: 600;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.filter-chip {
  padding: 4px 10px; border-radius: 20px; font-size: 0.72rem;
  border: 1px solid var(--bg3); cursor: pointer; transition: var(--transition);
  white-space: nowrap; user-select: none;
}
.filter-chip:hover { border-color: var(--accent); }
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-chip.sys-versailles { border-left: 3px solid var(--sys-versailles); }
.filter-chip.sys-washington { border-left: 3px solid var(--sys-washington); }
.filter-chip.sys-yalta { border-left: 3px solid var(--sys-yalta); }
.filter-chip.sys-sanfrancisco { border-left: 3px solid var(--sys-sanfrancisco); }

/* Progress */
.progress-section { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--bg3); }
.progress-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
.progress-bar-wrap { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
.progress-text { font-size: 0.72rem; color: var(--text2); }

/* ========== MAIN AREA ========== */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.view-tabs {
  display: flex; background: var(--bg2); border-bottom: 1px solid var(--bg3);
  position: sticky; top: 0; z-index: 50; padding: 0 20px;
}
.view-tab {
  padding: 14px 24px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
  border-bottom: 3px solid transparent; transition: var(--transition);
  color: var(--text2); user-select: none;
}
.view-tab:hover { color: var(--text); }
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.view-content { flex: 1; padding: 24px 20px; overflow-y: auto; }
.view-panel { display: none; }
.view-panel.active { display: block; }

/* ========== MODAL ========== */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 500; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg2); border-radius: var(--radius-lg); max-width: 700px; width: 90%;
  max-height: 85vh; overflow-y: auto; padding: 32px; position: relative;
  box-shadow: var(--shadow);
}
.modal-close {
  position: absolute; top: 12px; right: 16px; font-size: 1.5rem; cursor: pointer;
  color: var(--text3); background: none; border: none; line-height: 1;
}
.modal-close:hover { color: var(--text); }
.modal h2 { font-size: 1.3rem; margin-bottom: 4px; }
.modal .en-name { color: var(--text3); font-size: 0.9rem; margin-bottom: 12px; }
.modal .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.modal .meta-tag {
  padding: 2px 10px; border-radius: 12px; font-size: 0.7rem;
  background: var(--bg3); color: var(--text2);
}
.modal .detail-text { font-size: 0.9rem; line-height: 1.7; color: var(--text2); }
.modal .significance-box {
  margin-top: 16px; padding: 14px 16px; background: var(--accent-glow);
  border-radius: var(--radius); border-left: 3px solid var(--accent);
}
.modal .significance-box h4 { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.modal .significance-box p { font-size: 0.85rem; color: var(--text); }
.modal .related-events { margin-top: 16px; }
.modal .related-events h4 { font-size: 0.75rem; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal .related-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.modal .related-chip {
  padding: 4px 12px; border-radius: 20px; font-size: 0.75rem;
  background: var(--bg3); cursor: pointer; transition: var(--transition);
}
.modal .related-chip:hover { background: var(--accent); color: #fff; }

/* ========== TIMELINE VIEW ========== */
.timeline-controls { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.zoom-btn {
  padding: 6px 14px; border-radius: var(--radius-sm); font-size: 0.78rem;
  border: 1px solid var(--bg3); background: var(--bg2); color: var(--text2);
  cursor: pointer; transition: var(--transition);
}
.zoom-btn:hover { border-color: var(--accent); color: var(--text); }
.zoom-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.timeline-stats { font-size: 0.75rem; color: var(--text3); margin-left: auto; }
.timeline-container { position: relative; padding-left: 40px; }
.timeline-line {
  position: absolute; left: 18px; top: 0; bottom: 0; width: 2px; background: var(--bg3);
}
.timeline-event {
  position: relative; margin-bottom: 24px; padding: 16px 20px;
  background: var(--bg2); border-radius: var(--radius); cursor: pointer;
  transition: var(--transition); border-left: 3px solid var(--bg3);
}
.timeline-event:hover { transform: translateX(4px); box-shadow: var(--shadow); }
.timeline-event.sys-versailles { border-left-color: var(--sys-versailles); }
.timeline-event.sys-washington { border-left-color: var(--sys-washington); }
.timeline-event.sys-yalta { border-left-color: var(--sys-yalta); }
.timeline-event.sys-sanfrancisco { border-left-color: var(--sys-sanfrancisco); }
.timeline-event.sys-other { border-left-color: var(--sys-other); }
.timeline-dot {
  position: absolute; left: -32px; top: 20px; width: 12px; height: 12px;
  border-radius: 50%; background: var(--bg3); border: 2px solid var(--bg);
}
.timeline-event.sys-versailles .timeline-dot { background: var(--sys-versailles); }
.timeline-event.sys-washington .timeline-dot { background: var(--sys-washington); }
.timeline-event.sys-yalta .timeline-dot { background: var(--sys-yalta); }
.timeline-event.sys-sanfrancisco .timeline-dot { background: var(--sys-sanfrancisco); }
.timeline-event.sys-other .timeline-dot { background: var(--sys-other); }
.timeline-date {
  font-size: 0.7rem; color: var(--text3); font-family: var(--mono); margin-bottom: 4px;
}
.timeline-event h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
.timeline-event .en { font-size: 0.72rem; color: var(--text3); }
.timeline-event .summary { font-size: 0.8rem; color: var(--text2); margin-top: 6px; line-height: 1.5; }
.timeline-year-marker {
  position: sticky; top: 0; background: var(--bg); padding: 8px 0; z-index: 5;
  font-size: 1.1rem; font-weight: 700; color: var(--accent); font-family: var(--mono);
  margin-bottom: 16px; border-bottom: 1px solid var(--bg3);
}

/* ========== TREE VIEW ========== */
.tree-layout { display: flex; gap: 0; height: calc(100vh - 120px); }
.tree-nav {
  width: 320px; min-width: 280px; overflow-y: auto; border-right: 1px solid var(--bg3);
  padding-right: 16px;
}
.tree-detail { flex: 1; padding-left: 24px; overflow-y: auto; }
.tree-detail-placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); font-size: 0.9rem;
}
.tree-node { user-select: none; }
.tree-node-header {
  display: flex; align-items: center; gap: 6px; padding: 6px 8px;
  border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
  font-size: 0.82rem;
}
.tree-node-header:hover { background: var(--bg3); }
.tree-node-header.level-1 { font-weight: 700; font-size: 0.9rem; }
.tree-node-header.level-2 { font-weight: 600; padding-left: 24px; }
.tree-node-header.level-3 { font-weight: 400; padding-left: 44px; color: var(--text2); }
.tree-arrow {
  display: inline-block; width: 16px; font-size: 0.65rem; transition: transform 0.2s;
  color: var(--text3); text-align: center;
}
.tree-arrow.expanded { transform: rotate(90deg); }
.tree-children { display: none; }
.tree-children.expanded { display: block; }
.tree-icon { font-size: 0.85rem; }
.tree-count { font-size: 0.65rem; color: var(--text3); margin-left: auto; }
.tree-detail-card {
  background: var(--bg2); border-radius: var(--radius-lg); padding: 28px;
  box-shadow: var(--shadow);
}
.tree-breadcrumb { font-size: 0.72rem; color: var(--text3); margin-bottom: 12px; }
.tree-breadcrumb span { cursor: pointer; }
.tree-breadcrumb span:hover { color: var(--accent); }

/* ========== FLASHCARD VIEW ========== */
.flashcard-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
.flashcard-mode-btn {
  padding: 8px 18px; border-radius: var(--radius); font-size: 0.8rem;
  border: 1px solid var(--bg3); background: var(--bg2); color: var(--text2);
  cursor: pointer; transition: var(--transition);
}
.flashcard-mode-btn:hover { border-color: var(--accent); }
.flashcard-mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.flashcard-progress { margin-left: auto; font-size: 0.78rem; color: var(--text3); }
.flashcard-area { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.flashcard {
  width: 100%; max-width: 560px; min-height: 300px;
  perspective: 1000px; cursor: pointer;
}
.flashcard-inner {
  position: relative; width: 100%; height: 100%; min-height: 300px;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: var(--radius-lg); padding: 32px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg2); border: 1px solid var(--bg3);
  box-shadow: var(--shadow);
}
.flashcard-back { transform: rotateY(180deg); overflow-y: auto; }
.flashcard-front .fc-year { font-size: 0.8rem; color: var(--accent); font-family: var(--mono); margin-bottom: 12px; }
.flashcard-front .fc-name { font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
.flashcard-front .fc-en { font-size: 0.8rem; color: var(--text3); margin-bottom: 12px; }
.flashcard-front .fc-hint { font-size: 0.82rem; color: var(--text2); text-align: center; }
.flashcard-front .fc-tap { font-size: 0.7rem; color: var(--text3); margin-top: 16px; }
.flashcard-back .fc-detail { font-size: 0.88rem; line-height: 1.7; color: var(--text2); }
.flashcard-back .fc-significance { margin-top: 12px; padding: 12px 16px; background: var(--accent-glow); border-radius: var(--radius); font-size: 0.83rem; color: var(--text); }
.flashcard-actions { display: flex; gap: 12px; align-items: center; }
.flashcard-action {
  padding: 10px 24px; border-radius: var(--radius); font-size: 0.82rem; font-weight: 600;
  border: none; cursor: pointer; transition: var(--transition);
}
.flashcard-action.forgot { background: var(--red); color: #fff; }
.flashcard-action.forgot:hover { opacity: 0.85; }
.flashcard-action.remembered { background: var(--green); color: #111; }
.flashcard-action.remembered:hover { opacity: 0.85; }
.flashcard-hint-keys { font-size: 0.7rem; color: var(--text3); }
.flashcard-stats-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; margin-top: 20px; width: 100%; max-width: 560px;
}
.flashcard-stat {
  background: var(--bg2); border-radius: var(--radius); padding: 14px; text-align: center;
}
.flashcard-stat .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.flashcard-stat .stat-label { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }

/* ========== QUIZ VIEW ========== */
.quiz-setup { text-align: center; padding: 40px 20px; }
.quiz-setup h3 { font-size: 1.1rem; margin-bottom: 20px; }
.quiz-options { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.quiz-option-btn {
  padding: 14px 28px; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600;
  border: 1px solid var(--bg3); background: var(--bg2); color: var(--text);
  cursor: pointer; transition: var(--transition);
}
.quiz-option-btn:hover { border-color: var(--accent); background: var(--bg3); }
.quiz-active { max-width: 680px; margin: 0 auto; }
.quiz-progress { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.78rem; color: var(--text3); }
.quiz-question {
  background: var(--bg2); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.quiz-q-num { font-size: 0.7rem; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.quiz-q-text { font-size: 1rem; font-weight: 600; margin-bottom: 20px; }
.quiz-choices { display: flex; flex-direction: column; gap: 8px; }
.quiz-choice {
  padding: 12px 16px; border-radius: var(--radius); border: 1px solid var(--bg3);
  background: var(--bg); cursor: pointer; transition: var(--transition);
  font-size: 0.85rem; text-align: left;
}
.quiz-choice:hover { border-color: var(--accent); background: var(--bg3); }
.quiz-choice.selected { border-color: var(--accent); background: var(--accent-glow); }
.quiz-choice.correct { border-color: var(--green); background: rgba(124,207,138,0.15); }
.quiz-choice.wrong { border-color: var(--red); background: rgba(245,124,124,0.15); }
.quiz-feedback {
  display: none; padding: 16px; border-radius: var(--radius); margin-top: 12px;
  font-size: 0.85rem;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct { background: rgba(124,207,138,0.1); border: 1px solid var(--green); }
.quiz-feedback.wrong { background: rgba(245,124,124,0.1); border: 1px solid var(--red); }
.quiz-submit {
  margin-top: 12px; padding: 10px 28px; border-radius: var(--radius);
  border: none; background: var(--accent); color: #fff; font-size: 0.85rem;
  font-weight: 600; cursor: pointer; transition: var(--transition);
}
.quiz-submit:hover { opacity: 0.85; }
.quiz-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.quiz-score {
  text-align: center; padding: 40px 20px;
}
.quiz-score .score-big { font-size: 3rem; font-weight: 700; color: var(--accent); }
.quiz-score .score-label { font-size: 0.85rem; color: var(--text2); margin-top: 8px; }
.quiz-mistakes { margin-top: 24px; }
.quiz-mistakes h4 { font-size: 0.85rem; color: var(--text2); margin-bottom: 12px; }
.quiz-mistake-item {
  background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
  font-size: 0.82rem; cursor: pointer; transition: var(--transition);
}
.quiz-mistake-item:hover { background: var(--bg3); }

/* ========== EMPTY STATE ========== */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 1rem; color: var(--text2); margin-bottom: 8px; }
.empty-state p { font-size: 0.82rem; color: var(--text3); }

/* ========== KEYBOARD SHORTCUTS ========== */
.kbd { font-family: var(--mono); font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; background: var(--bg3); color: var(--text2); border: 1px solid var(--text3); }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .sidebar { width: 100%; min-width: 100%; height: auto; position: relative; padding: 12px; }
  .main { margin-left: 0; }
  .tree-layout { flex-direction: column; height: auto; }
  .tree-nav { width: 100%; border-right: none; border-bottom: 1px solid var(--bg3); padding-bottom: 12px; margin-bottom: 12px; }
  .tree-detail { padding-left: 0; }
  .flashcard { max-width: 100%; }
  body { flex-direction: column; }
}
</style>
</head>
<body>

<!-- ========== SIDEBAR ========== -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>📖 20世纪世界史</h1>
    <div class="subtitle">期末复习仪表盘 · 1914–2000</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索事件、人物、条约…" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="filter-group">
    <div class="filter-group-label">📐 体系筛选</div>
    <div class="filter-chips" id="systemChips"></div>
  </div>

  <div class="filter-group">
    <div class="filter-group-label">🌍 地区筛选</div>
    <div class="filter-chips" id="regionChips"></div>
  </div>

  <div class="filter-group">
    <div class="filter-group-label">📂 分类筛选</div>
    <div class="filter-chips" id="categoryChips"></div>
  </div>

  <div class="progress-section">
    <div class="progress-label">📊 学习进度</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">已掌握 0 / 0 个知识点</div>
  </div>
</aside>

<!-- ========== MAIN ========== -->
<main class="main">
  <nav class="view-tabs">
    <div class="view-tab active" data-view="timeline">⏳ 时间轴</div>
    <div class="view-tab" data-view="tree">🌳 知识树</div>
    <div class="view-tab" data-view="flashcards">🃏 抽认卡</div>
    <div class="view-tab" data-view="quiz">📝 题库测验</div>
  </nav>

  <div class="view-content">
    <!-- TIMELINE PANEL -->
    <div class="view-panel active" id="panel-timeline">
      <div class="timeline-controls">
        <button class="zoom-btn active" data-zoom="year">按年</button>
        <button class="zoom-btn" data-zoom="decade">按十年</button>
        <button class="zoom-btn" data-zoom="month">按月</button>
        <span class="timeline-stats" id="timelineStats"></span>
      </div>
      <div class="timeline-container" id="timelineContainer">
        <div class="timeline-line"></div>
      </div>
    </div>

    <!-- TREE PANEL -->
    <div class="view-panel" id="panel-tree">
      <div class="tree-layout">
        <div class="tree-nav" id="treeNav"></div>
        <div class="tree-detail" id="treeDetail">
          <div class="tree-detail-placeholder">👈 点击左侧节点查看详情</div>
        </div>
      </div>
    </div>

    <!-- FLASHCARDS PANEL -->
    <div class="view-panel" id="panel-flashcards">
      <div class="flashcard-controls">
        <button class="flashcard-mode-btn active" data-mode="random">🎲 随机模式</button>
        <button class="flashcard-mode-btn" data-mode="sequential">📅 顺序模式</button>
        <button class="flashcard-mode-btn" data-mode="weak">🎯 薄弱模式</button>
        <span class="flashcard-progress" id="flashcardProgress"></span>
      </div>
      <div class="flashcard-area" id="flashcardArea">
        <div class="empty-state">
          <div class="icon">🃏</div>
          <h3>即将开始抽认卡复习</h3>
          <p>点击翻面查看答案，按 <span class="kbd">←</span> 不熟 <span class="kbd">→</span> 已掌握</p>
        </div>
      </div>
    </div>

    <!-- QUIZ PANEL -->
    <div class="view-panel" id="panel-quiz">
      <div id="quizContainer">
        <div class="quiz-setup">
          <h3>📝 选择测验类型</h3>
          <div class="quiz-options">
            <button class="quiz-option-btn" data-qtype="choice">📋 单选题（10题）</button>
            <button class="quiz-option-btn" data-qtype="fill">✏️ 填空题（10题）</button>
            <button class="quiz-option-btn" data-qtype="truefalse">✅ 判断题（10题）</button>
            <button class="quiz-option-btn" data-qtype="mixed">🎯 混合模式（15题）</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- ========== MODAL OVERLAY ========== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- ========== SCRIPTS ========== -->
<script>
/* ====== APP ENGINE ====== */
const APP = {
  currentView: 'timeline',
  filters: { systems: new Set(), regions: new Set(), categories: new Set() },
  searchQuery: '',
  timelineZoom: 'year',
  flashcardMode: 'random',
  flashcardQueue: [],
  flashcardIndex: 0,

  init() {
    this.loadMastery();
    this.renderFilterChips();
    this.bindEvents();
    this.renderTimeline();
    this.renderTree();
    this.renderFlashcard();
    this.updateProgress();
  },

  /* -- Data helpers -- */
  getAllEvents() {
    return Object.values(DATA.events);
  },

  getFilteredEvents() {
    let events = this.getAllEvents();
    if (this.filters.systems.size > 0) events = events.filter(e => this.filters.systems.has(e.system));
    if (this.filters.regions.size > 0) events = events.filter(e => this.filters.regions.has(e.region));
    if (this.filters.categories.size > 0) events = events.filter(e => this.filters.categories.has(e.category));
    if (this.searchQuery) {
      const q = this.searchQuery.toLowerCase();
      events = events.filter(e =>
        e.name_zh.toLowerCase().includes(q) || e.name_en.toLowerCase().includes(q) ||
        e.summary.toLowerCase().includes(q) || e.detail.toLowerCase().includes(q) ||
        e.tags.some(t => t.toLowerCase().includes(q))
      );
    }
    return events;
  },

  getEvent(id) { return DATA.events[id]; },

  /* -- Filter chips -- */
  renderFilterChips() {
    ['systemChips','regionChips','categoryChips'].forEach(id => document.getElementById(id).innerHTML = '');
    const sysMap = { versailles: ['凡尔赛','Versailles'], washington: ['华盛顿','Washington'], yalta: ['雅尔塔','Yalta'], sanfrancisco: ['旧金山','San Francisco'], other: ['其他','Other'] };
    Object.entries(sysMap).forEach(([k, v]) => {
      const chip = this.createChip(v[0], k, 'systemChips', `sys-${k}`);
      document.getElementById('systemChips').appendChild(chip);
    });
    const regionMap = { europe: ['欧洲','Europe'], americas: ['美洲','Americas'], soviet: ['苏联/东欧','Soviet'], 'middle-east': ['中东','M.East'], 'asia-pacific': ['亚太','Asia-Pac'], global: ['全球','Global'] };
    Object.entries(regionMap).forEach(([k, v]) => {
      document.getElementById('regionChips').appendChild(this.createChip(v[0], k, 'regionChips'));
    });
    const catMap = { treaty: ['条约','Treaty'], war: ['战争','War'], doctrine: ['主义/政策','Doctrine'], plan: ['计划/方案','Plan'], organization: ['组织','Org'], conference: ['会议','Conference'], economic: ['经济','Economic'], domestic: ['内政','Domestic'], crisis: ['危机','Crisis'], movement: ['运动','Movement'] };
    Object.entries(catMap).forEach(([k, v]) => {
      document.getElementById('categoryChips').appendChild(this.createChip(v[0], k, 'categoryChips'));
    });
  },

  createChip(label, value, groupId, cls = '') {
    const el = document.createElement('span');
    el.className = `filter-chip ${cls}`;
    el.textContent = label;
    el.addEventListener('click', () => {
      el.classList.toggle('active');
      const targetSet = groupId === 'systemChips' ? this.filters.systems : groupId === 'regionChips' ? this.filters.regions : this.filters.categories;
      if (el.classList.contains('active')) targetSet.add(value); else targetSet.delete(value);
      this.refreshViews();
    });
    return el;
  },

  /* -- Mastery / progress -- */
  loadMastery() {
    try {
      const saved = JSON.parse(localStorage.getItem('whr_mastery') || '{}');
      Object.keys(DATA.events).forEach(id => {
        if (saved[id] !== undefined) DATA.events[id].mastery = saved[id];
      });
    } catch(e) {}
    try {
      const wb = JSON.parse(localStorage.getItem('whr_wrongbook') || '[]');
      this.wrongBook = wb;
    } catch(e) { this.wrongBook = []; }
  },

  saveMastery() {
    const obj = {};
    Object.entries(DATA.events).forEach(([id, e]) => { obj[id] = e.mastery; });
    localStorage.setItem('whr_mastery', JSON.stringify(obj));
  },

  saveWrongBook() { localStorage.setItem('whr_wrongbook', JSON.stringify(this.wrongBook)); },

  setMastery(id, level) {
    if (DATA.events[id]) { DATA.events[id].mastery = level; this.saveMastery(); this.updateProgress(); }
  },

  updateProgress() {
    const events = this.getAllEvents();
    const total = events.length;
    const mastered = events.filter(e => e.mastery >= 2).length;
    const learning = events.filter(e => e.mastery === 1).length;
    const pct = total > 0 ? Math.round((mastered / total) * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = `已掌握 ${mastered} · 学习中 ${learning} · 共 ${total} 个知识点`;
  },

  /* -- Event binding -- */
  bindEvents() {
    // View tabs
    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.addEventListener('click', () => this.switchView(tab.dataset.view));
    });
    // Search
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', () => {
      this.searchQuery = searchInput.value.trim();
      this.showSearchResults();
      this.refreshViews();
    });
    searchInput.addEventListener('blur', () => { setTimeout(() => document.getElementById('searchResults').classList.remove('active'), 200); });
    searchInput.addEventListener('focus', () => { if (this.searchQuery) this.showSearchResults(); });
    // Timeline zoom
    document.querySelectorAll('.zoom-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.timelineZoom = btn.dataset.zoom;
        this.renderTimeline();
      });
    });
    // Flashcard mode
    document.querySelectorAll('.flashcard-mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.flashcard-mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.flashcardMode = btn.dataset.mode;
        this.renderFlashcard();
      });
    });
    // Quiz options
    document.querySelectorAll('.quiz-option-btn').forEach(btn => {
      btn.addEventListener('click', () => this.startQuiz(btn.dataset.qtype));
    });
    // Modal close
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) this.closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') this.closeModal();
      if (this.currentView === 'flashcards') this.handleFlashcardKey(e);
    });
  },

  switchView(view) {
    this.currentView = view;
    document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
    document.querySelectorAll('.view-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${view}`));
    if (view === 'timeline') this.renderTimeline();
    if (view === 'tree') this.renderTree();
    if (view === 'flashcards') this.renderFlashcard();
  },

  refreshViews() {
    if (this.currentView === 'timeline') this.renderTimeline();
    if (this.currentView === 'tree') this.renderTree();
    if (this.currentView === 'flashcards') this.renderFlashcard();
  },

  /* -- Search results -- */
  showSearchResults() {
    const container = document.getElementById('searchResults');
    if (!this.searchQuery) { container.classList.remove('active'); return; }
    const events = this.getFilteredEvents().slice(0, 15);
    container.innerHTML = events.map(e => `<div class="search-result-item" data-id="${e.id}">${e.name_zh} <small>${e.name_en}</small> <small style="color:var(--text3)">${e.date}</small></div>`).join('');
    container.querySelectorAll('.search-result-item').forEach(item => {
      item.addEventListener('mousedown', () => { this.openModal(item.dataset.id); container.classList.remove('active'); });
    });
    container.classList.add('active');
  },

  /* -- Modal -- */
  openModal(id) {
    const e = this.getEvent(id);
    if (!e) return;
    const related = (e.related || []).map(rid => this.getEvent(rid)).filter(Boolean);
    const sysLabels = { versailles: '凡尔赛体系', washington: '华盛顿体系', yalta: '雅尔塔体系', sanfrancisco: '旧金山体制', other: '其他' };
    const regionLabels = { europe: '欧洲', americas: '美洲', soviet: '苏联/东欧', 'middle-east': '中东', 'asia-pacific': '亚太', global: '全球' };
    const catLabels = { treaty: '条约', war: '战争', doctrine: '主义/政策', plan: '计划/方案', organization: '组织', conference: '会议', economic: '经济', domestic: '内政', crisis: '危机', movement: '运动' };
    document.getElementById('modalContent').innerHTML = `
      <button class="modal-close" onclick="APP.closeModal()">✕</button>
      <h2>${e.name_zh}</h2>
      <div class="en-name">${e.name_en} · ${e.date}</div>
      <div class="meta-row">
        <span class="meta-tag">${sysLabels[e.system] || e.system}</span>
        <span class="meta-tag">${regionLabels[e.region] || e.region}</span>
        <span class="meta-tag">${catLabels[e.category] || e.category}</span>
        ${e.mastery >= 2 ? '<span class="meta-tag" style="background:rgba(124,207,138,0.2);color:var(--green)">✓ 已掌握</span>' : '<span class="meta-tag" style="background:rgba(245,124,124,0.2);color:var(--red)">需复习</span>'}
      </div>
      <div class="detail-text">${e.detail}</div>
      ${e.significance ? `<div class="significance-box"><h4>📌 历史意义</h4><p>${e.significance}</p></div>` : ''}
      ${related.length ? `<div class="related-events"><h4>🔗 关联事件</h4><div class="related-chips">${related.map(r => `<span class="related-chip" onclick="APP.openModal('${r.id}')">${r.name_zh}</span>`).join('')}</div></div>` : ''}
      <div style="margin-top:20px;display:flex;gap:8px;">
        <button class="flashcard-action forgot" onclick="APP.setMastery('${e.id}',0);APP.closeModal();APP.updateProgress()">标记为需复习</button>
        <button class="flashcard-action remembered" onclick="APP.setMastery('${e.id}',2);APP.closeModal();APP.updateProgress()">标记为已掌握</button>
      </div>
    `;
    document.getElementById('modalOverlay').classList.add('active');
  },

  closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    this.refreshViews();
  },

  /* ====== TIMELINE VIEW ====== */
  renderTimeline() {
    const container = document.getElementById('timelineContainer');
    const events = this.getFilteredEvents().sort((a, b) => a.date.localeCompare(b.date));
    document.getElementById('timelineStats').textContent = `显示 ${events.length} 个事件`;

    if (events.length === 0) {
      container.innerHTML = '<div class="timeline-line"></div><div class="empty-state"><div class="icon">📭</div><h3>没有匹配的事件</h3><p>尝试调整筛选条件</p></div>';
      return;
    }

    let html = '<div class="timeline-line"></div>';
    let lastYear = '';
    const zoom = this.timelineZoom;
    const grouped = {};
    events.forEach(e => {
      const key = zoom === 'decade' ? e.date.slice(0,3) + '0s' : zoom === 'month' ? e.date.slice(0,7) : e.date.slice(0,4);
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(e);
    });

    Object.entries(grouped).forEach(([label, evts]) => {
      const year = label.slice(0,4);
      if (zoom === 'year' && year !== lastYear) {
        html += `<div class="timeline-year-marker">${year}</div>`;
        lastYear = year;
      } else if (zoom !== 'year') {
        html += `<div class="timeline-year-marker">${label}</div>`;
      }
      evts.forEach(e => {
        html += `
          <div class="timeline-event sys-${e.system}" onclick="APP.openModal('${e.id}')">
            <div class="timeline-dot"></div>
            <div class="timeline-date">${e.date}${e.end_date ? ' → ' + e.end_date : ''}</div>
            <h3>${e.name_zh}</h3>
            <div class="en">${e.name_en}</div>
            <div class="summary">${e.summary}</div>
          </div>`;
      });
    });
    container.innerHTML = html;
  },

  /* ====== TREE VIEW ====== */
  renderTree() {
    const nav = document.getElementById('treeNav');
    const events = this.getFilteredEvents();
    const tree = this.buildTree(events);
    nav.innerHTML = this.renderTreeNodes(tree);
    // Bind click events
    nav.querySelectorAll('.tree-node-header').forEach(header => {
      header.addEventListener('click', (e) => {
        const node = header.parentElement;
        if (header.dataset.type === 'event') {
          this.openModal(header.dataset.id);
          nav.querySelectorAll('.tree-node-header').forEach(h => h.style.background = '');
          header.style.background = 'var(--accent-glow)';
          this.renderTreeDetail(header.dataset.id);
        } else {
          node.classList.toggle('expanded');
          const childrenEl = node.querySelector(':scope > .tree-children');
          const arrow = header.querySelector('.tree-arrow');
          if (childrenEl) childrenEl.classList.toggle('expanded');
          if (arrow) arrow.classList.toggle('expanded');
        }
      });
    });
  },

  buildTree(events) {
    const tree = {};
    events.forEach(e => {
      const sys = e.system || 'other';
      const branch = e.treeBranch || '其他';
      if (!tree[sys]) tree[sys] = { name: DATA.systemNames[sys] || sys, branches: {} };
      if (!tree[sys].branches[branch]) tree[sys].branches[branch] = [];
      tree[sys].branches[branch].push(e);
    });
    // Sort branches
    Object.values(tree).forEach(sys => {
      Object.values(sys.branches).forEach(arr => arr.sort((a, b) => a.date.localeCompare(b.date)));
    });
    return tree;
  },

  renderTreeNodes(tree) {
    let html = '';
    Object.entries(tree).forEach(([sysKey, sysVal]) => {
      html += `<div class="tree-node expanded">
        <div class="tree-node-header level-1" data-type="system">
          <span class="tree-arrow expanded">▶</span>
          <span class="tree-icon">📁</span> ${sysVal.name}
          <span class="tree-count">${Object.values(sysVal.branches).flat().length}</span>
        </div>
        <div class="tree-children expanded">`;
      Object.entries(sysVal.branches).forEach(([branchName, evts]) => {
        html += `<div class="tree-node expanded">
          <div class="tree-node-header level-2" data-type="branch">
            <span class="tree-arrow expanded">▶</span>
            <span class="tree-icon">📂</span> ${branchName}
            <span class="tree-count">${evts.length}</span>
          </div>
          <div class="tree-children expanded">`;
        evts.forEach(e => {
          html += `<div class="tree-node">
            <div class="tree-node-header level-3" data-type="event" data-id="${e.id}">
              <span class="tree-icon">📄</span> ${e.name_zh}
              <span style="font-size:0.65rem;color:var(--text3);margin-left:4px;">${e.date.slice(0,4)}</span>
            </div>
          </div>`;
        });
        html += `</div></div>`;
      });
      html += `</div></div>`;
    });
    return html;
  },

  renderTreeDetail(id) {
    const detail = document.getElementById('treeDetail');
    const e = this.getEvent(id);
    if (!e) return;
    const sysLabels = { versailles: '凡尔赛体系', washington: '华盛顿体系', yalta: '雅尔塔体系', sanfrancisco: '旧金山体制', other: '其他' };
    detail.innerHTML = `
      <div class="tree-breadcrumb"><span onclick="APP.openModal('${e.id}')">${sysLabels[e.system]}</span> › <span>${e.treeBranch || ''}</span></div>
      <div class="tree-detail-card">
        <h2>${e.name_zh}</h2>
        <div class="en-name">${e.name_en} · ${e.date}</div>
        <div class="detail-text">${e.detail}</div>
        ${e.significance ? `<div class="significance-box"><h4>📌 历史意义</h4><p>${e.significance}</p></div>` : ''}
      </div>`;
  },

  /* ====== FLASHCARD VIEW ====== */
  renderFlashcard() {
    const area = document.getElementById('flashcardArea');
    const events = this.getFilteredEvents();
    if (events.length === 0) {
      area.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>没有匹配的卡片</h3><p>请调整筛选条件</p></div>';
      return;
    }

    let queue;
    if (this.flashcardMode === 'sequential') {
      queue = [...events].sort((a, b) => a.date.localeCompare(b.date));
    } else if (this.flashcardMode === 'weak') {
      queue = events.filter(e => e.mastery < 2);
      if (queue.length === 0) queue = [...events];
    } else {
      queue = [...events].sort(() => Math.random() - 0.5);
      // Weight: unmastered cards appear more often
      const unmastered = queue.filter(e => e.mastery < 2);
      if (unmastered.length > 0) {
        queue = [...unmastered, ...unmastered, ...queue.filter(e => e.mastery >= 2)];
        queue = queue.sort(() => Math.random() - 0.5);
      }
    }

    this.flashcardQueue = queue;
    this.flashcardIndex = 0;
    this.showFlashcard();
  },

  showFlashcard() {
    const area = document.getElementById('flashcardArea');
    if (this.flashcardQueue.length === 0) {
      area.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><h3>全部掌握！</h3><p>你已经掌握了当前筛选条件下的所有知识点</p></div>';
      return;
    }
    if (this.flashcardIndex >= this.flashcardQueue.length) this.flashcardIndex = 0;
    const e = this.flashcardQueue[this.flashcardIndex];
    const total = this.flashcardQueue.length;
    const idx = this.flashcardIndex + 1;
    document.getElementById('flashcardProgress').textContent = `${idx} / ${total}`;

    area.innerHTML = `
      <div class="flashcard" id="flashcardEl" onclick="APP.flipCard()">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="fc-year">${e.date}</div>
            <div class="fc-name">${e.name_zh}</div>
            <div class="fc-en">${e.name_en}</div>
            <div class="fc-hint">${e.summary}</div>
            <div class="fc-tap">👆 点击翻面查看详情</div>
          </div>
          <div class="flashcard-back">
            <div class="fc-detail">${e.detail}</div>
            ${e.significance ? `<div class="fc-significance"><strong>📌 历史意义：</strong>${e.significance}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="flashcard-actions">
        <button class="flashcard-action forgot" onclick="APP.markFlashcard(0)">😕 不熟<br><small>再来一次</small></button>
        <span class="flashcard-hint-keys"><span class="kbd">←</span> 不熟 &nbsp; <span class="kbd">→</span> 掌握 &nbsp; <span class="kbd">Space</span> 翻面</span>
        <button class="flashcard-action remembered" onclick="APP.markFlashcard(2)">✅ 已掌握<br><small>减少出现</small></button>
      </div>
      ${this.renderFlashcardStats()}
    `;
  },

  flipCard() {
    document.getElementById('flashcardEl').classList.toggle('flipped');
  },

  markFlashcard(level) {
    const e = this.flashcardQueue[this.flashcardIndex];
    this.setMastery(e.id, level);
    if (level === 2 && this.flashcardMode === 'weak') {
      this.flashcardQueue.splice(this.flashcardIndex, 1);
      if (this.flashcardQueue.length === 0) { this.showFlashcard(); return; }
    } else {
      this.flashcardIndex++;
    }
    this.showFlashcard();
    this.updateProgress();
  },

  handleFlashcardKey(e) {
    if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); this.flipCard(); }
    else if (e.key === 'ArrowLeft') this.markFlashcard(0);
    else if (e.key === 'ArrowRight') this.markFlashcard(2);
  },

  renderFlashcardStats() {
    const events = this.getAllEvents();
    const sysLabels = { versailles: '凡尔赛', washington: '华盛顿', yalta: '雅尔塔', sanfrancisco: '旧金山', other: '其他' };
    const stats = {};
    Object.entries(sysLabels).forEach(([k, v]) => {
      const sysEvents = events.filter(e => e.system === k);
      const mastered = sysEvents.filter(e => e.mastery >= 2).length;
      stats[k] = { name: v, mastered, total: sysEvents.length };
    });
    return `<div class="flashcard-stats-grid">
      ${Object.values(stats).map(s => `<div class="flashcard-stat"><div class="stat-val">${s.mastered}/${s.total}</div><div class="stat-label">${s.name}</div></div>`).join('')}
    </div>`;
  },

  /* ====== QUIZ VIEW ====== */
  startQuiz(type) {
    const container = document.getElementById('quizContainer');
    const events = this.getFilteredEvents();
    if (events.length < 4) {

  generateFillQuestions(events, count) {
    const qs = [];
    const pool = [...events].sort(() => Math.random() - 0.5).slice(0, count);

      qs.push({
        type: 'fill',
        question: '______年，______发生。其历史意义是：' + (e.significance ? e.significance.slice(0, 40) + '...\uFF08\u8BF7\u586B\u5199\u4E8B\u4EF6\u540D\u79F0\uFF09' : '\u8BF7\u586B\u5199\u4E8B\u4EF6\u540D\u79F0'),

        eventId: e.id,
        explanation: e.date.slice(0,4) + '\u5E74 \u2014 ' + e.name_zh + '\uFF08' + e.name_en + '\uFF09\u3002' + e.summary

  },

      const regions = { europe: '\u6B27\u6D32', americas: '\u7F8E\u6D32', soviet: '\u82CF\u8054/\u4E1C\u6B27', 'middle-east': '\u4E2D\u4E1C', 'asia-pacific': '\u4E9A\u592A', global: '\u5168\u7403' };
      const variant = Math.floor(Math.random() * 3);

      if (variant === 0) {

          : e.name_zh + '\u5C5E\u4E8E' + wrongSys + '\u3002';

  generateMixedQuestions(events, count) {
    const qs = [];
    qs.push(...this.generateChoiceQuestions(events, 5));
    qs.push(...this.generateFillQuestions(events, 5));
    qs.push(...this.generateTrueFalseQuestions(events, 5));
    return qs.sort(() => Math.random() - 0.5).slice(0, count);
  },

  renderQuizQuestion() {
    const container = document.getElementById('quizContainer');
    const state = this.quizState;
    if (state.current >= state.questions.length) {
      this.renderQuizScore();
      return;
    }
    const q = state.questions[state.current];
    let html = `<div class="quiz-active">
      <div class="quiz-progress">
        <span>第 ${state.current + 1} / ${state.questions.length} 题</span>
        <span>${state.type === 'mixed' ? '🎯 混合模式' : state.type === 'choice' ? '📋 单选' : state.type === 'fill' ? '✏️ 填空' : '✅ 判断'}</span>
      </div>
      <div class="quiz-question">
        <div class="quiz-q-num">${state.type === 'fill' ? '✏️ 填空题' : state.type === 'truefalse' ? '✅ 判断题' : '📋 单选题'}</div>
        <div class="quiz-q-text">${q.question}</div>`;

    if (q.type === 'choice') {
      html += `<div class="quiz-choices" id="quizChoices">${q.choices.map((c, i) => `<div class="quiz-choice" data-idx="${i}" onclick="APP.selectChoice(${i})">${String.fromCharCode(65+i)}. ${c}</div>`).join('')}</div>`;
    } else if (q.type === 'fill') {
      html += `<input type="text" id="quizFillInput" placeholder="请输入答案…" style="width:100%;padding:10px;border-radius:var(--radius);border:1px solid var(--bg3);background:var(--bg);color:var(--text);font-size:0.9rem;outline:none;" onkeydown="if(event.key==='Enter')APP.submitQuizAnswer()">`;
    } else if (q.type === 'truefalse') {
      html += `<div class="quiz-choices"><div class="quiz-choice" data-idx="0" onclick="APP.selectChoice(0)">✅ 正确</div><div class="quiz-choice" data-idx="1" onclick="APP.selectChoice(1)">❌ 错误</div></div>`;
    }

    html += `<div class="quiz-feedback" id="quizFeedback"></div>
      <button class="quiz-submit" id="quizSubmitBtn" onclick="APP.submitQuizAnswer()">提交答案</button>
    </div></div>`;
    container.innerHTML = html;
    this.quizState._selected = null;
  },

  selectChoice(idx) {
    document.querySelectorAll('#quizChoices .quiz-choice').forEach(c => c.classList.remove('selected'));
    const el = document.querySelector(`#quizChoices .quiz-choice[data-idx="${idx}"]`);
    if (el) el.classList.add('selected');
    this.quizState._selected = idx;
  },

  submitQuizAnswer() {
    const state = this.quizState;
    const q = state.questions[state.current];
    let userAnswer;
    let isCorrect = false;

    if (q.type === 'choice' || q.type === 'truefalse') {
      if (state._selected === null) return;
      userAnswer = state._selected;
      isCorrect = userAnswer === q.correct;
    } else if (q.type === 'fill') {
      userAnswer = document.getElementById('quizFillInput')?.value?.trim() || '';
      isCorrect = userAnswer.includes(q.answer.slice(0,4)) || userAnswer.toLowerCase().includes(q.answer.toLowerCase());
    }

    state.answers.push({ question: q, userAnswer, isCorrect });
    if (!isCorrect) {
      this.wrongBook.push({ eventId: q.eventId, timestamp: Date.now() });
      this.saveWrongBook();
    }

    // Show feedback
    const fb = document.getElementById('quizFeedback');
    fb.className = `quiz-feedback show ${isCorrect ? 'correct' : 'wrong'}`;
    fb.innerHTML = `${isCorrect ? '✅ 正确！' : '❌ 错误！'} ${q.explanation}`;
        document.getElementById('quizSubmitBtn').textContent = '下一题 →';
    document.getElementById('quizSubmitBtn').onclick = () => {
      state.current++;
      this.renderQuizQuestion();
    };

    // Update mastery based on correctness
    if (isCorrect) {
      const e = this.getEvent(q.eventId);
      if (e && e.mastery < 2) this.setMastery(q.eventId, Math.min(e.mastery + 1, 2));
    }
  },

  renderQuizScore() {
    const state = this.quizState;
    const correct = state.answers.filter(a => a.isCorrect).length;
    const total = state.answers.length;
    const pct = Math.round((correct / total) * 100);
    const grade = pct >= 90 ? '🏆 优秀' : pct >= 70 ? '👍 良好' : pct >= 50 ? '📚 加油' : '💪 需努力';
    const mistakes = state.answers.filter(a => !a.isCorrect);

    document.getElementById('quizContainer').innerHTML = `
      <div class="quiz-score">
        <div class="score-big">${correct}/${total}</div>
        <div class="score-label">${grade} · 正确率 ${pct}%</div>
        <div style="margin-top:16px;">
          <button class="flashcard-action remembered" onclick="APP.startQuiz('${state.type}')">🔄 再来一轮</button>
          <button class="flashcard-action forgot" onclick="APP.quizState=null;document.getElementById('quizContainer').innerHTML=document.querySelector('#panel-quiz .quiz-setup') ? '<div class=\\'quiz-setup\\'><h3>📝 选择测验类型</h3>...</div>' : '';location.reload();" style="margin-left:8px;">↩ 返回选择</button>
        </div>
        ${mistakes.length ? `<div class="quiz-mistakes"><h4>📋 错题回顾（${mistakes.length}题）</h4>${mistakes.map(m => `<div class="quiz-mistake-item" onclick="APP.openModal('${m.question.eventId}')">${m.question.question}<br><small style="color:var(--red)">你的答案不正确 · 点击查看详情</small></div>`).join('')}</div>` : '<p style="margin-top:12px;color:var(--green)">🎉 全部正确！太棒了！</p>'}
      </div>`;
    this.updateProgress();
  }
};

  detail: '国际联盟的建立是美国总统伍德罗·威尔逊"十四点计划"中最后一点的核心内容，也是威尔逊和会外交的最高理想。然而，美国参议院因不愿承担国联盟约第10条（集体安全保障义务）所暗示的自动参战义务，于1919年11月和1920年3月两次拒绝批准凡尔赛和约，美国因而从未加入国联。这是国联先天性的最大缺陷。组织机构——大会（Assembly）：每年开会一次，所有成员国各有一票，重大决定需全体一致通过；行政院（Council）：由常任理事国（最初为英法意日，德国1926年加入后成为第5个常任理事国，苏联1934年加入）和非常任理事国组成；秘书处（Secretariat）：设在日内瓦万国宫，负责日常行政工作，首任秘书长为英国外交官埃里克·德拉蒙德；常设国际法院（PCIJ）：设在海牙，负责审理国家间法律争端。核心机制——集体安全：盟约第10-16条规定了成员国在遭受侵略时相互援助的义务，但"全体一致"原则使任何常任理事国都可以否决集体行动；委任统治制度：将前德国殖民地和奥斯曼帝国领土按发展程度分为A、B、C三类委任统治地，分别由英国、法国、比利时、日本、澳大利亚、新西兰和南非管理，托管国需向国联提交年度报告；少数民族保护：在东欧和中欧新成立国家中设立少数民族保护条约体系，虽然执行不力但开创了国际人权保护的先河。主要成就——成功调解了1920-21年瑞典-芬兰的奥兰群岛争端；1921年解决了德国-波兰上西里西亚边界争议；1925年调解了希腊-保加利亚边境冲突；通过《日内瓦议定书》(1924)和《凯洛格-白里安公约》(1928)推动战争非法化；在卫生（国联卫生组织）、难民（南森护照）、禁毒和反奴隶制方面取得了显著人道主义成就。主要失败——1931年日本入侵满洲，国联李顿调查团(1932)谴责日本侵略但无力制裁，日本于1933年退出国联；1935年意大利入侵埃塞俄比亚，国联对意大利实行有限经济制裁但不包括石油，制裁失败，意大利于1937年退出；1936年希特勒重新占领莱茵兰，国联无所作为；1938-39年面对德国扩张和苏联入侵芬兰，国联已形同虚设。1946年4月18日国联正式解散，其职能和资产转移给新成立的联合国。',

  detail: '1923年11月，德国正处于鲁尔危机和恶性通胀的双重深渊。巴伐利亚邦右翼势力（以邦行政长官古斯塔夫·冯·卡尔、邦警察首脑汉斯·冯·赛塞尔和巴伐利亚国防军司令奥托·冯·洛索夫三人组为核心）本身就对柏林魏玛政府抱有强烈敌意，正在策划向柏林进军以推翻共和国。希特勒的纳粹党是巴伐利亚右翼阵营中的一个激进小党（此时约2-3万名党员），深受墨索里尼1922年"向罗马进军"模式的鼓舞。11月8日晚，当卡尔在慕尼黑公民啤酒厅（Bürgerbräukeller）向约3000名支持者发表演讲时，希特勒率领冲锋队（SA）冲入大厅，鸣枪宣布"全国革命已经开始"，用枪胁迫卡尔等三人同意加入他的"革命政府"。然而，卡尔等人被迫口头同意后，获释后立刻变卦——他们连夜调动军队和警察镇压政变。11月9日上午，希特勒和鲁登道夫将军（一战英雄，被希特勒说服加入政变）率领约2000名武装支持者向慕尼黑市中心进军，在统帅堂（Feldherrnhalle）前与巴伐利亚警察交火，14名纳粹分子和4名警察死亡。政变在几分钟内溃散。希特勒被捕并以叛国罪受审。然而，这次审判成为了希特勒的政治转折点——审判在慕尼黑人民法院进行，法官乔治·奈特哈特是一个同情右翼民族的法官，允许希特勒将法庭变为他的政治宣传平台。希特勒在法庭上慷慨陈词，将政变描述为拯救德国的"民族革命"，并公开声称"凡尔赛和约才是真正的叛国"。最终判决极其宽大——希特勒以叛国罪被判五年监禁（轻判的最低刑期），仅服刑九个月即获假释。在兰茨贝格监狱（Landsberg Prison）的舒适监禁生活中，希特勒向他的副手鲁道夫·赫斯口述了《我的奋斗》（Mein Kampf），系统阐述了他的种族主义意识形态、生存空间理论和未来政治纲领。政变的教训深刻改变了希特勒的策略——他认识到通过武力政变推翻政权的路行不通，必须利用魏玛民主制度的合法渠道"合法夺权"。此后十年间，纳粹党专注于竞选活动和街头暴力并行，最终在1933年"合法"上台。希特勒在法庭上的言论和《我的奋斗》在当时并未引起足够的重视——许多人（包括国际媒体和外交官）仍认为他只是一个小丑。',

  detail: '华盛顿会议由美国国务卿查尔斯·埃文斯·休斯（Charles Evans Hughes）主持，共有美、英、日、法、意、中、荷、比、葡九国参加。会议的核心议程是三个相互关联的问题：海军军备竞赛的遏制、太平洋地区领土现状的维护和中国"门户开放"政策的重申。背景——一战结束后，美英日三国进入了新一轮海军军备竞赛，主力舰越造越大。美国计划建造10艘超无畏舰和6艘战列巡洋舰（1916年海军法案），日本推行"八八舰队"计划，英国也坚持"两强标准"。同时，1902年的英日同盟（1902年签订，1905年和1911年续订）即将在1921年到期，美国担心如果英日同盟续约，将导致美日战争时英国倾向日本。美国希望通过华盛顿会议一石二鸟：遏制海军竞赛的同时拆散英日同盟。会议成果——三大条约。1. 四国条约（美英法日，1921年12月13日签署）：四国承诺尊重彼此在太平洋岛屿属地和领地的权利，发生争端时通过会议协商解决；最关键的第4条规定，四国条约自生效之日起取代1902年的英日同盟。这是美国外交的重大胜利——英日同盟的终结消除了美国对日战争时英国可能站在日本一边的最大担忧。2. 五国海军条约（美英日法意，1922年2月6日签署）：设定了主力舰（战列舰和战列巡洋舰）总吨位的5:5:3:1.67:1.67比例——美英各52.5万吨，日本31.5万吨，法国和意大利各17.5万吨；单个主力舰吨位不得超过3.5万吨，主炮口径不得超过16英寸；航空母舰总吨位按美英各13.5万吨、日本8.1万吨、法意各6万吨限制；十年"海军假期"——签约国承诺十年内（1922-1932年）不建造新的主力舰。这是人类历史上第一次以国际条约方式限制军备。3. 九国公约（1922年2月6日签署）：九国承诺尊重中国的主权、独立和领土及行政完整（但显然没有执行机制）；重申美国提出的"门户开放"原则——各国在中国的工商业机会均等，任何国家不得垄断在华利益；日本承诺从山东撤军并将胶济铁路归还中国（但保留了一些经济权益）。华盛顿体系的内在缺陷——对辅助舰艇（巡洋舰、驱逐舰、潜艇）没有吨位限制，各国将竞赛转移到了这些类别；条约只限制吨位比例，不限制技术升级（如舰炮射程、装甲质量、舰载机性能）；没有监督和执行机制，完全依赖各国善意；日本对其吨位劣势（60%比例）深感不满，认为这是对其"二等海军强国"的歧视；中国对山东问题的部分解决表示不满（日本保留了部分经济权益）。',

  detail: '1944年8月21日至10月7日，美国、英国、苏联和中国的代表在华盛顿特区的乔治城敦巴顿橡树园大厦（Dumbarton Oaks）举行会议，具体任务是为战后国际组织起草章程。会议分两个阶段——第一阶段（8月21日至9月28日）：美英苏三国会议。第二阶段（9月29日至10月7日）：美英中三国会议（苏联因尚未对日宣战，不愿与中国代表同席参加第一阶段会议）。核心成果——确立了联合国组织的四个主要机构：安全理事会（安理会）——11个成员国，其中美英苏中法为常任理事国，其关于实质问题的决策程序成为会议的最大争议焦点。常任理事国是否有否决权，以及在涉及自身为争端当事方的决议中是否也应拥有否决权（即"争端当事国与非当事国之别"问题）无法在会议上达成一致。大会（General Assembly）——由所有成员国组成，负责讨论和提出建议，但没有约束力（除预算和行政事务外）。秘书处——秘书长由安理会推荐、大会任命。国际法院——取代常设国际法院（PCIJ），成为联合国的主要司法机构（后来的国际法院Statute of the International Court of Justice实际上几乎是PCIJ规约的翻版）。还包括一个经济社会理事会和一个托管理事会的构想。悬而未决的问题——安理会投票程序：苏联坚持常任理事国在任何问题上（包括其本身为争端当事方的案件中）都应拥有绝对的否决权。英美主张争端当事国在其为当事方的该争端之和平解决决议上不得投票——否则常任理事国可能成为自己案件的"法官"。这一争议直到1945年2月雅尔塔会议才以"雅尔塔公式"（见雅尔塔会议条目）解决。创始会员国资格：苏联提出每一个加盟共和国（当时16个）都应成为联合国创始会员国，以对抗英联邦国家的数量优势。这一要求被美英坚决反对。最终雅尔塔会议妥协为乌克兰和白俄罗斯两个加盟共和国成为额外创始会员国。敦巴顿橡树园提案（Dumbarton Oaks Proposals）作为联合国宪章的初稿，于1944年10月9日公布，成为1945年4月旧金山会议（联合国宪章制宪会议）的工作基础。会议常被认为是一次技术上非常成功的国际组织设计工作，它在只有一个大致理念（"战后国际组织"）的情况下，在不到两个月内制定了详细的章程草案。',

  detail: '1946年2月22日，美国驻莫斯科使馆临时代办乔治·F·凯南（George F. Kennan）向国务院发出一封长达8000字的电报（史称"长电报"Long Telegram），对苏联行为的根源和性质进行了系统分析。凯南的核心论点——苏联对外扩张的根源不在于具体的国际环境或西方的政策，而在于俄国传统的不安全感和马克思主义意识形态的结合。沙俄的历史性不安全感和布尔什维克的意识形态教条（资本主义必然崩溃的信念）相互强化，导致苏联领导层"不可避免地"需要通过对外扩张来证明其制度的合法性，并以外部的"资本主义包围"来为国内的镇压辩护。"克里姆林宫对世界事务的神经质看法"导致苏联对西方怀有"本能的和俄罗斯传统的敌意和不信任"。凯南的核心政策建议——"遏制"（Containment）：不是通过一次性的军事胜利击败苏联，而是以"长期的、耐心的、坚定而警觉的遏制"，在苏联试图扩张的每一点上施加"不可动摇的反压力"（counterforce），迫使苏联后退。长期的遏制将加剧苏联内部的经济和政治矛盾——"如果西方足够强大和有韧性，苏联制度内部蕴藏的衰退种子最终将使该制度要么崩溃，要么逐渐软化。"凯南特别强调遏制不以军事手段为主——"苏联对西方世界的威胁不是直接的军事进攻……而是在政治、心理和经济层面的长期竞争。"1947年以"X先生"（Mr. X）的署名在《外交事务》（Foreign Affairs）杂志上发表的《苏联行为的根源》（The Sources of Soviet Conduct）一文进一步公开阐述了遏制理论。遏制政策的演变——凯南本人的遏制概念偏重政治、经济和意识形态层面的长期竞争，但在实践中，遏制政策逐渐被"军事化"——NSC-68（1950年国家安全委员会第68号文件）将遏制转向了大规模军事建设和全球军事同盟体系，这是凯南本人后来强烈批评的。杜鲁门主义和马歇尔计划是遏制政策的最初实践；1949年北约的建立将遏制政策正式军事化；朝鲜战争（1950-1953年）是遏制政策的第一次大规模军事检验——美国认为不介入朝鲜将意味着遏制在亚洲的失败；越南战争（1955-1975年）是遏制政策逻辑在东南亚的延伸，"多米诺理论"是其直接衍生品；在整个冷战时期，遏制政策在具体执行中不断演变——从杜鲁门的全球对称遏制到艾森豪威尔的"新面貌"（大规模报复战略）和肯尼迪-约翰逊的"灵活反应战略"，再到尼克松-基辛格的缓和（détente）和里根的"以实力求和平"。最终，1985年戈尔巴乔夫上台后的苏联改革和1989-1991年东欧剧变和苏联解体，在某种意义上验证了凯南最初的预言——苏联制度的内部矛盾最终导致了该制度的崩溃。',

  detail: '马约的谈判背景是冷战结束（1989年柏林墙倒塌、德国统一）后欧洲格局的根本变化。法国总统密特朗和德国总理科尔都认为，在欧洲格局经历历史性剧变的时刻，必须通过深化一体化（"深化"deepening vs "扩大"enlargement）来确保德国统一后的欧洲稳定。密特朗希望将统一的德国"更深地锁定在共同体中"，科尔（本身是坚定的欧洲联邦主义者）也认为德国统一必须以欧洲一体化深化为前提——用他的话说"德国统一和欧洲统一是一枚硬币的两面"。1991年12月，欧共体首脑在荷兰马斯特里赫特（Maastricht，位于荷兰最南端，与比利时和德国接壤）举行峰会，经过艰苦谈判达成协议。1992年2月7日正式签署《欧洲联盟条约》（Treaty on European Union, TEU），通常称为马斯特里赫特条约，1993年11月1日生效。"欧洲联盟"（European Union）概念本身是一个模糊的折衷——它不是一个联邦国家，但超越了传统的国际组织，是"一个日趋紧密的联盟"（an ever closer union），这一模糊表述是有意为之以回避"联邦"（Federation）这一敏感词。马约的核心内容——三大支柱结构。第一支柱——欧共体（EC）支柱，也就是传统的超国家一体化领域，包括关税同盟、单一市场、共同农业政策、竞争政策等。马约将欧共体的权限扩展到新的领域——教育、文化、公共卫生、消费者保护、泛欧洲网络（交通、能源和电信基础设施）。更重要的是将经济与货币联盟（EMU）纳入第一支柱，为单一货币设置了明确的时间表和"趋同标准"（convergence criteria，即马斯特里赫特标准）：通胀率不超过价格最稳定的三个成员国的平均通胀率的1.5个百分点；政府预算赤字不超过GDP的3%；政府债务不超过GDP的60%（或在"充分下降"的轨道上）；长期利率不超过通胀最低的三国平均利率的2个百分点；货币至少在两年内保持在汇率机制（ERM）的正常波动幅度内，不主动贬值。第二支柱——共同外交与安全政策（CFSP）：这是一个纯粹的政府间合作领域，由欧洲理事会（首脑峰会）制定原则和总方针，理事会以一致同意方式决策，委员会和议会的角色极为有限。这是共同体超国家方法在外交和安全政策领域的"失败"——英国和法国都坚持外交和国防是主权核心，不能移交超国家机构。第三支柱——司法与内政事务合作（JHA）：这也是政府间合作领域，涵盖庇护、移民、跨境警务合作和民事司法合作等领域。马约的引进来——"联盟公民身份"（Union Citizenship）：持有任一成员国国籍的个人自动成为联盟公民，有权在任一成员国自由迁徙和居住，有权在居住国的地方选举和欧洲议会选举中投票和被选举权（即使不是该国国民），有权在第三国获得任何成员国的领事保护。辅助原则（Subsidiarity）：联盟仅在成员国单独行动无法充分实现行动目标的领域采取行动——这是为了回应德国各州和英国等国对布鲁塞尔"权力蚕食"的顾虑。社会政策议定书——英国拒绝接受社会政策章节（规定工时、假期和工人权益标准），获得Opt-Out，其他11个成员国签订了单独的《社会政策议定书》。英国在马约的另外两个Opt-Out——单一货币（英国保留不加入欧元区的权利，最终未加入）和申根协议的部分条款。马约的批准过程在各成员国面临了远超过往任何欧共体条约的困难——1992年6月丹麦第一次公投以50.7%对49.3%否决（丹麦人担忧丧失主权和单一货币），法国公投仅以51.05%对48.95%勉强通过（"小是"petit oui），英国的批准在议会引发了保守党严重内部分裂。这标志着欧洲一体化从"宽容共识"（permissive consensus，公众默许精英推动）进入了"约束性分歧"（constraining dissensus，公众以公投和疑欧政党的崛起表达反对）。',
  significance: '马斯特里赫特条约是欧洲一体化从"共同市场"向"政治联盟"（虽然是不完整和模糊的）质变的关键跳跃。欧元路线图的确定为此后欧元的成功启动（1999年）和流通（2002年）提供了制度和法律基础。但马约也标志着欧洲一体化"宽容共识"时代的终结——丹麦和法国公投的微弱多数以及英国议会中的严重分歧，是疑欧主义（euroscepticism）从边缘走向主流的开端。三大支柱的复杂结构反映了主权敏感度不同的领域应统一于一个共同框架但以不同方式治理的理念——这一理念在2009年里斯本条约中被"取消支柱结构、统一法律人格"所取代。',

  summary: '1985年6月14日由法、西德、比、荷、卢五国在卢森堡申根签署的关于逐步取消共同边境检查的协议。1990年签署《申根实施公约》，1995年正式实施。申根区至今覆盖27个欧洲国家，实现了无边境检查的人员自由流动。',
  detail: '申根协议的签署地点选择具有高度象征意义——卢森堡东南部的小镇申根，位于卢森堡、德国和法国三国边境的交汇点。1985年6月14日，五国（法、西德、比利时、荷兰、卢森堡）在摩泽尔河上的一条游船上签署了最初的《申根协议》。协议的核心目标——"取消成员国之间共同边界上的人员流动检查。"这实际上是实践罗马条约关于"人员自由流动"原则的具体操作化——但在1985年，由于各国对安全、移民和犯罪控制的关切，欧共体层面尚未能一致就取消内部边境检查达成共识。因此，最初的申根协议是在欧共体框架之外（作为政府间协议）缔结的——这充分说明了一体化的一个典型模式：先由意欲前进的部分成员国组"先行者集团"，将既成事实呈现给全体成员国，后来该领域的合作被纳入欧共体/欧盟框架。1990年6月19日，申根五国（后有意大利、西班牙和葡萄牙陆续加入，希腊因安全关切延迟加入）签署了《申根实施公约》（Schengen Implementation Convention），详细规定了取消边境检查后的配套措施——申根信息系统（SIS）：一个覆盖所有申根成员国的综合数据库，用于追踪和共享被通缉人员、失踪人员、被盗车辆和文件等信息。这是"内部安全换外部边境自由"（security for freedom）的交易核心——取消内部边境检查，但加强外部共同边境的控制和成员国间的执法信息共享。签证互认：任一申根成员国签发的申根签证（短期停留签证）在所有申根成员国内有效。警察合作：在边境地区可以进行跨境跟踪监视（hot pursuit）和跨境监视（cross-border surveillance），但有严格的时间和地理限制。难民申请责任确定：确定由哪个成员国负责审查庇护申请——通常是难民首次入境的成员国（"都柏林公约"原则）。1995年3月26日，首批七个国家（法德比荷卢西葡）正式取消了相互间的内部边境检查，申根区正式运行。此后申根区不断扩展，截至2023年已覆盖27个欧洲国家（包括非欧盟成员国挪威、冰岛、瑞士和列支敦士登）。1997年阿姆斯特丹条约将申根既有法规（Schengen Acquis）正式纳入欧盟法律框架。申根区至今是欧盟最受欧洲公民珍视的成就之一——每年数亿人次享受了无需在边境排队等待检查的便利。然而，2015年难民危机（超过100万难民和移民涌入欧洲）对申根系统造成了前所未有的压力——德国、丹麦、瑞典、挪威和法国等国家临时恢复了内部边境检查（申根条款允许在"重大威胁公共秩序或内部安全"的紧急情况下临时恢复边境检查，每次不超过6个月，最多可延长至2年）。新冠疫情（2020年）也导致多数成员国大规模恢复边境检查。这些"申根暂停"引发了对申根体系可持续性的广泛讨论。',
  significance: '申根协议将"无内部边境"从理念变为现实——欧盟公民每天都能体验到的"最可见的欧洲"。但它也是一把双刃剑——申根外部边境的任何漏洞都威胁整个区域的安全，难民危机的冲击使这一点暴露无遗。"先行者集团"模式（部分成员国先推进一体化、后来全欧盟跟进）是申根对欧洲一体化方法论的重要贡献，这一模式后来在欧元区等领域被复制。',

  significance: '团结工会运动是冷战时期最成功的反体制公民社会运动。它以约1000万人（波兰人口的三分之一以上）的群众基础展示了共产党政权在公民社会动员面前的脆弱。1981年戒严未能消灭团结工会，1989年圆桌会议和半自由选举则实现了"和平交接"——波兰的民主转型为整个东欧剧变提供了复制的模板，而它本身也是戈尔巴乔夫放弃勃列日涅夫主义（不干预波兰内政）的直接后果。团结工会的成功路径（公民社会自组织→镇压无效→圆桌谈判→选举夺权）被捷克（"天鹅绒革命"）和匈牙利（"协商革命"）等不同程度地复制。',

  detail: '1985年，经过勃列日涅夫（1964-1982年）和短暂的安德罗波夫-契尔年科过渡期，54岁的戈尔巴乔夫成为苏共中央总书记——他是自斯大林以来最年轻的苏联领导人，代表了一代未亲历斯大林恐怖、受过良好教育且意识到苏联制度弊病的改革派共产党人。改革（Perestroika，俄语意"重建/重组"）——最初是一场有限的"加速发展"（uskorenie）和"反酗酒运动"。1987年起，戈尔巴乔夫认识到小修小补无法挽救体制。改革逐渐扩展到经济管理分权化——给予企业负责人（厂长/经理）更大的自主决策权，允许部分私营合作制企业（cooperatives）成立；政治体制方面——1988年党的第十九次全国代表会议是戈尔巴乔夫改革的转折点，他将改革从经济范畴推向了政治体制：提出了"社会主义法治国家"的概念，创立了新的最高权力机构——苏联人民代表大会（Congress of People\'s Deputies），其中三之一席位的选举"通过社会团体"（实际保留了共产党的控制），但其余席位是差额选举产生的，1989年3月的首次差额选举中多位共产党高层在选票上大败。公开性（Glasnost，俄语意"公开/透明"）——解除信息封锁和新闻审查，允许报刊、电视和出版物讨论从前完全是禁忌的主题：斯大林镇压的真相（"历史空白"）、阿富汗战争、切尔诺贝利核灾难（1986年4月，苏联最初的掩盖和后来的被迫公开极大地推动了公开性政策）、腐败、犯罪、经济失败和民族问题等。公开性撕裂了苏联意识形态的合法性——共产党统治的"官方历史"被逐一揭露为谎言，被压抑了74年的民族怨恨和不满在"公开性"的空气中喷涌而出。民族分离主义——公开性和民主化的"松绑"使民族矛盾迅速表面化，从1988年开始，波罗的海三国（立陶宛、拉脱维亚、爱沙尼亚）的"人民阵线"（Popular Fronts）迅速壮大，要求恢复独立。阿塞拜疆和亚美尼亚在纳戈尔诺-卡拉巴赫问题上爆发了暴力冲突（"黑色一月"1990年1月苏军在巴库的暴力镇压）。格鲁吉亚（1989年4月第比利斯惨案）、乌克兰、摩尔多瓦等地的民族分离运动愈演愈烈。戈尔巴乔夫面临了无法调和的两难——使用大规模武力镇压分离主义将使他作为"民主化"领导人的国内外信誉彻底破产；不镇压则帝国将分崩离析。他选择了"不使用武力"——这一选择使1990年代的东欧剧变和苏联本身解体以（相对）和平的方式进行，但代价是苏联本身的解体。1991年"八一九政变"（8月19-21日）——保守派（副总统亚纳耶夫、克格勃主席克留奇科夫、国防部长亚佐夫等）成立的"国家紧急状态委员会"（GKChP）试图趁戈尔巴乔夫在克里米亚度假时推翻其改革，宣布在莫斯科实行紧急状态。政变笨拙、无组织且被迅速瓦解——俄罗斯联邦总统鲍里斯·叶利钦（在坦克上发表的演讲成为对抗政变的标志性形象）领导的抵制和军队的不愿开枪最终使政变在三天内失败。政变失败后，戈尔巴乔夫被救出（但权威已荡然无存），叶利钦成为了事实上的最高权力者。1991年8月至12月，各加盟共和国竞相宣布独立——乌克兰于1991年12月1日的全民公投中90%以上支持独立。12月8日，俄罗斯、乌克兰和白俄罗斯的领导人在明斯克附近的别洛韦日森林签署《别洛韦日协议》，宣布"苏联作为国际法主体和地缘政治现实终止存在"，创建了独立国家联合体（CIS，独联体）。12月21日，除波罗的海三国和格鲁吉亚外的11个苏联加盟共和国在阿拉木图签署议定书加入独联体。1991年12月25日，戈尔巴乔夫发表电视讲话宣布辞去苏联总统职务。当晚，克里姆林宫上空飘扬了74年的苏联国旗被降下，升起俄罗斯联邦的三色旗。苏联正式解体——一个拥有约2.9亿人口、世界上领土面积最大的超级大国，在没有外部战争、没有大规模暴力革命的情况下，几乎在一夜之间和平地消失了。',
  significance: '戈尔巴乔夫的改革以其初衷（"拯救苏联"）完全相反的结果（苏联解体）告终——这或许是20世纪最戏剧性的"非意图后果"。公开性撕裂苏联的意识形态合法性，改革松绑了政治控制，放弃勃列日涅夫主义使东欧卫星国在1989年和平脱离；1991年八一九政变的失败则摧毁了维持苏联统一最后的强力工具。戈尔巴乔夫在国内（特别是俄罗斯）被广泛视为"苏联的毁灭者"，但在西方他因和平结束冷战和推动欧洲统一而获得了巨大的尊敬（1990年诺贝尔和平奖）。苏联的解体不仅是一个帝国的末日，也是国际关系从冷战两极走向后冷战世界秩序（1990年代美国的"单极时刻"）的历史分水岭。',
  related: ['brezhnev-doctrine', 'eastern-europe-revolutions-1989', 'berlin-wall-fall', 'cuban-missile-crisis', 'star-wars'],
  tags: ['戈尔巴乔夫', '改革', '公开性', '苏联解体', '八一九政变', '叶利钦', '冷战结束']
});

  name_zh: '哈尔斯坦主义', name_en: 'Hallstein Doctrine',
  date: '1955-12-08', end_date: '1969-10-28', region: 'europe', category: 'doctrine', treeBranch: '西欧外交',
  summary: '1955年12月由西德外交部国务秘书瓦尔特·哈尔斯坦提出的外交原则，是西德对东德外交孤立的政策基石——除苏联外，任何国家如果承认东德，西德将与其断绝或降级外交关系。该政策于1969年被勃兰特的"新东方政策"取代。',
  detail: '1955年9月，西德总理阿登纳访问莫斯科，与苏联建立了外交关系。这是西德首次在一个已经承认东德的国家设立大使馆（苏联在1954年已与东德建立正式外交关系）。但阿登纳明确表示这是他给苏联的一个"特殊例外"，不能成为先例。1955年12月8日，西德外交部国务秘书瓦尔特·哈尔斯坦（Walter Hallstein，一位法学家，后来成为欧洲经济共同体首任委员会主席）在西德驻各国使节会议上正式阐述了此后被称为"哈尔斯坦主义"的外交政策方针。核心理念——西德政府（联邦共和国政府）是全体德意志人民的唯一合法代表（Alleinvertretungsanspruch，即"唯一代表权主张"）；因此，东德（德意志民主共和国，即DDR）不是一个合法的主权国家——在国际法上是无效的；除苏联（作为四国占领权之一拥有特殊地位）外，任何第三国如果承认东德（与其建立正式外交关系），即构成"对德意志联邦共和国的不友好行为"——西德将断绝与那些国家的外交关系，或在尚未建立关系的国家降级/不建交。哈尔斯坦主义的实践——1957年，南斯拉夫与东德建交后，西德立即断绝了与南斯拉夫的外交关系（这是首次应用）。1963年，古巴与东德建交后，西德断绝了与古巴的外交关系。但在1960年代，该主义的硬度开始松动——1963年西德与罗马尼亚建立了贸易使团（但非大使级外交关系），以避免中东欧国家"全倒"给东德。1967年，西德与罗马尼亚建立了正式外交关系——尽管罗马尼亚早已与东德建交，但西德认为罗马尼亚是华约集团中的一个"特例"（齐奥塞斯库有某种程度的外交独立），开始对该主义的严格性有选择地放松。哈尔斯坦主义的根本问题是它在逻辑上导致西德的外交孤立——随着时间推移，越来越多的第三世界国家（特别是阿拉伯国家和不结盟运动国家）承认了东德，如果西德对每一个承认东德的国家都断交，它将在联合国和全球外交格局中陷入越来越孤立的境地。1967年约旦与东德建交后，西德的反应不是断交而是降级——这是该主义的另一个松动的例子。1969年10月，维利·勃兰特（Willy Brandt）领导的社民党-自民党联合政府上台，正式放弃哈尔斯坦主义，代之以"新东方政策"（Ostpolitik）——"以接近求改变"（Wandel durch Annäherung）。西德开始积极寻求与东欧社会主义国家（包括东德）的正常化关系。哈尔斯坦于1958-1967年担任欧洲经济共同体（EEC）委员会的首任主席——在推动欧洲关税同盟和共同农业政策方面的成就在欧洲一体化史上的意义远超过他的外交"主义"。',
  significance: '哈尔斯坦主义是波恩共和国在冷战高峰期执行的对东德"外交孤立"政策的法律和外交工具。但在1960年代后期，随着越来越多的国家承认东德和西德自身追求更积极的东欧政策，这一僵硬的孤立主义开始起反效果，最终被勃兰特"以接近求改变"的新东方政策所取代。从"孤立"到"接触"的转折不仅改变了德国外交，也成了欧洲缓和的先导和重要组成部分。',
  related: ['brandt-ostpolitik', 'adenauer', 'german-division', 'helsinki-final-act', 'basic-treaty-1972'],
  tags: ['德国', '哈尔斯坦', '东德', '阿登纳', '唯一代表权']
});

_o('brandt-ostpolitik', {
  name_zh: '勃兰特新东方政策', name_en: 'Brandt\'s Ostpolitik / New Eastern Policy',
  date: '1969-10-28', end_date: '1974-05-06', region: 'europe', category: 'doctrine', treeBranch: '西欧外交',
  summary: '1969年西德总理维利·勃兰特推行的对东欧和苏联的外交新政——"以接近求改变"（Wandel durch Annäherung）。放弃哈尔斯坦主义，承认战后欧洲边界现实（包括奥得河-尼斯河线和两个德国并存），与苏联、波兰、东德和捷克斯洛伐克签订了一系列东方条约，极大地缓和了中欧紧张局势。勃兰特本人因"跪在波兰"（1970年）和开创对东缓和而获得1971年诺贝尔和平奖。',
  detail: '勃兰特在担任西柏林市长期间（1957-1966年）目睹了1961年柏林墙修建时西方盟国的无力，深刻感受到传统的孤立和对抗政策不会带来德国统一，只会使西德与国际现实脱节。1966-1969年担任基民盟-社民党"大联盟"政府副总理和外交部长，开始松动哈尔斯坦主义，与罗马尼亚建立外交关系（1967年）和与南斯拉夫恢复关系（1968年）。1969年当选总理后，新任外交部长瓦尔特·谢尔（Walter Scheel）与勃兰特共同推行了全面的新东方政策。核心外交成果——东方条约系列（Ostverträge）：1970年8月12日《莫斯科条约》——西德与苏联相互承诺不使用武力威胁或使用武力，承诺尊重二战后欧洲各国的边境不可侵犯（包括奥得河-尼斯河线，这一承认在德国国内右翼中引发了极大的抗辩——"放弃东方领土"的指控贯穿整个1970年代）。1970年12月7日《华沙条约》——双方承诺不使用武力、尊重领土完整和政治独立，在德波双边层面上再次承认奥得河-尼斯河线为波兰西部边界。1970年12月7日勃兰特在参观华沙犹太区起义纪念碑（1943年犹太区起义的英雄们被纳粹葬送之处）时，自发地双膝跪地——"华沙之跪"（Warschauer Kniefall）——令全世界震惊。西德总理在华沙犹太纪念碑前跪下以代替全体德国人民向纳粹受害者表示哀悼和忏悔——沉默的瞬间胜过任何外交辞令，勃兰特作为"道德和解者"的历史形象由此确立。1972年12月21日《两德基础条约》（Basic Treaty）——不是国际法上的"承认"（即西德不将东德视为外国），而是"两个德国国家的事实关系"在这一双方法律框架下的正式规范条约。双方承诺在平等基础上发展正常的睦邻关系，放弃武力威胁和使用武力，尊重相互独立和自主。最关键的是交换"常驻代表处"（而非"大使馆"）以回避正式的国际法承认——从"一个民族两个国家"过渡到某种奇特的"两国模式"。1973年西德和东德同时加入联合国。1973年12月11日《布拉格条约》——西德与捷克斯洛伐克关系正常化，西德宣布1938年慕尼黑协定"无效"（nichtig），但不溯及此约生效期间所产生的法律后果（财产和国籍问题）——这一复杂法律问题的细节处理令双方都付出了艰巨的外交努力。勃兰特因"新东方政策"于1971年获诺贝尔和平奖。1974年，因他的私人秘书京特·纪尧姆（Günter Guillaume）被揭露是东德间谍（"纪尧姆事件"），勃兰特辞去总理职务。新东方政策并未被继任者赫尔穆特·施密特放弃——施密特在1975年赫尔辛基进程中与勃列日涅夫和福特密切合作。赫尔辛基最后文件（1975年）中的"边界不可侵犯"和"人权"框架在一定程度上继承了勃兰特"承认现实以改变现实"的核心逻辑。',
  significance: '勃兰特的新东方政策是欧洲缓和的先导和核心组成部分，完全改变了西德的外交格局：从僵硬的孤立主义转向务实的接触与和解。"华沙之跪"作为德国对纳粹罪行进行道德忏悔的象征性表演，在世界舆论中比任何条约文本都更为深刻地改变了德国的国际形象。新东方政策被批评者（国内右翼和在野的基民盟）指责为"放弃统一"和"背叛德国利益"，但1978-1980年代的两德关系证明"以接近求改变"确实在相当程度上奏效——1980年代东德有约380万人次的西德游客/家庭团聚旅行，东德的社会渗透程度远超过1961年之前的任何时期。1989年柏林墙倒塌和1990年两德统一在很大程度上是这种"以接触促改变"的长期逻辑的最终结果。',
  related: ['hallstein-doctrine', 'adenauer', 'helsinki-final-act', 'german-division', 'two-plus-four-treaty'],
  tags: ['德国', '勃兰特', '新东方政策', '华沙之跪', '和解', '东方条约', '缓和']
});

  summary: '1917年11月2日英国外交大臣阿瑟·贝尔福致书罗斯柴尔德勋爵，声明"英王陛下政府赞成在巴勒斯坦建立一个犹太人民的民族家园，并将尽最大努力促成这一目标的实现，但必须明确理解：不得做任何可能损害巴勒斯坦现存的非犹太社团的公民权利和宗教权利之事。"这份仅67个英文单词的文件是以色列建立的最重要国际法文件之一，也是巴以冲突百年纠葛的起点。',
  detail: '贝尔福宣言的出台背景极为复杂，涉及多重相互矛盾的利益计算——英国政府在一战后期同时向三方作出了相互冲突的领土承诺：1915-1916年，英国驻埃及高级专员麦克马洪与麦加的谢里夫侯赛因通信（《麦克马洪-侯赛因通信》），承诺支持在战后建立一个包括巴勒斯坦在内的独立阿拉伯王国，以换取哈希姆家族领导阿拉伯起义反对奥斯曼帝国。1916年，英法秘密签署《塞克斯-皮科协定》将巴勒斯坦划为"国际共管区"（但实质上是英法瓜分）。而贝尔福宣言又承诺支持犹太人在巴勒斯坦建立民族家园。这三重互相矛盾的承诺使后来的巴勒斯坦问题几乎没有和平解决的答案——"我承诺了同一块土地给两个不同的民族，而我自己并不拥有它。"英国支持犹太复国主义（Zionism）的动机是多方面的——争取美国和俄国犹太人社区在战争中对协约国事业的支持（这是贝尔福宣言最直接的战略目的）；在英国基督教复国主义传统中，犹太人返回"圣地"具有深层的宗教和道德支持基础（许多英国上流人士包括劳合·乔治首相本人深受旧约影响）；将巴勒斯坦变为"犹太人的家园"（在英国控制下）可以为苏伊士运河提供一个"可靠的保护屏障"（巴勒斯坦位于苏伊士运河的东翼）。宣言文本经过极为审慎的措辞权衡——最关键的是使用了"民族家园"（national home）而非更明确的"国家"（state）——这一模糊措辞是故意留下的解释空间。但宣言在后来的实践中被犹太复国主义运动视为建立犹太人国家的国际法基础。宣言中"不得损害非犹太社团的公民权利和宗教权利"的附带条款在日后英国委任统治巴勒斯坦期间（1922-1948年）被证明完全无法兑现——犹太移民和犹太土地购买的增多与阿拉伯巴勒斯坦居民的利益和期望发生了不可调和的冲突：一方认为巴勒斯坦是《圣经》中上帝应许犹太人的"以色列地"（Eretz Yisrael），另一方认为巴勒斯坦是他们世世代代居住的家园（"巴勒斯坦属于巴勒斯坦阿拉伯人"）。阿犹之间从1920年代起即爆发了暴力冲突——1920年耶路撒冷暴乱、1921年雅法暴乱、1929年希伯伦大屠杀（阿拉伯人袭击犹太社区）、1936-1939年阿拉伯大起义（反对英国统治和犹太移民的三年反叛）。1939年英国发布了《白皮书》大幅限制未来五年内的犹太人移民（每年最多1.5万人）——这一"背弃（贝尔福）宣言"的行动既疏远了犹太人（认为英国背叛）又未能安抚阿拉伯人（认为让步不够）。二战后，纳粹大屠杀（约600万犹太人被系统性灭绝）使建立犹太人国家的国际舆论完全转变——1947年11月29日联合国大会以33对13票通过第181号决议（分治方案），将巴勒斯坦分为一个犹太人国家和一个阿拉伯人国家，耶路撒冷为国际共管区。犹太领导人（本-古里安）接受了分治方案，阿拉伯国家全部反对分治。1948年5月14日，以色列宣布独立。次日阿拉伯国家联军进攻以色列，第一次中东战争爆发。',

  detail: '六日战争的根源可追溯到1967年5月的危机升级——苏联向埃及（纳赛尔）传递了（虚假的）情报称以色列正在叙利亚边境集结兵力，准备进攻叙利亚。纳赛尔为了向其阿拉伯盟国叙利亚提供支持、并展示阿拉伯反以领袖的姿态，采取了连续升级的行动：5月16日，要求联合国紧急部队（UNEF自1956年苏伊士危机后一直驻扎在西奈半岛的埃及-以色列边境作为缓冲区）撤出；联合国秘书长吴丹在没有安理会讨论的情况下出人意料地同意（这后来被广泛批评）；5月22日，埃及宣布封锁蒂朗海峡（Straits of Tiran）——以色列南部埃拉特港通往红海的唯一出海口，以色列自1956年以来一直表明封锁该海峡将被视为"开战理由"（casus belli）；5月30日，约旦国王侯赛因飞往开罗与纳赛尔签署了共同防御协定，将约旦军队置于埃及统一指挥之下（这使以色列在三个方向上同时面临包围——西奈、戈兰和约旦河西岸）。以色列国内弥漫着"第二次大屠杀"的生存恐惧——埃及、叙利亚和约旦三国的将军们在接受媒体采访时大谈"将以色列人赶入大海"和"对犹太人发动灭绝战争"。5月底至6月初，以色列尝试通过外交途径（特别是美国）解决危机，但美国深陷越南战争无力也无意承担打开蒂朗海峡的军事责任。6月4日，以色列内阁做出了发动先发制人攻击的决定。1967年6月5日早上7:45（以色列时间），以色列空军几乎倾巢出动——约200架战斗机以极低的高度掠海飞向埃及的十多个空军基地，在第一波空袭中将约300架埃及空军飞机摧毁在地面上（埃及空军几乎全军覆没）。同日上午，以军在西奈半岛发动了快速地面攻击，在不到四天内占领了整个西奈半岛至苏伊士运河东岸。约旦在6月5日上午攻入西耶路撒冷——以色列在最初希望约旦不参战（通过联合国向侯赛因国王发消息请求他不要干预）后，被迫反击。6月6-7日，以军占领了约旦河西岸和东耶路撒冷（包括老城和西墙/哭墙），国防部长摩西·达扬（Moshe Dayan）在6月7日来到西墙（哭墙），这是犹太人自公元70年第二圣殿被罗马人毁灭后近1900年来第一次犹太人主权的军队控制西墙——这一刻在以色列国家叙事中具有深远的象征意义。6月9-10日，以军向叙利亚的戈兰高地发起进攻（这个巨大的火山岩高地自1948年以来一直是叙利亚炮击以色列北部集体农场Galilee的基地），经过激烈战斗占领了戈兰高地。6月10日，所有战线停火。以色列在六天内取得了完胜——占领了西奈半岛（约61,000平方公里）、戈兰高地（约1,200平方公里）、约旦河西岸（约5,860平方公里，包括东耶路撒冷）和加沙地带（约360平方公里），总共占领了比自己原有领土大约多三倍的土地。战争的后果——1)被占领土问题：约100万巴勒斯坦阿拉伯人（在约旦河西岸和加沙地带）生活在以色列军事占领之下，成为"被占领土的巴勒斯坦人"。此后以色列在约旦河西岸建立了大量的"犹太人定居点"（自1967年以来，定居点人口从零增长到约50万人，2017年），定居点的合法性在国际法上存在严重争议（日内瓦第四公约禁止占领国迁移自己的平民到被占领土）。2)联合国安理会第242号决议（1967年11月22日）：确立"以土地换和平"（Land for Peace）原则——"以色列武装部队从在最近冲突中占领的领土撤出"（英文版刻意用"from territories"而非"from the territories"——这一冠词的缺失给了以色列和阿拉伯国家完全不同的解释空间）。3)对阿拉伯世界的冲击：1967年的惨败彻底摧毁了纳赛尔主义——阿拉伯民族主义和世俗泛阿拉伯主义在战场上被羞辱。伊斯兰主义（以1967年后崛起的穆斯林兄弟会和后来的哈马斯等为代表）开始替代世俗民族主义成为阿拉伯世界反以斗争的主题。4)东耶路撒冷的吞并：以色列于1980年通过《耶路撒冷法》正式宣布"统一和不可分割的耶路撒冷"为以色列首都——这一行动未被绝大多数国家承认（各国大使馆大多设在特拉维夫而非耶路撒冷）。美国于2017年承认耶路撒冷为以色列首都并迁移大使馆。',
  significance: '六日战争是阿以冲突的转折点——从此"阿以冲突"的核心主题从"以色列的生存权"转变为"被占领土的最终地位"（约旦河西岸、加沙、戈兰高地、东耶路撒冷）。以色列从"大卫"变成了"歌利亚"——从一个被围困的弱国转变为了中东地区的军事超级大国和占领者。"以土地换和平"原则（242号决议）在此后的戴维营协议（1979年以埃和平，西奈归还埃及）中部分成功，但在以色列-巴勒斯坦方面至今未能实现。1967年的边界（"绿线"Green Line）至今仍是所有巴以和平方案（包括两国方案Two-State Solution）的谈判基础。',

  detail: '1973年10月6日下午2点（在以色列，这天是犹太教最神圣的赎罪日Yom Kippur——全国完全停摆，所有犹太人都在禁食和祈祷），埃及（新总统安瓦尔·萨达特，纳赛尔于1970年去世）和叙利亚对以色列发动了同时的大规模突然袭击。埃及的进攻代号为"巴德尔行动"（Operation Badr，以公元624年穆罕默德在巴德尔取得第一场军事胜利的战役命名），约200架埃及飞机和约2000门大炮率先进行猛烈的空中和炮火准备，随后约8万埃及军队乘坐橡皮艇和浮桥在数个渡河点以高压水炮突破了以色列的"巴列夫防线"（Bar-Lev Line，以军沿苏伊士运河东岸修建的系列沙土防御工事——沙墙和碉堡，被以军吹嘘为"不可逾越"）。埃及步兵装备着苏联提供的"萨格尔"反坦克导弹和"箭-2"便携防空导弹（SAM-7），对以色列在没有步兵掩护下的装甲纵队反击造成了严重伤亡。与此同时，叙利亚军队以约1400辆坦克从戈兰高地发动大规模攻势，试图在48小时内收复戈兰高地全境。以色列在戈兰高地只有约180辆坦克和零星步兵，初期防线几乎被击溃。战局逆转——美国在以色列陷入困境时（据说以色列总理梅厄曾下令核武器准备处于待命状态但从未公开确认）决定大规模空运军事装备（"镍草行动"Operation Nickel Grass），在十月战争期间向以色列运送了约2.3万吨武器装备。以色列在戈兰高地首先击退了叙军的进攻，并于10月11日反攻至距大马士革仅约40公里处。在西奈方向，以军（以阿里埃勒·沙龙少将指挥的装甲师为先锋）找到了埃及第二和第三军团之间的接合部，于10月15日渡过苏伊士运河到达"非洲一侧"（运河西岸——埃及本土），在运河西岸建立了桥头堡，包围了埃及第三军团（在运河东岸西奈半岛的部分，约2万人和300辆坦克被完全切断补给）。10月22日安理会通过第338号决议要求停火、执行242号决议并开启和平谈判。但双方都指责对方率先违反停火。10月25日美国将全球核警戒级别提升至三级（DEFCON 3，即"全球最大规模战略核力量处于高度警戒状态"）以威慑苏联可能单方面派遣军队前往中东（勃列日涅夫曾致函尼克松暗示如果美国不共同监督停火，苏联可能单独派遣军队）。这是自1962年古巴导弹危机以来美苏最接近核摊牌的时刻。战争以停火结束。战争的后果——1)埃及虽然未能在战场上取得最终胜利，但萨达特实现了"恢复埃及军心士气"和"打破1967年后的\'不胜神话\'"的政治目标——埃及士兵从心理上抹去了1967年耻辱的印记。萨达特现在可以从强势地位（而非战败国乞求和平的地位）与以色列谈判——1977年萨达特访问耶路撒冷，1979年以埃签署《戴维营协议》和《以埃和平条约》（西奈归还埃及，以换取以埃关系正常化和西奈半岛的非军事化。埃及因此被开除出阿拉伯联盟直到1989年）。2)1973年石油危机——阿拉伯石油输出国组织（OAPEC）在战争爆发后以石油作为政治武器，对美国和其他支持以色列的西方国家实施石油禁运（同时大幅减产），导致了战后最严重的全球经济危机之一。3)以色列承受了惨烈的伤亡——约2800人阵亡，8000人受伤，约300人被俘。这在一个总人口仅约300万的小国中是巨大的创伤——相当于美国的约30万阵亡。以色列情报部门对埃及和叙利亚意图的"灾难性误判"（尽管有多次明确警告）导致了社会对政府和政治体制的巨大信任危机和抗议运动。',
  significance: '赎罪日战争打破了以色列"不可战胜"的神话，恢复了埃及的军事尊严，从而为埃以和平奠定了"以对等手段换和平"的心理基础。战争还直接触发了1973年石油危机——阿拉伯产油国以石油禁运为政治武器改变了全球经济格局和西方国家对中东政策的计算。"石油武器"的初次登场"成功"（从阿拉伯视角）使能源安全从此成为西方国家外交和军事政策的核心考虑之一。美苏在战争期间的核警戒对峙（DEFCON 3）证明中东战争始终带有升级为美苏核对抗的系统性风险。',

  name_zh: '1973年石油危机', name_en: '1973 Oil Crisis / First Oil Shock',
  date: '1973-10-17', end_date: '1974-03-18', region: 'middle-east', category: 'crisis', treeBranch: '中东战争',
  summary: '1973年10月，阿拉伯石油输出国组织（OAPEC）为惩罚美国和其他西方国家在赎罪日战争期间对以色列的军事援助，对其实施石油禁运并大幅减产。全球油价在六个月内从每桶约3美元飙升至约12美元（翻了约4倍），触发了二战后最严重的全球经济衰退——"滞胀"（stagflation）——并在根本上改变了全球能源地缘政治、发达国家经济增长模式和生活方式。',
  detail: '1973年10月17日，OAPEC在科威特城召开会议，决定以石油为"武器"惩罚支持以色列的国家（特别是美国和荷兰——荷兰允许美国使用其领土向以色列空运军事物资，且其鹿特丹港是欧洲石油运输的关键枢纽）。会议决定立即将石油产量削减5%，此后每月继续削减5%，直到以色列撤出1967年占领的所有阿拉伯领土（被占领土）和"巴勒斯坦人民的合法权利获得恢复"。对美国和荷兰实施完全的石油禁运。禁运和减产对全球石油市场产生了立竿见影且灾难性的影响——石油是全球经济的命脉，而1973年石油输出国组织（OPEC）成员国生产了全球石油的约55%。油价在数月内从战前的每桶约2.90美元暴涨至1974年初的每桶约11.65美元（名义价格翻了约4倍）。"石油冲击"对发达工业国家的巨大影响——1)日本和西欧受到的冲击最大——这两个地区几乎完全依赖进口石油（日本依赖率约99%，西欧约85%），特别是来自中东的石油。当美国被禁运时，日本被迫修改其亲以色列的中东外交政策（发表声明呼吁以军从1967年占领的所有领土撤出）以换取OAPEC将其列为"友好国家"而恢复石油供应。2)美国的冲击：汽油价格飞涨，加油站前排起了长队（因石油公司在禁运和价格管制下无法正常供应），美国人的"汽车生活方式"（依赖廉价汽油的郊区化通勤）面临生存性的挑战。3)"滞胀"（Stagflation，停滞的stag加通胀的flation）的到来——高油价推高了从塑料到化肥到交通运输的一切商品的价格，触发了1970年代的双位数通胀，与此同时高能源价格导致经济活动急剧减速和失业率上升——"高失业率+高通胀率"这一在凯恩斯主义经济学中"不可能同时出现"的悖论——成为了现实。各国央行（特别是美联储）在通胀和失业之间痛苦地两难取舍——紧缩货币会打击就业，放松货币会加速通胀。石油危机的长期深远影响——1)能源安全成为战后国际关系中全新的核心议题。1974年经济合作与发展组织（OECD）成员国成立了国际能源署（IEA），协调成员国的战略石油储备（至少90天的净进口量）和紧急石油共享机制，以减少对OPEC国家的单方面依赖。2)替代能源和节能技术的大规模投资启动——北海油田（英国和挪威，1970年代后期开始投产）、阿拉斯加北坡油田（1977年管线贯通）和墨西哥湾深水油田的勘探和开发加速。法国大规模投资核电（到1980年代，核电占法国电力约70%，至今仍是世界最高比例之一）。3)日本和西欧的产业结构从重化工业向高科技和节能产业转型——日本汽车以低油耗的优势（"日本小车"在欧洲和美国的渗透率急剧上升）使日系汽车品牌（丰田、本田）在全球市场上彻底崛起。4)OPEC国家（特别是沙特阿拉伯、科威特、阿联酋等波斯湾产油国）的"石油财富"急剧增加——这些"石油美元"（petrodollars）大量流入西方银行（主要是美国和英国的金融机构），然后被西方银行再贷款给发展中国家（主要是拉丁美洲和东欧）——"石油美元循环"（petrodollar recycling）是1970年代全球金融格局和1980年代第三世界债务危机的核心线索。1979年第二次石油危机——因伊朗伊斯兰革命（1979年2月）和随后的伊朗-伊拉克战争（1980-1988年）导致全球石油供应再次收紧，油价从1978年末的每桶约13美元飙升至1979-1980年的约32美元（再次翻倍以上）。第二次石油危机再次重创了刚刚从第一次冲击中开始调整的全球经济。',
  significance: '1973年石油危机是二战后世界经济的分水岭——战后长达25年的依赖廉价石油的高经济增长和金本位/固定汇率的"黄金时代"（Les Trente Glorieuses/"辉煌三十年"）正式宣告结束。滞胀的根本性挑战间接导致了凯恩斯主义需求管理政策在西方的衰落和货币主义/新自由主义的兴起。石油禁运作为"政治武器"的首次使用（虽然最终并未迫使以色列撤出被占领土）永久地改变了全球能源政治——确保能源供应安全成为了此后所有大国外交和军事战略的核心组成部分。从更广阔的历史视角看，石油危机是从工业时代向后工业/信息时代经济结构转型的加速器之一。',

  date: '1954-03-13', end_date: '1954-05-07', region: 'asia-pacific', category: 'war', treeBranch: '东南亚格局',
  summary: '1954年3月13日至5月7日，越南人民军（越盟）在武元甲将军指挥下，在越南西北部的奠边府谷地对法国远征军实施了长达56天的围困战并最终攻占之。约1.6万名法军被围，其中约2300人阵亡、约1.17万人被俘（俘虏中仅约3300人活着回到法国）。奠边府的陷落直接导致了法国在印度支那的殖民统治的终结和1954年日内瓦协议的签署。',
  detail: '1953年11月，法军总司令亨利·纳瓦尔（Henri Navarre）命令空降部队在奠边府建立一个"要塞式"的坚固防御据点，目的在于——1)在越盟（越南独立同盟会，Viet Minh，由胡志明和武元甲领导的越南民族主义和共产党的联合力量）的后方腹地插入一个钉子，威胁越盟通往老挝的补给线；2)诱使武元甲的越盟军队进行一场法军擅长的"固定阵地大会战"——纳瓦尔深信越盟在没有重炮和卡车的情况下无法在山地丛林中支撑大规模攻坚战，法军的优势炮兵和空中力量将在开阔的谷地中摧毁越盟的任何进攻。法军空降了约1.6万名士兵（包括外籍军团、北非部队、越南辅助部队和法国空降兵）进入奠边府谷地，修建了数个以法国女性名字命名的"火力支撑点"（如"伊莎贝尔"、"加布里埃尔"、"比阿特丽斯"、"安妮-玛丽"等）和两条飞机跑道。武元甲对奠边府的回应远超纳瓦尔的预期——他动用了约5万人的兵力，用数万名民工（包括妇女）以人力和自行车队在丛林山道上——将重型火炮和高射炮拆解后运送到谷地周围山脊上的隐蔽阵地中。开辟通往这些"反向阵地"的小道（"奠边府小道"的雏形）是对后勤和人力意志的极限考验。到1954年3月初，越盟在山脊上秘密部署了200多门重型火炮和高射炮——法军指挥官对越盟能够将重炮搬上这些被认为"无法通行"的山脊完全没有预料到。3月13日越盟发动了大规模炮火突击——谷地的法军阵地完全暴露在山脊炮火之下——第一条跑道在首日即被摧毁，这意味着法军此后所有的补给和战术空投必须从数千英尺以上进行，同时承受着来自周围山头的高射炮火力的打击。法军机场（奠边府的空中走廊）——越南的法国空军和美国中央情报局（中情局以民航公司的名义）每天奋力空投补给，但越盟高射炮和高射机枪的猛烈火力使精确空投越来越不可能——大量补给偏落在越盟阵地一侧。4月以后，随着法军阵地被逐个攻占和防区收缩，法军剩余的士兵在越南丛林的泥泞坑洞中忍受伤亡、疾病和弹尽粮绝的绝望，奠边府变成了"地狱谷地"。5月7日下午，越盟发动了最后的全面攻击，在不到一天内攻占了法军最后的防御阵地（"伊莎贝尔"）。法军司令克里斯蒂安·德卡斯特里（Christian de Castries）准将率残部投降。约有1.17万名法军成为战俘，开始了向越南东北部战俘营的"死亡行军"（数百公里的步行加上越盟看守的虐待和疟疾和营养不良造成了极高的死亡率——最终仅约3300人活着返回法国）。奠边府陷落的消息在5月7日当天传到了正在日内瓦进行的印度支那问题国际会议。法国总理拉尼埃表示法国的议会和公众舆论已经无法再承受进一步的战争——法国政府被迫在日内瓦协议（1954年7月21日）中接受了越南以北纬17度线为界进行事实上的临时分治，法国军队完全撤出印度支那。',
  significance: '奠边府战役是去殖民化战争中的经典决定性战役——一个欧洲殖民强国（法国）的远征军被一个"第三世界"民族解放运动（越盟）决定性地击败。战役揭示了以固定要塞对抗灵活的人民战争和全民动员的不可能——奠边府后来成为世界各地反殖民和革命运动效仿的榜样。战役直接促成了法国的撤出和美国的介入——美国中央情报局其实在奠边府围城期间为法军提供了大量支持（以民航航空公司的名义空运补给），美国的卷入从"支援法国打殖民战争"转变为"代替法国在越南南部防止共产主义扩张"，奠边府因此间接地成为了美国越南战争的胚胎。',

  name_zh: '越南战争', name_en: 'Vietnam War / Second Indochina War',
  date: '1955-11-01', end_date: '1975-04-30', region: 'asia-pacific', category: 'war', treeBranch: '东南亚格局',
  summary: '1955-1975年以越南为战场的冷战代理战争和人道灾难。北越（越南民主共和国，胡志明领导）和南越的越共游击队与美国支持的南越共和国（越南共和国）之间进行了约20年的残酷战争。美国于1965年大规模派遣地面部队（峰值约54.3万人），于1973年签署巴黎和约撤军。1975年4月30日西贡陷落，越南实现统一。战争造成约200-300万越南人（多数为平民）和约5.8万美军死亡，深刻创伤了美国社会，改变了美国的外交政策。',
  detail: '越南战争的根源可以追溯到1945年二战结束和第一次印度支那战争（1946-1954年，即法国重新殖民越南的战争）。1954年奠边府战役和日内瓦协议规定越南以北纬17度线为临时军事分界线分为南北两个区域，1956年7月举行全国性的自由选举以实现和平统一。但美国（艾森豪威尔政府）和南越吴廷琰（Ngô Đình Diệm）政府担心胡志明将在全国选举中以压倒性多数获胜，拒绝举行统一选举（美国未签署日内瓦协议，仅以"不干涉"声明认可之），"两个越南"遂从临时安排固化为冷战事实。北越方面（以黎笋、武元甲和胡志明为核心）以"民族解放和统一"为目标，最初（1957-1960年）采取政治斗争为主的策略（但被吴廷琰政权的镇压——包括对约5万"越共嫌疑分子"的处决和约10万人的拘留——严重削弱），1960年越南南方民族解放阵线（NLF，俗称"越共"Viet Cong）成立，游击战争升级。美国的干预逐步升级——艾森豪威尔时期（至1961年）：向南越提供大量军事援助和派遣"军事顾问团"（到1961年约900人，但"顾问"实际上已经直接参与了战斗）。肯尼迪时期（1961-1963年）："顾问团"人数增加至约1.6万人；1963年11月2日，美国政府默许和鼓励了南越将领发动政变杀死吴廷琰（因他对佛教徒的残酷镇压——自焚僧人——和镇压越共的军事无能使美国认为他是"不可救药的失控的盟友"），但政变导致的长期政治混乱使南越进一步衰弱。约翰逊时期（1963-1969年）：1964年8月，美军"马多克斯"号驱逐舰在北部湾（东京湾）发生"与北越巡逻艇的遭遇"事件（第二个攻击的报告很可能从未发生，但约翰逊政府利用这一事件争取国会授权），1964年8月7日美国国会通过《北部湾决议案》（Gulf of Tonkin Resolution），授权总统"采取一切必要手段击退任何对美国军队的武装攻击并防止进一步的侵略"（后来被广泛批评为"空白支票"）。1965年3月8日，约翰逊决定派遣第一批海军陆战队正规战斗部队在岘港登陆——以"保护美国空军基地"为名开始了美国在越南的地面战斗大规模介入。1965年至1968年间，美军人数持续攀升，1969年达到峰值约54.3万人。美军以压倒性的火力优势（B-52战略轰炸机对越南北方和"胡志明小道"的丛林进行了人类历史上密度最高的轰炸——"滚雷行动"Operation Rolling Thunder持续了三年多，投弹量超过了二战期间美国在欧洲的总投弹量。凝固汽油弹、橙剂（二恶英毒剂用于大规模化学除草落叶）和"自由开火区"造成了大规模平民伤亡和环境灾难）。1968年1月30日（越南新年/春节）北越和越共发动了"春节攻势"（Tet Offensive）——同时攻击了南越超过100个城镇和美军基地，包括西贡的美国大使馆。春节攻势在军事上是北越和越共的惨重失败（越共损失了约一半有生力量从此一蹶不振），但在美国国内电视上——一位越共士兵在西贡街头上被南越警长从容枪决的影像、美军陆战队在顺化废墟中艰难巷战的画面——彻底颠覆了美国公众对"战争即将胜利"的官方说法的信任。春节攻势后，越南战争的国内支持率急剧下降。1969年，尼克松总统上任，"战争越南化"和反战运动——美军开始从越南逐步撤军（1972年底减至约2.4万人），同时将战争负担转移给南越军队。但尼克松同时扩大了战争到柬埔寨（1970年"柬埔寨入侵"推翻了西哈努克亲王的政府、间接促成了红色高棉的崛起，从1975年到1979年他们屠杀了约170万柬埔寨同胞）和老挝。1973年1月27日，美国、北越、南越和越共在巴黎签署《巴黎和平协定》，美国承诺在60天内撤出全部剩余军队，北越则允许南越阮文绍政府继续存在。但条约本质上只是"美国体面撤退的遮盖布"——北越的目标仍然是统一。1975年春季，北越发动了"胡志明战役"，在约55天内席卷南越——南越军队在失去美军空中支援后迅速崩溃（国会已禁止总统动用任何美军在印度支那的军事力量——1973年战争权力法案和国会对尼克松-福特政府的断资），1975年4月30日北越坦克撞开西贡独立宫（总统府）大门，南越总统杨文明（刚刚在4月28日上任）宣布无条件投降。战争结束，越南统一于共产党的领导之下，西贡更名为胡志明市。战争的伤亡——约130-350万越南人（包括南北双方及平民）死亡；约5.8万美军阵亡（另约30万人受伤）；约20-30万柬埔寨人死于美国轰炸；老挝遭受了史上最严重的集束炸弹轰炸（未爆弹至今每年仍造成数百人死伤）。',
  significance: '越南战争是美国历史上最长的战争（直至阿富汗战争超过了它）和第一次明确的军事和政治失败。它创造了"越南综合征"（Vietnam Syndrome）——美国公众和决策圈对海外军事干预的长期性、代价和道德合法性的深刻怀疑，这一综合征深刻影响了此后二十多年的美国外交政策（甚至到1990年代海湾战争和2003年伊拉克战争的辩论中，"避免另一个越南"都是核心理据）。战争彻底改变了美国社会——反战运动与民权运动和反文化运动交织在一起，催生了1960-70年代的社会革命。对越南而言，战争的代价几乎是不可想象的——但统一（以共产党领导为代价）实现了1919年胡志明在凡尔赛宫所追求的"民族自决"梦想。越南战后直到1986年"革新开放"（Đổi Mới）前经历了计划经济的长期困难和与美国的外交孤立（直到1995年美越关系正常化）。',
  related: ['dien-bien-phu', 'geneva-accords-1954', 'domino-theory', 'paris-peace-accords-1973', 'kent-state', 'pentagon-papers'],
  tags: ['越南', '冷战', '代理战争', '反战', '春节攻势', '越共', '胡志明']
});

  date: '1933-03-04', end_date: '1939-00-00', region: 'americas', category: 'domestic', treeBranch: '美国内政与总统纲领',
  summary: '1933年富兰克林·D·罗斯福就任美国总统后为应对大萧条而推行的一系列大规模经济和社会改革计划。包括第一次新政（1933-1934年）的紧急救济和金融改革（紧急银行法、NIRA、AAA、联邦紧急救济署等），以及第二次新政（1935-1938年）的社会保障和劳工权益立法（社会保障法、瓦格纳法/全国劳工关系法、公平劳动标准法、公共事业振兴署WPA等）。新政从根本上改变了美国联邦政府的角色、美国社会契约的性质和美国政治中的政党联盟结构。',
  detail: '1933年3月4日，富兰克林·罗斯福在"我们唯一的恐惧就是恐惧本身"的就职演说中开始了新政时代。大萧条已持续了约三年半——全国约四分之一的工人失业（约1300万人失业）、约5000家银行倒闭、工业生产萎缩了约一半、农业价格暴跌到低于生产成本、成千上万的家庭被驱逐出家园和农场。新政可以粗略地分为第一次新政（1933-1934年，以紧急救济和经济复苏为主）和第二次新政（1935-1938年，以长期结构改革和社会安全网建设为主）。最大和最重要的新政机构/法律/政策——金融改革：1933年紧急银行法（银行放假四天以审查财务状况，只有健康的银行才被允许重新开业，这次"银行假日"和罗斯福的"炉边谈话"成功恢复了公众信心）。1933年《银行法》（格拉斯-斯蒂格尔法案）——建立了联邦存款保险公司（FDIC，为存款人提供高达5000美元的存款保险），并将商业银行与投资银行分离（"防火墙"条款直到1999年才被废除）。1933年《证券法》和1934年《证券交易法》——建立了证券交易委员会（SEC）以监管股票和债券市场，强制要求上市公司公开披露财务信息。农业：1933年《农业调整法》（AAA）——通过向农民支付补偿金以减少作物种植面积和屠宰过剩牲畜，以提高农产品价格——该政策在1936年被最高法院以违宪为由推翻，但1938年修改后的新版恢复了。工业：1933年《国家工业复兴法》（NIRA）——建立了国家复兴管理局（NRA），以蓝鹰为标志，要求各行业制定"公平竞争规则"，包括最低工资、最高工时和禁止童工。但NIRA行政繁琐且偏向大企业压制小企业，1935年被最高法院以违宪（行政机关非法行使立法权）为由推翻。公共工程和就业——公共事业振兴署（WPA，1935年）：在整个新政期间雇用了约850万失业工人，从事修建公路、桥梁、公共建筑、公园、学校和机场，雇佣了数万艺术家、作家、音乐家和戏剧导演记录美国文化和为公共空间创作艺术作品（联邦艺术计划/联邦作家计划）。"田纳西河谷管理局"（TVA，1933年）：在贫困的田纳西河谷七州地区修建了一系列水坝和发电站，为这个"未通电的地区"提供廉价电力、控制洪水和改良农业——整体性区域发展的模式，至今仍是世界上最大的公共电力公司。平民保育团（CCC，1933年）：雇用约300万年轻失业男性从事国家公园和森林的保护和培育工作。社会安全网——1935年《社会保障法》（Social Security Act）：建立了联邦养老金（老年保险）、联邦-州合作的失业保险和对有需要家庭的援助（后来的AFDC/贫困家庭子女补助）。这是美国历史上最具深远影响的社会立法——"社会保障"一词从此深刻改变了美国人对"应得权利"（entitlement）和联邦政府角色的观念。但最初的社会保障覆盖范围排除了农业工人和家务工人——这一排除不成比例地影响了南方非洲裔美国工人（因南方民主党的种族主义坚持）。劳工权益——1935年《瓦格纳法》（全国劳工关系法，Wagner Act/NLRA）：这是美国劳工运动的"大宪章"——保障工人组织和集体谈判的权利，建立国家劳工关系委员会（NLRB）以监督工作场所选举和调查不当劳动行为。1938年《公平劳动标准法》（FLSA）：设定了联邦最低工资（最初为每小时25美分）、每周最长44小时工作（逐步减至40小时）、加班支付1.5倍工资以及禁止雇用16岁以下童工。新政的批评者和影响——保守派批评新政是"社会主义"和"违宪的权力扩张"。最高法院在1935-1936年连续推翻了NIRA和AAA（导致罗斯福提出了臭名昭著的"法院填塞计划"——增加最高法院法官人数，虽然提案被国会否决，但此后法院的保守派法官开始转变立场支持新政立法——"及时转换的法官拯救了九人法院"这一转折）。新政从根本上改变了美国联邦政府的角色——从"守夜人"国家到"积极介入经济和社会生活"的干预型国家，联邦预算和联邦雇员规模在此后几十年间持续增长。新政还重塑了美国政党联盟——将非洲裔美国人（从支持"林肯的党"共和党的大批黑人选民转向支持民主党和新政——尽管新政的许多福利项目在操作中仍存在种族歧视）、劳工阶层、城市移民、南方的贫穷白人和自由主义知识分子聚集成为"新政联盟"（New Deal Coalition），此后约40年间民主党在国会一直拥有多数优势。',
  significance: '新政是20世纪美国国内政策中最具深远意义的转折。它将联邦政府的角色从被动的"守夜人"转变为经济和社会福利的积极参与者。"大政府"、"福利国家"、"社会保障"等核心概念通过新政被引入了美国政治生活。新政立法创建的制度遗产——FDIC、SEC、社会保障、最低工资、失业保险和工会组织权——至今仍是美国经济和社会安全网的基础设施。新政联盟重塑了美国的政党体系，奠定了民主党"大政府-社会正义"和共和党"小政府-个人责任"之间基本意识形态分野的格局。',
  related: ['great-depression', 'FDIC', 'SEC', 'wagner-act', 'NLRA', 'FLSA', 'fireside-chats'],
  tags: ['新政', '罗斯福', '大萧条', '社会保障', '劳工权益', '金融改革', '公共工程']
});

_o('mccarthyism', {
  name_zh: '麦卡锡主义', name_en: 'McCarthyism',
  date: '1950-02-09', end_date: '1954-12-02', region: 'americas', category: 'domestic', treeBranch: '美国内政与总统纲领',
  summary: '1950年至1954年，以威斯康星州共和党参议员约瑟夫·麦卡锡为代表的美国反共政治迫害运动。麦卡锡及其追随者以夸大和不实指控，声称美国政府和军队内部被共产党人和"共产主义同情者"渗透，对数千名政府官员、知识分子、艺术家和同性恋者进行了忠诚调查和职业迫害。1954年参议院正式"谴责"（censure）麦卡锡的不当行为，运动结束。',
  detail: '麦卡锡主义的爆发与冷战高峰期（1949年苏联原子弹试验成功、中国革命胜利和朝鲜战争爆发——1950年6月）的美国"红色恐慌"（Red Scare）密切相关。在此之前，杜鲁门政府自己已经建立了忠诚审查程序（1947年联邦雇员忠诚计划），众议院非美活动委员会（HUAC）从1947年起调查好莱坞电影业的"共产主义渗透"，特别是在1947年"好莱坞十君子"（Hollywood Ten，拒绝回答委员会关于他们是否为共产党员的质询，以第一修正案（言论自由）而非第五修正案（不得自证其罪）为抗辩根据）入狱事件中。但麦卡锡把反共调查推向了更极端和更不择手段的维度。1950年2月9日，麦卡锡在西弗吉尼亚州惠灵市的一次演讲中，挥舞着一张纸，声称他手上掌握了在国务院工作的"205名已知的共产党员"名单。第二天这个数字变成了"207人"，再后来变成了"57人"，最终事实证明这个所谓"名单"完全是麦卡锡捏造的——他从未提供任何证据证明任何一个他不认识的国务院官员是共产党员。但麦卡锡的策略是极其精明的——他掌握着参议员在参议院发言不受诽谤起诉的法律豁免权（Speech and Debate Clause），他可以发表任何言论而不必为其真实性负责。他有选择地从FBI的档案（通过FBI局长胡佛与麦卡锡的私下合作获得）中泄漏一些被调查的、未被证实的（甚至已被放弃调查的）情报，然后以"绝对肯定"的口气称其为"确认的共产党员"。媒体被他的耸人听闻的指控所吸引——"麦卡锡今天又有惊人的揭露"是各大报纸的头条固定"开场白"。"麦卡锡主义"成为了一个泛称：无证指控、污蔑和恐吓某人"与共产主义有联系"或"同情共产主义"即可摧毁此人的职业生涯和声誉。麦卡锡的触角特别指向国务院、军队、大学、媒体和好莱坞——所有被怀疑"文化精英"（liberal elite）的机构和职业。麦卡锡主义还与对同性恋者的政治迫害交织在一起——"薰衣草恐慌"（Lavender Scare）将"同性恋"等同于"安全隐患"（同性恋者被假定为容易受到苏联敲诈勒索），数千同性恋者被联邦政府开除或不予录用。1954年春，麦卡锡的嚣张走到了顶点——他开始调查美国陆军中"共产主义的渗透"，并以他典型的粗暴蛮横的方式在电视摄像机前审讯美国陆军的将军和律师。陆军-麦卡锡听证会（Army-McCarthy Hearings，1954年4月至6月）是全国电视首次直播的国会听证会之一。在屏幕上，美国公众第一次亲自看到麦卡锡的言行——他的粗鲁、不实和恶霸作风在屏幕上暴露无遗。陆军首席律师约瑟夫·韦尔奇（Joseph Welch）在听证会上对麦卡锡说出那句击穿其政治的著名斥责——"尊敬的先生，难道您最终连一丝体面都没有了吗？"（Have you no sense of decency, sir, at long last?）——这句话在全国电视面前的杀伤力是致命性的。参议院于1954年12月2日以67票对22票正式"谴责"（censure）麦卡锡的不当行为——虽然并非弹劾或开除（麦卡锡保留参议员席位直到1957年去世），但政治生命已死。麦卡锡主义虽以麦卡锡本人的倒台为终点，但反共调查和忠诚清洗的制度性遗产在此后持续了多年——黑名单（Hollywood Blacklist）直到1960年代才被打破。麦卡锡主义的教训——民主制度在面对内外部安全威胁时，以安全之名剥夺个人权利和正当程序的诱惑力是巨大的，也是危险的。',
  significance: '麦卡锡主义是美国现代史上最臭名昭著的"猎巫"式的政治迫害运动。它说明了在国家安全恐慌时期，民主制度的"正当程序"和"思想自由"防线是如何脆弱。被麦卡锡毁掉职业生涯的数以千计的公务员、外交官、教师和艺术家的命运成为了美国自由社会的反面教训。"麦卡锡主义"一词因此成为一个通用词汇——在任何语言和上下文中，形容"以无中生有的指控和恐吓进行政治迫害"的行为。',

  tags: ['麦卡锡', '反共', '猎巫', '红色恐慌', 'HUAC', '黑名单', '薰衣草恐慌']
});
