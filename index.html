  summary: '1949年1月杜鲁门总统在国情咨文中提出的国内改革纲领。试图将罗斯福新政的社会保障体系进一步扩展——全民医疗保险、扩大社会保障覆盖面、联邦公共住房计划、提高最低工资和废除《塔夫脱-哈特莱法》（即反工会法）。由于国会保守联盟（南方民主党+共和党）的阻碍，公平施政的大部分改革计划未能通过。',
  detail: '1945年4月杜鲁门在罗斯福突然去世后接任总统，面临着从战时经济向和平经济过渡的艰巨挑战——1946年全国性罢工浪潮（约450万工人参加了罢工，铁路和煤矿行业的罢工最为严重）和战后通胀飙升（1946-1947年物价上涨约25%）动摇了杜鲁门初期的声望。1948年总统大选中，杜鲁门在几乎所有人都预测他必败的情况下（《芝加哥论坛报》甚至提前印好了"杜威击败杜鲁门"DEWEY DEFEATS TRUMAN的头条标题），以"公平施政"（Fair Deal）——新政改革的深化和扩展——为纲领进行了热烈的竞选巡回（"向他们（共和党-国会）投去地狱"Give \'em Hell, Harry），令人震惊地击败了共和党候选人托马斯·杜威。1949年1月5日国情咨文是"公平施政"的正式宣言。核心改革提案——全民医疗保险（National Health Insurance，以英国国民医疗服务体系NHS为参照，但因美国医学会AMA的强烈反对——"社会主义医疗"的红色诱饵——而在国会遭到封杀，至今美国仍然是发达国家中唯一没有全民医保的国家。但杜鲁门在这一领域的失败为后来的医疗保障改革——1965年医疗照顾Medicare和医疗补助Medicaid及2010年平价医疗法案——奠定了基础和"必须克服的特殊利益集团阻力"的重要教训）。扩大社会保障至当时未覆盖的数百万美国人（农业工人、家务工人和零工工人）。联邦公共住房计划的扩大（1949年《住房法》通过，但拨款被大幅削减）。提高最低工资（从每小时40美分提高至75美分，1950年通过）。废除《塔夫脱-哈特莱法》（Taft-Hartley Act，1947年由共和党控制的国会在杜鲁门否决后被推翻而成为法律，该法严重限制了工会的罢工权、禁止"关闭工厂"（closed shop）式的工会强制加入制度以及要求工会领袖签署反共宣誓书——工会必须证明其领导人不是共产党员才能享有集体谈判权）。公平施政的通过率远低于新政——主要成就仅限于1950年最低工资提高、社会保障覆盖面的适度扩大和公共住房拨款（尽管被大打折扣）。失败的最根本原因是国会中的"保守联盟"（Conservative Coalition，由南方保守民主党——在种族隔离问题上的自由主义倾向使他们随时可以和共和党结盟——以及北部和中西部共和党组成）能有效阻止任何具有"社会主义色彩"的扩张性社会政策。但公平施政作为纲领的功能不应被忽视——它为整个1950年代美国自由主义提供了一份"待办事项清单"，其中的许多项目在1960年代的"新边疆"和"伟大社会"中被捡起并以更大的规模得以实现。',
  significance: '杜鲁门公平施政在立法成就上远不如新政，但它在意识形态上继承了新政的自由主义精神并第一次将"全民医保"提上了美国政治议程（虽然至今未实现）。公平施政的失败说明了美国政治体系中总统改革纲领与保守国会联盟之间的结构性张力——这一张力在此后历届民主党总统（肯尼迪、约翰逊、克林顿、奥巴马）的任期内反复出现（"伟大社会"是少数例外，因为它利用了1964年压倒性选举胜利后暂时的巨大国会多数）。',
  related: ['new-deal', 'great-society', 'medicare-medicaid', 'taft-hartley'],

  date: '1964-05-22', end_date: '1969-01-20', region: 'americas', category: 'domestic', treeBranch: '美国内政与总统纲领',
  summary: '1964年约翰逊总统提出的全面社会改革纲领——以"向贫困宣战"（War on Poverty）和"消除种族不公正"为核心，建立了医疗保险（Medicare）、医疗补助（Medicaid）、联邦教育援助、《投票权法》、公平住房和移民改革等近200项立法，是自新政以来美国联邦政府角色最剧烈的扩张。但"伟大社会"在社会福利上的扩张最终被越南战争的巨大开支和全国性骚乱所部分瓦解。',
  detail: '林登·约翰逊（1963年11月22日在达拉斯接替被暗杀的肯尼迪）以他无与伦比的国会操作手腕（在担任参议院多数党领袖期间的"约翰逊待遇"——一对一的身体接触和赤裸裸的压力威胁）和1964年以压倒性胜利（61%的普选票）击败巴里·戈德华特的"新政自由主义的大获全胜"为后盾，在1964至1966年的第89届国会中推动了美国历史上规模最庞大的社会改革立法浪潮。"伟大社会"的核心立法成就——1965年《医疗保险（Medicare）和医疗补助（Medicaid）法》：Medicare为65岁以上的老年人提供以医院保险和补充医疗保险为形式的联邦医疗保险；Medicaid为特定类别的贫困人口（特别是贫困的单亲母亲、儿童和残障人士）提供联邦-州各出一半资金的医疗保险。这两项在罗斯福和杜鲁门时代都未能通过的改革在约翰逊手中实现了——老年人贫困率在此后数十年间大幅下降。1965年《中小学教育法》：首次联邦大规模直接资助公立学校的教育经费（通过Title I——"补偿贫困学生的教育不足"）——这一突破了联邦主义传统（教育历来是"州/地方事务"）的立法为后来的联邦教育角色扩张奠基。1965年《投票权法》（Voting Rights Act）：在民权运动的巨大压力（"血腥星期日"——1965年3月7日塞尔玛游行——阿拉巴马州警察在埃德蒙·佩特斯桥上残酷殴打和平抗议者的画面在全国电视上播出——约翰逊在国会联席会议上以"We Shall Overcome"——民权运动的战歌——作为演讲结尾）后，该法彻底清除了美国南方各州自重建时期结束以来(1877年)用以剥夺非裔美国人投票权的"识字测试"、"人头税"和"祖父条款"等制度性障碍，并规定联邦监督（preclearance，预先批准制度）南方各州任何改变选举法的行为。（这一"预先批准"制度直到2013年谢尔比县诉霍尔德案的联邦最高法院裁决中被认为是过时的而被废除。"投票权"从纸面到实践的真正落地是民权运动的最实质性成就之一。）1965年《移民与国籍法》（Hart-Celler Act）：废除了1924年以来以国籍为基础的"移民配额制度"（该制度严重偏向西北欧白人移民，几乎不给亚洲、非洲和拉丁美洲的移民分配额），代之以以家庭团聚和职业技能为基础的"全球性"移民制度——在长远上彻底改变了美国的族裔面貌——1965年以后移民的来源地从约70%欧洲转变为约50%拉丁美洲+25%亚洲（这是创作该法的自由派参议员（如泰德·肯尼迪）也未曾预料到的后果）。1968年《公平住房法》（Fair Housing Act）：禁止在住房租赁和买卖中的种族、宗教和国籍歧视（以马丁·路德·金被暗杀后的全国性暴乱中在悲痛和愤怒中于4月仓促通过为政治契机）。"向贫困宣战"——经济机会办公室（OEO，1964年）：各种社区行动计划（Community Action Programs，包括"早期开端"Head Start学前教育、职业培训Upward Bound、法律服务和社区医疗中心）。约翰逊任内官方贫困率从约22%（1959年）降至约13%（1968年）——贫困人口在四年多的功夫内下降了近一千万。然而，"伟大社会"在巅峰时已经被两个毁灭性的因素所吞没——越南战争的不断升级（1965-1968年，军费开支从1965年的约500亿美元飙升至1969年的约825亿美元），吞噬了本可投资于社会项目的联邦财政预算。同时1964至1968年间在美国北方城市（哈莱姆/纽约、瓦茨/洛杉矶、底特律、纽瓦克等以非裔美国人聚居区为核心的"漫长的炎热的夏天"——1967年"漫长炎热的夏天"）爆发的大规模种族骚乱揭示了"伟大社会"在社会和经济结构性种族主义面前的苍白无力——立法上的平权无法在短期内消除住宅隔离和就业歧视的遗产。约翰逊因越南战争放弃了1968年连任竞选——"伟大社会"的社会改革议程在越战的白热化和国内的深度撕裂中无疾而终。',
  significance: '伟大社会是"美国福利国家"的建立时刻——Medicare、Medicaid、联邦教育援助和投票权法等一系列立法从根本上改变了联邦政府在社会生活领域中的角色。它是新政以来最密集和最大规模的社会改革立法浪潮。"向贫困宣战"将贫困从个人失败重新定义为社会结构性问题——虽然越南战争和1960年代的城市骚乱使扩大的福利国家在政治上失去了支持。"伟大社会和越南战争"的经典矛盾——炮火和福利不可能同时扩张——是此后美国政治的永久性教训。',
  related: ['new-deal', 'vietnam-war', 'civil-rights-movement', 'voting-rights-act', 'war-on-poverty'],
  tags: ['约翰逊', '伟大社会', '民权', 'Medicare', '向贫困宣战', '福利国家']
});

_o('civil-rights-movement', {
  name_zh: '美国民权运动', name_en: 'Civil Rights Movement (1954-1968)',

  summary: '1954年至1968年，以非裔美国人为主体、以非暴力直接行动为主要策略的美国反对种族隔离和种族歧视的社会运动。以布朗诉托皮卡教育委员会案（1954年，宣布公立学校种族隔离违宪）、蒙哥马利巴士抵制运动（1955-56年）、格林斯伯勒静坐（1960年）、自由乘车（1961年）、伯明翰运动（1963年）、向华盛顿进军（1963年）、塞尔玛至蒙哥马利游行（1965年）等一系列标志性事件为里程碑，推动了1964年《民权法》和1965年《投票权法》的通过。运动的精神领袖和策略核心是马丁·路德·金博士（1964年诺贝尔和平奖得主，1968年被暗杀）。',
  detail: '民权运动的"司法启动"——1954年5月17日，联邦最高法院在布朗诉托皮卡教育委员会案（Brown v. Board of Education of Topeka）中以全票一致（9-0票）裁定公立学校的种族隔离"本质上就是不平等"（separate educational facilities are inherently unequal），推翻了1896年"普莱西诉弗格森案"确立的"隔离但平等"（separate but equal）原则。但1955年最高法院在"布朗II"案中将落实速度交给了地方法院——"以应有的迅速速度"（with all deliberate speed）这一极具弹性的措辞导致南方各州拖延了十多年才真正开始废除学校种族隔离。运动的"群众动员"阶段——1955年12月1日，蒙哥马利（阿拉巴马州）黑人女裁缝罗莎·帕克斯（Rosa Parks）拒绝在公共汽车上给白人让座而被逮捕，此事引发了由年仅26岁的牧师马丁·路德·金博士领导的蒙哥马利巴士抵制运动——全蒙哥马利市约4万名黑人群众步行、搭便车和组织"合乘"来坚持抵制巴士长达381天，直到1956年11月最高法院裁决巴士上的种族隔离违宪。抵制运动创造了民权运动的"剧本"——基督教非暴力理念+大规模群众不服从+媒体的灯光（电视和印刷记者报道了南方黑人的尊严和白人至上主义者的暴力之间的道德对比）+司法诉讼。1960年2月1日，四名北卡州格林斯伯勒农业技术大学的大学生坐在沃尔沃斯（Woolworth）的"仅限白人"用餐柜台前要求提供服务——在数周内"学生静坐运动"像野火一样蔓延到了南方约54个城市的午餐柜台、图书馆、公园和游泳池。学生们面对种族主义者的口水、推搡、烫烟头烙在皮肤上、芥末酱和番茄酱从头浇下而坚持不还手——非暴力"以忍受不公来暴露不公"的道德力量在电视屏幕上对北方和中西部白人民众的公共意识影响极大。1961年"自由乘车"——黑白混合的志愿者乘坐公共汽车穿越南方州际公路，测试最高法院在"博因顿诉弗吉尼亚案"（1960年）中已宣布的"跨州汽车终点站的种族隔离违宪"的实际执行。在阿拉巴马州安尼斯顿和伯明翰，他们遭到白人暴徒的野蛮袭击、巴士被燃烧瓶烧毁、被警察"保护性"拘留。司法部长罗伯特·肯尼迪（虽然对民权运动在政治上的"不择时机"感到不耐烦）派出数百名联邦法警（federal marshals）保护自由乘客。1963年伯明翰运动——民权领袖选择"美国种族隔离最严重的城市"伯明翰（那里负责公共安全的"公牛"康纳Eugene "Bull" Connor局长以高压水炮和警犬对付和平游行的儿童——电视上儿童被高压水炮冲击和警犬撕咬的画面令全国和国际震怒）进行了为期月余的游行、静坐和抵制。伯明翰的运动和"公牛"康纳的残暴为民权立法创造了不可抗拒的公众压力。1963年8月28日——"向华盛顿争取就业和自由进军"——约25万黑人白人群众在林肯纪念堂前聚集，金博士发表了"我有一个梦想"（I Have a Dream）的震撼世界的演讲——在美国种族关系史上没有第二个演讲具有如此深刻的变革性力量。1964年《民权法》（Civil Rights Act）由约翰逊总统（利用肯尼迪被暗杀的悲情和自身惊人的国会操作手腕，打破了南方参议员长达两个多月的冗长辩论filibuster）于1964年7月2日签署为正式法律——禁止在公共场合和设施、联邦资助的项目和就业中的基于"种族、肤色、宗教、性别或国籍"的歧视。这是自重建时期以来（1875年民权法）近一个世纪后美国最具深远影响的民权立法。1965年塞尔玛游行和《投票权法》——1965年3月7日（"血腥星期日"Bloody Sunday），约600名黑人在阿拉巴马州塞尔玛的埃德蒙·佩特斯桥被州警察催泪瓦斯和警棍血腥袭击的画面促使约翰逊在8月签署了《投票权法》——终结了南方各州近一个世纪以来剥夺黑人投票权的制度化安排。1968年4月4日，金博士在田纳西州孟菲斯支持黑人环卫工人罢工时被种族主义刺客詹姆斯·厄尔·雷开枪暗杀——他在39岁的年纪以殉道者的身份献祭了自己。金博士被暗杀后，全美超过100座城市爆发了纵火和暴乱——黑人民众的愤怒和绝望在洛杉矶瓦茨、底特律（12街暴乱）和纽瓦克的"漫长的炎热的夏天"中暴露了"依法平权"与"结构性种族不平等"之间的巨大鸿沟——法律上的平等还远远不够。',
  significance: '民权运动是20世纪美国最具影响力的社会运动。它以非暴力的公民不服从策略（根植于甘地主义）和基督教的道德力量，在约十四年间（1954-1968年）推翻了美国南方近一个世纪的"吉姆·克劳"法定种族隔离制度，推动了1964年《民权法》和1965年《投票权法》等里程碑立法的通过。但马丁·路德·金被暗杀（1968年）和此后城市的暴乱也显示了"依法平权"的局限——种族间的结构性经济不平等、住宅隔离和警察暴力在立法通过半个多世纪后仍然是美国社会的未愈伤口。民权运动的最大遗产或许是证明了"社会运动可以改变法律"——这一信念在此后数十年激励了女权运动、同性恋权利运动和移民权利运动等。',
  related: ['great-society', 'voting-rights-act', 'march-on-washington', 'malcolm-x', 'black-power'],
  tags: ['民权运动', '马丁·路德·金', '非暴力', '种族隔离', '布朗案', '民权法', '美国']
});

_o('plaza-accord', {
  name_zh: '广场协定', name_en: 'Plaza Accord',
  date: '1985-09-22', region: 'asia-pacific', category: 'economic', treeBranch: '日本经济崛起',
  summary: '1985年9月22日，美国、日本、西德、法国和英国的财政部长和央行行长在纽约广场酒店召开的秘密会议上达成的协议——联合干预外汇市场，使美元对日元和德国马克有序贬值以纠正美国巨额的贸易逆差。协议签署后的两年内，日元对美元升值了约50%（从1美元兑约240日元升至约120日元），对日本经济产生了深远的结构性冲击——一方面催生了1980年代后期的巨大资产泡沫（"泡沫经济"），另一方面加速了日本跨国公司的全球化和产业升级。',
  detail: '广场协议的背景是1980年代初期美国经济的"双重赤字"（double deficits）——里根政府的减税+大规模国防开支（星球大战SDI和常规军备建设）导致了巨额的联邦预算赤字，与此同时美联储主席沃尔克以极高的利率（联邦基金利率一度超过20%）压缩通胀，强劲的美元（高利率吸引全球资本流入购买美元资产推高汇率）使美国出口竞争力急剧恶化，美国贸易逆差从1980年的约190亿美元飙升至1984年的约1120亿美元。对日逆差尤其严重（日本车、日本电视和日本半导体零件充斥着美国市场——"日本恐慌"Japan Panic在美国公众和国会中蔓延，国会多次提出对日本进口汽车和电子产品加征惩罚性关税的保护主义议案）。1985年9月22日，G5（五国集团，美日德法英）的财政部长和央行行长在纽约中央公园南侧的广场酒店（Plaza Hotel）举行秘密会议，达成了"广场协议"——各方一致认为"美元汇率被高估"，将协调干预外汇市场以使美元对日元和德国马克有序贬值。具体操作——各国央行在外汇市场上大量卖出美元、买入日元和德国马克（大规模的联合干预——数日内交易额达数十亿美元——是信号效应，调整的主要驱动力是私人市场在政府政策和干预信号后的跟风调整）。效果预期远超"适度调整"——从1985年9月到1987年2月（卢浮宫协议Louvre Accord签署以稳定汇率，因美元已贬值过多），美元对日元从1美元兑约240日元跌至约150日元（到1988年甚至触至约120日元），贬值了约50%。日元的大幅"被迫升值"——"日元升值萧条"（endaka fukyō/円高不況）：日本出口制造业在以日元计价的出口价格的竞争力短期内急剧下降，特别是中小企业集中的汽车零部件、纺织和造船行业。日本银行（日本央行）为了应对升值带来的经济衰退压力，采取了极度宽松的货币政策——将官方贴现率从1985年的5%连续大幅削至1987年的2.5%（日本史上最低水平），释放了巨量的廉价流动性。这些资金没有大量进入实体经济（因制造业已经过剩且国内需求不振），而是大量流入了房地产和股票市场——"只要土地价格和股票价格永远上涨"的集体信仰推动日本进入了泡沫经济（Bubble Economy）：日经平均股价从1985年的约1.3万点飙升至1989年12月29日的3.89万点（至今未被超越的最高值），东京皇居周边一平方公里的地价据说相当于整个加利福尼亚州的土地价格，"日本收购美国"——三菱地所收购纽约的洛克菲勒中心、索尼收购了哥伦比亚影业等——引发了美国的另一轮"日本恐慌"（这次是日本买下美国的恐惧）。1990年泡沫破灭后，日本进入了"失去的十年"（后证实是二十年甚至三十年）——股市和房地产价格暴跌，大量银行不良债权（政府估计约100万亿日元但可能远超此数）导致金融系统半瘫痪，通货紧缩和停滞的恶性循环使日本至今的通胀和增长率仍处于极低水平。但广场协定也加速了日本经济结构转型的正面效应：日本跨国公司将大量劳动密集型生产转移至东南亚（特别是泰国和印度尼西亚）（"雁形模式"Flying Geese的扩展），中国成为下一个"世界工厂"之前，日本是带动东南亚工业化的核心资本和技术来源；日本企业被迫在汽车和电子领域进一步"精益求精"并攀登价值链（从平价车到高端品牌——雷克萨斯Lexus和讴歌Acura在1980年代末相继诞生）。',
  significance: '广场协议是国际经济政策协调史上的经典案例——五国联合干预外汇市场的"成功"（从纠正贸易失衡的角度）却出人意料地催生了人类历史上最大的资产泡沫之一（日本泡沫经济1985-1990年），以及日本此后延续至今的经济停滞。广场协议常被引为关于"宏观政策协调的非意图后果"的教科书案例——纠正一个不平衡（贸易逆差）可能引发远为危险的其他不平衡（资产泡沫和"资产负债表衰退"）。对日本而言，广场协议是"战后经济奇迹"和"泡沫与停滞"之间的分水岭——"Japan as Number One"的自信从此被数十年通货紧缩的苦闷取代。',
  related: ['bretton-woods', 'nixon-shock', 'japan-miracle', 'asian-tigers'],

  detail: '北约成立的背景是1947-1948年冷战格局迅速固化——苏联巩固了对东欧的控制（"苏联封锁"式的卫星国化）、捷克斯洛伐克的"二月政变"（1948年2月共产党在苏联支持下夺取了完全政权）、苏联对柏林的封锁（1948年6月-1949年5月）等一系列事件使西欧各国对苏联的军事威胁的担忧急剧上升。英国外交大臣欧内斯特·贝文（Ernest Bevin）在1948年1月的外交演说中提出了建立"西欧联盟"的倡议——"西欧国家必须在安全领域形成一个集体防御的联合体"。1948年3月17日，英法荷比卢五国在布鲁塞尔签署了《布鲁塞尔条约》（布鲁塞尔条约组织——后来在1954年扩展为西欧联盟WEU）。但西欧诸国清醒地认识到，没有美国的军事力量参与，"西欧联盟"在苏联庞大的常规力量面前只是"玻璃城堡"。1948年6月美国参议院通过了《范登堡决议案》，允许美国在和平时期与美洲以外的国家缔结军事同盟——这是美国外交政策从华盛顿告别演说以来的"不结盟"和孤立主义传统的一次决定性逆转。1949年4月4日，12个创始国——美国、加拿大、英国、法国、意大利、荷兰、比利时、卢森堡、丹麦、挪威、冰岛和葡萄牙——在华盛顿签署了《北大西洋公约》。公约第5条——"缔约各方同意，对在欧洲或北美之一个或数个缔约国之武装攻击，应视为对缔约国全体之攻击。"发动集体自卫权的语言相比后来的华约更具弹性和留有政治判断空间——"每一个缔约国将采取其认为必要的行动，包括使用武装力量，以恢复和维持北大西洋区域之安全"（"其认为必要"的措辞保留了各国宪法对宣战权的限制）。在冷战时期（1949-1991年），第5条事实上从未被触发。与之相对，核威慑下的"延伸威慑"（extended deterrence）——美国以其核武库和常规力量为西欧盟国提供的安全保障——和"前沿防御"（forward defense）在中欧特别是在西德（"铁幕"的"最前线国家"）的数十万美军和盟国军队的常驻，以及常规力量与战术核武器相结合的"灵活反应"战略，构成了北约实际运作的核心。1952年希腊和土耳其加入；1955年西德加入（西德加入北约是华沙条约成立的直接触发原因）；1982年西班牙加入。冷战时期北约内部反复出现的主要张力——A) 美国与（尤其法国戴高乐时代的追求"战略独立"的）欧洲盟友之间的核战略和"延伸威慑"的可信度争议；B) 北约军费分担争议——欧洲国家（西德和英国除外）长期军事开支不足（依赖美国"搭便车"free-riding的批评自艾森豪威尔时代以来即存在）；C) 1966年法国退出北约的"军事一体化指挥结构"（但保留为政治成员——"空椅子"但仍在俱乐部内，直到2009年才重新加入该司令部），北约总部被迫从巴黎迁至布鲁塞尔。冷战结束后北约不仅没有解散（它被创造的"威胁"——苏联和华约——消失了），反而是通过"转型"而存续了下来——1990年代北约从"对苏集体防御"转向"危机管理和维和行动"（波斯尼亚1995年、科索沃1999年——北约历史上首次在没有联合国安理会授权的情况下对一个主权国家使用武力）、"反恐"（2001年9·11事件后北约历史上首次也是唯一一次触发了第5条——"对美国的武装攻击被视为对所有北约国家的攻击"）和"扩大"——1999年以来的多轮东扩使原华约成员国波罗的海三国和前苏联的立陶宛、拉脱维亚和爱沙尼亚加入北约，引发了俄罗斯的强烈反对，是21世纪俄罗斯与西方关系破裂的最重要结构性因素之一（北约是否"承诺过不东扩"——1990年德国统一谈判期间的口头承诺是否具有约束力——是至今充满争议的历史和法律问题）。',
  significance: '北约是20世纪最成功和最持久的军事同盟。在冷战时期，它为西欧提供了长达40年的"安全伞"，使西欧各国能将资源集中在经济重建和一体化上，而无需各自维持一支能够独立对抗苏联的军队。"集体防御"（第5条）的威慑效应被认为是冷战"长和平"（long peace）——虽然代理人战争遍布全球但美苏从未直接在欧洲交锋——的关键结构性原因之一。冷战后北约的"存续和转型"是国际组织理论中"制度惯性"和"功能转化"的经典案例。北约东扩的"安全困境"——从西方视角看是"扩展民主和安全区"，从俄罗斯视角看是"背信弃义的包围"——是后冷战时代欧洲安全秩序至今未解决的根本争议。',

name_zh:`共产党情报局`,name_en:`Cominform / Communist Information Bureau`,date:'1947-09-27',end_date:'1956-04-17',region:'soviet',category:'organization',treeBranch:`东欧格局`,
summary:`1947年9月由苏联、东欧六国及法、意九国共产党和工人党在波兰成立的国际联合组织。是苏联对马歇尔计划的回应，旨在协调各国共产党的行动以对抗西方冷战政策，实质上是苏联加强对东欧各国共产党控制的工具。`,
detail:`1947年9月22日至27日，在波兰西南部西里西亚的什克拉尔斯卡-波伦巴（Szklarska Poręba）举行了欧洲九国共产党和工人党代表会议。出席会议的有苏联、波兰、捷克斯洛伐克、匈牙利、罗马尼亚、保加利亚、南斯拉夫、法国和意大利的共产党和工人党代表。会议由苏共中央书记日丹诺夫（Andrei Zhdanov）主导。9月27日会议正式决定成立"欧洲共产党和工人党情报局"（Communist Information Bureau，简称Cominform）。日丹诺夫在会上发表了著名的"两个阵营"演说——宣称战后世界已分裂为以美国为首的"帝国主义反民主阵营"和以苏联为首的"反帝国主义民主阵营"，各国共产党必须在苏联领导下团结一致反对"美帝国主义及其走狗"的扩张。情报局总部最初设在贝尔格莱德（南斯拉夫），后因1948年苏南冲突于6月迁至布加勒斯特（罗马尼亚）。情报局的主要活动——出版机关刊物《争取持久和平，争取人民民主！》（For a Lasting Peace, For a People\'s Democracy!），以多种语言发行；协调各国共产党的宣传和意识形态工作；组织对"铁托主义"、"右倾机会主义"和"民族主义偏向"的批判运动。1948年6月情报局在布加勒斯特召开第三次会议，在南斯拉夫共产党（南共）代表未与会的情况下，根据苏共的授意通过了《关于南斯拉夫共产党状况的决议》，将南共开除出情报局，指控铁托领导集团"走上了脱离反帝国主义社会主义统一阵线的道路"、"背叛了国际主义"和"滑向资产阶级民族主义"。此后东欧各国党内发起了大规模的政治清洗——以"铁托分子"、"西方间谍"和"民族主义分子"的罪名清洗了大量党内高级干部（如匈牙利的拉伊克Rajk、保加利亚的科斯托夫Kostov、捷克斯洛伐克的斯兰斯基Slánský等被审判和处决）。1956年4月17日，在赫鲁晓夫"解冻"和改善与南斯拉夫关系的背景下，情报局正式解散。情报局的存在（约8年半）在冷战初期起到了协调各党对抗马歇尔计划和北约的作用，但其更主要的作用是成为苏联清洗东欧共产党内部"不可靠分子"和强制推行斯大林模式的理论和政治工具，严重破坏了东欧各国共产党的独立性和各国间的正常关系。`,
significance:`共产党情报局是冷战初期苏联控制东欧各国共产党的核心制度工具，是马歇尔计划和杜鲁门主义在意识形态战线的对应物。1948年开除南斯拉夫的决议标志着国际共产主义运动中第一次重大的正式分裂（苏南冲突），此后东欧各国的大规模党内清洗（以"铁托分子"罪名）导致了大量干部被处决，严重削弱了东欧共产党的社会基础和执政能力。情报局既是苏联对东欧的政治控制机制，也是加速冷战意识形态分裂的重要推手。`,
related:['marshall-plan','comecon','warsaw-pact','tito-stalin-split','truman-doctrine'],
tags:['冷战','情报局','苏联','东欧','日丹诺夫','清洗']});

_o('tito-stalin-split',{
name_zh:`苏南冲突`,name_en:`Tito-Stalin Split / Soviet-Yugoslav Split`,date:'1948-06-28',end_date:'1955-05-26',region:'soviet',category:'crisis',treeBranch:`东欧格局`,
summary:`1948年6月共产党情报局将南斯拉夫共产党开除，标志着南斯拉夫领导人铁托与苏联领导人斯大林之间的全面决裂。这是国际共产主义运动内部第一次重大分裂，南斯拉夫成为第一个脱离苏联阵营并探索"自主社会主义道路"的东欧国家。`,
detail:`苏南矛盾可追溯至第二次世界大战期间——铁托领导的南斯拉夫游击队（Partisans）基本依靠自身力量解放了南斯拉夫（与波兰、捷克斯洛伐克等主要由苏联红军解放的国家不同），这使得铁托在国内拥有独立于苏联的强大政治和军事基础，不愿对莫斯科俯首帖耳。具体矛盾和导火索——的里雅斯特（Trieste）领土归属问题：铁托要求将的里雅斯特和周边地区纳入南斯拉夫，但斯大林在1945年与西方的谈判中对此问题做出了让步（最终1947年和约将的里雅斯特设为"自由区"），铁托对此公开表示不满，发表了批评"大国"（暗指苏联）的演说，斯大林将此视为不可容忍的"独立姿态"。巴尔干联邦问题：铁托和保加利亚领导人季米特洛夫（Dimitrov）讨论建立一个包括南斯拉夫、保加利亚、阿尔巴尼亚（可能还有希腊和罗马尼亚）的"巴尔干联邦"或"巴尔干-多瑙河联邦"。斯大林最初支持这一构想，但当他发现铁托可能成为这一联邦的主导者（从而在南欧建立一个不完全从属于莫斯科的权力中心）时，态度急剧转变。1948年2月斯大林召见南斯拉夫和保加利亚代表到莫斯科，严厉训斥了铁托和季米特洛夫，要求他们停止一切未经莫斯科批准的外交行动。经济控制和间谍渗透：苏联试图通过"联合公司"控制南斯拉夫经济（如南苏联合航空公司和南苏联合多瑙河航运公司），南斯拉夫方面认为这些安排严重不平等。苏联还大量招募南斯拉夫公民（包括一些高级官员）为苏联情报机构工作，铁托将此视为对其政权的颠覆活动。1948年3月苏联突然从南斯拉夫撤出全部军事顾问和文职专家，随后苏共中央与南共中央之间展开了一系列措辞尖锐的信件交锋——苏共指控南共领导"反苏"、"托洛茨基主义倾向"和"对苏联专家进行监视"，南共坚决否认并拒绝出席情报局会议。1948年6月28日，情报局第三次会议通过了《关于南斯拉夫共产党状况的决议》，开除南共，指控铁托集团推行"反马克思主义、反列宁主义和反苏"的政策并"滑向资产阶级民族主义"。铁托在随后召开的南共五大上获得全党压倒性支持（只有极少数人支持情报局决议），南斯拉夫从此脱离苏联阵营。经济封锁——1949年起苏联和东欧国家全面中断与南斯拉夫的经济贸易关系（南斯拉夫外贸约50%瞬间消失）。铁托转而寻求与西方有限的经济合作（但并未加入北约）。南斯拉夫在国内进行了"工人自治"（workers' self-management）实验——企业由工人委员会管理而非国家计划——这是对苏联模式的第一次重大偏离，后来成为"南斯拉夫模式"的核心特征。斯大林于1953年去世后，赫鲁晓夫于1955年5月访问贝尔格莱德，向铁托"道歉"，承认1948年的指控是"贝利亚等人编造的"，双方恢复了党的关系（但南斯拉夫保持独立，未重新加入社会主义阵营）。1956年情报局正式解散。`,
significance:`苏南冲突是国际共产主义运动中的第一次重大分裂——首次证明一个国家可以在共产党领导下脱离苏联控制而存在。铁托的"不结盟"选择为后来1955年万隆会议和不结盟运动的兴起提供了重要的理论和实践先例。"工人自治"实验是传统苏联计划经济模式以外的第一个系统的社会主义经济体制替代方案。1948年决裂后的东欧党内大清洗（以"铁托分子"罪名迫害"民族主义分子"）深刻创伤了东欧各国的共产党组织。`,
related:['cominform','comecon','warsaw-pact','bandung-conference','non-aligned-movement'],
tags:['苏南冲突','铁托','斯大林','南斯拉夫','不结盟','工人自治']});

_o('khrushchev-reforms',{
name_zh:`赫鲁晓夫改革与苏共二十大`,name_en:`Khrushchev\'s Reforms and the 20th Party Congress`,date:'1956-02-14',end_date:'1964-10-14',region:'soviet',category:'domestic',treeBranch:`苏联合集`,
summary:`1956年2月苏共二十大召开，赫鲁晓夫发表秘密报告批判对斯大林的个人崇拜，揭开"去斯大林化"序幕。同年提出"三和路线"（和平共处、和平竞赛、和平过渡）的外交新方针。在内政方面推行农业改革、工业管理分权和法制恢复等一系列改革（"解冻"）。1964年10月被政变推翻。`,
detail:`1953年3月斯大林去世后，经过三年的权力斗争（先后清除贝利亚Beria——1953年12月被处决，击败马林科夫Malenkov——1955年辞去部长会议主席），赫鲁晓夫于1956年初巩固了党内最高权力。1956年2月14日至25日，苏联共产党第二十次代表大会在莫斯科召开。2月25日凌晨（大会正式议程已结束），赫鲁晓夫在闭门会议上向与会代表发表了长达约四个小时的《关于个人崇拜及其后果》的秘密报告。报告以大量此前被严格封锁的档案材料为依据，详细揭露了斯大林在1934-1953年间（特别是"大清洗"时期——1936-1938年）大规模逮捕、酷刑逼供和处决党内高级干部和红军将领的恐怖行径，将这一切归咎于斯大林的"个人崇拜"和对"社会主义法制"的破坏。秘密报告在苏联社会内部和整个国际共产主义运动中引发了地震般的冲击——约700万古拉格政治犯被释放并"平反"；斯大林格勒更名为伏尔加格勒（1961年）；斯大林的遗体被从列宁墓移出（1961年）；"解冻"（Thaw/Оттепель）成为赫鲁晓夫时代的文化政治标签——文学和艺术领域出现了一定程度的解放（如索尔仁尼琴的《伊凡·杰尼索维奇的一天》被允许出版，1962年）。"三和路线"——在二十大上赫鲁晓夫同时提出了苏联外交政策的三个核心原则：和平共处（不同社会制度国家可以而且必须和平共处）、和平竞赛（社会主义与资本主义之间以经济竞赛而非战争来决定谁的制度更优越）、和平过渡（各国共产党可以通过议会斗争和和平方式取得政权，不一定非要通过暴力革命和内战）。"三和路线"是对斯大林"资本主义总危机"和"战争不可避免"理论的重大修正，标志着苏联外交从全面对抗走向有限的"缓和"姿态。内政改革——农业：大规模开垦荒地（"处女地运动"Virgin Lands Campaign，在哈萨克斯坦和西伯利亚开垦了约4200万公顷草原）；废除农产品义务交售制度；提高农产品收购价格；但玉米种植运动（不顾气候条件强令全国各地种植玉米）最终成为笑柄。工业管理：1957年废除中央工业部体制，将工业管理权下放到新成立的"国民经济委员会"（Sovnarkhoz，地区经济委员会），试图打破部门壁垒——但导致了地方主义和混乱。住房：大规模建设预制板楼房（"赫鲁晓夫楼"Khrushchevka），虽然质量低劣但在短期内为数百万人提供了独立住房（摆脱了"公共宿舍"Kommunalka）。法制恢复：修改刑法，限制克格勃的任意逮捕权，废除"人民公敌"概念。1964年10月14日，当赫鲁晓夫在黑海度假时，苏共中央主席团（政治局）发动了"宫廷政变"——勃列日涅夫、波德戈尔内和谢列平等联合推翻了赫鲁晓夫，指控他"主观主义和唯意志论"、农业失败、外交冒险主义（古巴导弹危机使他在党内威信扫地）。赫鲁晓夫被软禁（未受审判），于1971年去世。`,
significance:`苏共二十大和赫鲁晓夫的秘密报告标志着苏联历史的根本转折——"去斯大林化"粉碎了斯大林的神话，开启了苏联体制的第一次系统性改革尝试。但秘密报告在东欧引发的冲击波直接催生了1956年波匈事件（波兰和匈牙利的反苏动乱），在西方共产主义运动中引发了大规模退党和意识形态危机（"欧洲共产主义"的兴起）。"三和路线"为1960年代的冷战"缓和"（détente）奠定了理论基础。赫鲁晓夫改革虽然充满矛盾且最终以他被推翻告终，但它证明了"后斯大林时代"的苏联体制是可以被改革的——这一经验在20多年后戈尔巴乔夫的改革中被重新拾起。`,
related:['hungarian-revolution-1956','prague-spring','gorbachev','cuban-missile-crisis','destalinization'],
tags:['苏联','赫鲁晓夫','去斯大林化','三和路线','秘密报告','解冻']});

_o('helsinki-final-act',{
name_zh:`赫尔辛基最后文件`,name_en:`Helsinki Final Act / Helsinki Accords`,date:'1975-08-01',region:'europe',category:'treaty',treeBranch:`冷战缓和`,
summary:`1975年8月1日欧洲安全与合作会议（欧安会CSCE）35个与会国在芬兰赫尔辛基签署的最后文件。确认了战后欧洲边界不可侵犯的原则（苏联的核心诉求），同时将"人权和基本自由"纳入东西方关系的正式议程（西方的核心诉求），是冷战缓和（détente）的最高成就之一。`,
detail:`欧安会的倡议最早由苏联在1954年提出（苏联的目的是通过全欧安全会议确认二战后欧洲的政治和领土现状——即合法化苏联对东欧的控制和战后边界），西方长期冷淡应对。1969年尼克松政府上台后推行缓和（détente）政策，勃兰特的"新东方政策"为全欧对话创造了条件。1972年芬兰提议在赫尔辛基召开筹备会议。会议分三个阶段——外长会议（1973年7月赫尔辛基）、专家委员会（1973-1975年日内瓦，起草具体条款的艰苦谈判）、首脑峰会（1975年7月30日至8月1日赫尔辛基）。参加国包括全部欧洲国家（阿尔巴尼亚除外）以及美国和加拿大，共35国。1975年8月1日首脑（包括勃列日涅夫、福特、威尔逊/卡拉汉等）签署了《欧洲安全与合作会议最后文件》（并非国际条约，而是政治承诺，不具有法律约束力——这是关键点）。文件包含广为流传的"四个篮子"（Four Baskets）：第一篮子——欧洲安全问题：确认"边界不可侵犯"原则（所有欧洲国家的边界，包括战后苏联与波兰之间的奥得河-尼斯河线和两个德国之间的边界，不得以武力改变），但允许"边界可以通过和平方式和协议加以改变"（这为1990年德国统一保持了法律上的可能性）；各国承诺放弃以武力威胁或使用武力；建立"信任建立措施"（CBMs）——提前通知大规模军事演习（超过25000人）并邀请观察员。第二篮子——经济、科技和环境合作：推动东西方贸易和工业合作，降低贸易壁垒。第三篮子——人道主义合作和人员接触：这是西方在谈判中插入的最重要也最具深远影响的条款——各国承诺促进人员、信息和文化的自由交流；便利家庭团聚和跨国婚姻；改善外国记者和广播的工作条件；允许自由获取和传播信息。第四篮子——后续会议：定期召开后续会议以检查执行情况（1977-78年贝尔格莱德、1980-83年马德里、1986-89年维也纳）。苏联和东欧国家将第一篮子（边界不可侵犯的确认——这是战后苏联最梦寐以求的外交目标之一）视为重大胜利：西方终于以书面形式承认了二战后欧洲的领土现状。但第三篮子（人权条款）被苏联低估了——在勃列日涅夫看来，人权条款只是没有约束力的空文，不会真正威胁到苏东体制。然而，人权条款给了苏联和东欧的持不同政见者一个极其重要的工具——他们可以根据本国政府签署的赫尔辛基最后文件（公开发表在各签字国官方媒体上）来要求政府履行其在人权方面的国际承诺。1976年莫斯科赫尔辛基观察小组（Moscow Helsinki Watch Group）成立，随后华沙、布拉格等地也出现了类似的赫尔辛基监督组织。赫尔辛基"人权网络"成为1980年代东欧公民社会运动（包括波兰团结工会和捷克七七宪章运动）的国际法律和政治支撑框架。从这个意义上说，赫尔辛基最后文件在不经意间成为了"和平演变"东欧体制的重要催化剂——苏联得到了边界承认的"短期红利"，但付出了人权话语侵蚀体制合法性的"长期代价"。1994年欧安会改名为欧洲安全与合作组织（OSCE），至今仍在运作。`,
significance:`赫尔辛基最后文件是冷战缓和的"交易典范"——苏联获得边界不可侵犯的承认，西方将人权纳入东西方议程。其历史意义远超当时的评价——第三篮子的人权条款为苏联和东欧的持不同政见者提供了合法化其活动的国际法依据，"赫尔辛基观察小组"网络成为1980年代东欧公民社会运动的重要支柱。赫尔辛基进程的长期效应验证了"以接触促改变"策略（接触而非孤立可以更有效地渗透封闭体制）的有效性。`,
related:['brandt-ostpolitik','detente','solidarity-movement','prague-spring','gorbachev'],
tags:['赫尔辛基','欧安会','缓和','边界不可侵犯','人权','CSCE']});

_o('star-wars-sdi',{
name_zh:`星球大战计划（战略防御倡议）`,name_en:`Strategic Defense Initiative (SDI) / Star Wars`,date:'1983-03-23',end_date:'1993-05-13',region:'americas',category:'plan',treeBranch:`冷战军备竞赛`,
summary:`1983年3月23日美国总统里根在电视讲话中提出的太空导弹防御计划。目标是开发和部署以太空为基地的武器系统（激光、粒子束和动能拦截器），在苏联核导弹飞行的各个阶段进行拦截，使核武器"失去作用且被淘汰"。该计划在技术上从未实现但成功加剧了苏联经济-军事的过度扩张。`,
detail:`1983年3月23日晚，里根在白宫椭圆形办公室向全美发表电视讲话。在讲话后半部分，他偏离了原定的常规安全政策议程，提出了一个戏剧性的愿景——"我呼吁我国的科学界——那些给了我们核武器的人们——现在将他们伟大的才能转向人类和世界和平的事业，给我们一种使这些核武器失去作用且被淘汰的手段。"他宣布启动"全面和有力的努力，以制定一项长期研究和发展计划，开始实现我们的最终目标——消除战略核导弹带来的威胁。"这项计划被正式命名为"战略防御倡议"（Strategic Defense Initiative, SDI），但媒体和公众迅速地将其戏称为"星球大战"（Star Wars，源自1977年的电影）。SDI的核心构想——以部署在太空的定向能武器（激光、粒子束）和动能拦截器（"智能卵石"Brilliant Pebbles——数以千计的小型太空拦截器），在弹道核导弹飞行的助推段、中间段和末段进行多层次拦截。理想状态下，SDI将形成一个"天穹之盾"，使苏联的洲际弹道导弹（ICBM）无法突破美国的防御。科学可行性的巨大争议——大多数独立科学家和工程师（包括许多为国防部提供咨询的专家）认为SDI在技术上极不可能实现——任何太空防御系统都可以被更便宜的反制措施（增加弹头数量、使用假弹头、在助推段之前发射等）轻易击败。批评者创造了SDI的另一个讽刺性缩写——"Strategic Defense Illusion"（战略防御幻觉）。然而，SDI更重要的影响在于战略和心理层面——苏联领导层（尽管他们公开嘲笑SDI"不可行"）对SDI的潜在可行性感到极度恐惧。苏联深知自己在微电子、计算机、传感器和太空技术领域远远落后于美国——如果美国在这些领域投入数千亿美元，苏联可能面临着被迫跟进进行其根本无法承受的军备竞赛。事实上，许多历史学家认为里根政府的真实目的（至少部分决策者的目的）正是利用SDI将苏联拖入一场以美国的优势领域进行的不对称军备竞赛——在经济上压垮苏联。SDI也成为了1985-1986年戈尔巴乔夫与里根在日内瓦和雷克雅未克峰会上最核心的障碍——戈尔巴乔夫坚持要求美国放弃SDI作为削减战略核武器的前提条件，里根坚决拒绝。雷克雅未克峰会（1986年10月）几乎达成了一个"消除所有核武器"的历史性协议，但因为里根拒绝放弃SDI而最终破裂。SDI从未真正部署——1991年苏联解体后，该计划的紧迫性急剧下降。1993年克林顿政府正式终止了SDI计划，转向更为有限的弹道导弹防御（Ballistic Missile Defense, BMD）计划。但SDI的研发投入（1983-1993年约300亿美元）在传感器、精密跟踪、高速计算和定向能等领域产生了显著的技术副产品。`,
significance:`星球大战计划在军事技术上从未实现但在战略博弈中可能是冷战时期最成功的"虚张声势"之一——使苏联领导层在技术恐慌中被迫进行其无法承受的对称回应，加速了苏联经济-军事的过度扩张。1986年雷克雅未克峰会因SDI而破裂的事件代表了冷战后期最具戏剧性的"几近全面核裁军"时刻——如果里根放弃SDI，也许人类在1986年就进入了零核武器时代。SDI的技术遗产（导弹防御传感器和拦截技术）在21世纪美国的导弹防御系统中得到了延续。`,
related:['reagan-doctrine','gorbachev','cuban-missile-crisis','nato'],
tags:['星球大战','SDI','里根','导弹防御','军备竞赛','太空武器']});


_o('united-nations',{
name_zh:`联合国`,name_en:`United Nations (UN)`,date:'1945-10-24',region:'global',category:'organization',treeBranch:`雅尔塔体系`,
summary:`1945年10月24日《联合国宪章》生效，联合国正式成立，总部设在纽约。以维护国际和平与安全、发展各国间友好关系、促进国际合作和协调各国行动为宗旨，是国际联盟的继承者和改进版，拥有安理会五大常任理事国否决权机制。`,
detail:`联合国的创建可追溯至1941年《大西洋宪章》（罗斯福与丘吉尔首次提出战后建立"更广泛的永久性普遍安全体系"的设想）、1942年《联合国家宣言》（26个反法西斯国家首次使用"United Nations"一词）以及1944年敦巴顿橡树园会议（起草了联合国宪章草案）。1945年4月25日至6月26日，50个国家（波兰因临时政府未获西方承认而缺席，但后来补签）的代表在美国旧金山歌剧院举行"联合国国际组织会议"，经过两个月的激烈辩论和谈判，于6月26日签署了《联合国宪章》。宪章于1945年10月24日经五大国（美英苏法中）及其他大多数签字国批准后正式生效——这一天被定为"联合国日"。主要机构——大会（General Assembly）：所有成员国各一票，三分之二多数通过重要事项，大会决议对成员国不具有法律约束力（但对预算具有约束力）。安全理事会（Security Council）：15个成员国（5个常任理事国——美英苏/俄中法拥有否决权，10个非常任理事国由大会选举产生任期两年）。安理会的决议对全体成员国具有法律约束力，是联合国内唯一有权授权使用武力的机构。否决权机制——任何常任理事国的一票反对即可否决安理会关于非程序性事项的决议草案（在冷战时期，苏联投了最多的否决票，美国次之）。否决权被批评为使安理会在超级大国冲突面前无能为力的制度性缺陷——1980年代以前安理会很少能够就重大冲突采取有效行动，因为美苏互相否决对方的提案。秘书处——秘书长由安理会推荐、大会任命，任期五年可连任。历任秘书长中有多位在国际危机中发挥了关键的外交作用（如哈马舍尔德Dag Hammarskjöld在刚果危机中丧生，德奎利亚尔Javier Pérez de Cuéllar在结束两伊战争中调解成功，安南Kofi Annan推动"保护的责任"R2P理念）。国际法院——设在海牙，负责审理国家间的法律争端（非个人），其判决对当事国具有约束力但法院缺乏强制执行手段。经济及社会理事会（ECOSOC）和托管理事会——负责推动经济社会发展及监督托管领土（托管制度已于1994年帕劳独立后结束）。联合国在维和行动（"蓝盔"Blue Helmets，自1948年首次部署以来超过70项维和行动，1988年获诺贝尔和平奖）、人道主义援助（UNICEF、WFP、UNHCR）、公共卫生（WHO）、教育文化（UNESCO）、国际法编纂（国际法委员会）、非殖民化（1960年《给予殖民地国家和人民独立宣言》）和环境与气候变化（IPCC，2007年获诺贝尔和平奖）等领域取得了广泛的成就。但联合国也面临许多失败和批评——未能阻止1994年卢旺达种族灭绝（约80万人在约100天内被屠杀）和1995年斯雷布雷尼察大屠杀；安理会改革的僵局（"五常"结构反映的是1945年的力量对比而非21世纪的地缘政治现实，日本、德国、印度、巴西等国要求成为常任理事国的愿望至今未实现）；官僚主义和效率低下等。`,
significance:`联合国是人类历史上最具普遍性的国际组织（193个成员国），其集体安全机制（尽管因否决权而功能受限）是国际联盟失败后最重要的制度创新。安理会五常否决权制度既是大国一致原则的体现，也是安理会效率的制度性障碍。联合国在人道主义、发展、人权和环境保护等"低政治"领域的成就远大于其在高政治安全领域的表现。联合国的存在本身构成了二战后国际秩序中最持久的多边主义制度支柱。`,
related:['league-of-nations','dumbarton-oaks','yalta-conference','san-francisco-conference'],
tags:['联合国','安理会','否决权','维和','多边主义','旧金山']});

_o('iron-curtain-speech',{
name_zh:`铁幕演说`,name_en:`Iron Curtain Speech / Sinews of Peace`,date:'1946-03-05',region:'global',category:'doctrine',treeBranch:`冷战开端`,
summary:`1946年3月5日英国前首相温斯顿·丘吉尔在美国密苏里州富尔顿威斯敏斯特学院发表的题为《和平砥柱》的演说，首次公开提出"铁幕"（Iron Curtain）一词来描述苏联对东欧的封闭和控制，被公认为拉开了冷战意识形态对抗的序幕。`,
detail:`1945年7月英国大选中丘吉尔被工党领袖艾德礼击败，从首相变为反对党领袖。1946年初他应邀访问美国，在密苏里州富尔顿的威斯敏斯特学院接受了名誉学位。时任美国总统杜鲁门亲自陪同丘吉尔从华盛顿乘火车前往富尔顿，并在台上聆听演说——这一姿态强烈暗示了美国政府对该演说内容的认同（尽管杜鲁门后来对外声称他对演说的具体内容事先不了解）。演说中最著名的段落——"从波罗的海的斯德丁（什切青Stettin）到亚得里亚海的的里雅斯特（Trieste），一道横贯欧洲大陆的铁幕已经降下。铁幕之后，是中欧和东欧所有古老国家的首都——华沙、柏林、布拉格、维也纳、布达佩斯、贝尔格莱德、布加勒斯特和索非亚——所有这些著名的城市及其周围的人口，都处于我所称的苏联势力范围之内，全都以这样或那样的形式，不仅受到苏联的影响，而且在许多情况下受到莫斯科日益增强的高压控制。"丘吉尔没有呼吁发动"对苏战争"，但明确主张西方——特别是"英语民族的特殊关系"（special relationship between the British Commonwealth and Empire and the United States）——必须坚定地团结起来，以"实力"（strength）为后盾面对苏联。他反对"绥靖政策"的重演（暗指1930年代对纳粹德国的教训），呼吁"兄弟般的英语民族联合"成为维护和平的砥柱。演说的国际反应——苏联方面的反应极为愤怒和激烈。3月13日斯大林在《真理报》上发表长篇回应，将丘吉尔比作希特勒——"丘吉尔先生和他的朋友们现在正在散布一种与希特勒及其朋友们过去散布的种族理论惊人相似的理论：讲英语的民族是唯一具有充分价值的民族，他们应当统治世界上的其他民族。"斯大林还反过来指责丘吉尔和西方在二战中对东欧的军事干涉企图。美国国内的反应不一——商界和政界的主流舆论对丘吉尔的"坦率"表示赞赏，但相当一部分左翼自由主义者和孤立主义者警告说丘吉尔正试图将美国拖入与苏联的对抗之中。丘吉尔在演说中还高度赞扬了联合国，认为它代表了维护和平的希望，但同时也强调：在一个分裂的世界中，和平不能仅仅依靠"联合国宪章的脆弱框架"，而需要以实力为后盾的大国领导的坚定。铁幕演说发表后一年多的时间内，杜鲁门主义（1947年3月）、马歇尔计划（1947年6月）和共产党情报局的建立（1947年9月）相继出台——"铁幕"从一句修辞变成了制度化的现实。`,
significance:`丘吉尔的"铁幕演说"是冷战舆论战的开幕礼炮。虽然丘吉尔当时已不是首相，但他作为世界反法西斯战争最伟大的领袖之一所拥有的巨大威望使他的话语分量远超一位"前首相"的身份。"铁幕"（Iron Curtain）一词从此成为冷战的代名词——此后近半个世纪内，这道"铁幕"隔开了两个社会制度、两种意识形态和两个军事集团。演说的精神内核——"以实力求和平"——在此后历届美国总统的对外政策中被反复引用。`,
related:['truman-doctrine','marshall-plan','containment','nato','cold-war'],
tags:['冷战','铁幕','丘吉尔','富尔顿','英语民族','杜鲁门']});

_o('berlin-wall-fall',{
name_zh:`柏林墙倒塌`,name_en:`Fall of the Berlin Wall`,date:'1989-11-09',region:'europe',category:'movement',treeBranch:`东欧格局`,
summary:`1989年11月9日晚，东德政府意外宣布放宽旅行限制，数小时内数十万东柏林人涌向柏林墙各关卡，守卫士兵在没有接到上级明确命令的情况下打开了关卡。柏林墙的倒塌是冷战结束最具象征意义的时刻，直接开启了德国统一（1990年10月3日）的进程。`,
detail:`1989年，东欧剧变的风暴正在席卷整个苏联阵营——匈牙利于5月拆除了与奥地利的边境铁丝网（"铁幕的第一个缺口"），波兰团结工会于6月在半自由选举中获胜，捷克和斯洛伐克于11月发生"天鹅绒革命"。东德领导人埃里希·昂纳克（Erich Honecker）顽固拒绝改革——当戈尔巴乔夫警告他"迟迟不改革的人将被生活本身惩罚"时，昂纳克仍声称东德的社会主义是"最先进的社会主义"，不需要"戈尔巴乔夫的改革病毒"。但东德社会内部的压力已到了沸点——1989年夏秋之际，数千东德公民通过匈牙利开放的奥匈边境逃往西德（"泛欧洲野餐"Pan-European Picnic事件是转折点）；莱比锡等城市每周一数十万人参加"星期一示威"（Montagsdemonstrationen），高呼"我们是人民！"（Wir sind das Volk!）。10月18日昂纳克被迫辞职，埃贡·克伦茨（Egon Krenz）接任。11月9日傍晚，在东柏林的一场新闻发布会上，东德政治局委员京特·沙博夫斯基（Günter Schabowski）在回答记者提问时，宣读了一份尚未正式生效的关于放宽旅行限制的草案。当记者追问"何时生效？"时，沙博夫斯基不知所措地翻找文件，最后说出了含糊的"立即，从现在开始"（sofort, unverzüglich）。这一口误（他实际上不了解文件尚未生效的具体时间表）被东德和西德的电视和广播实时直播。数分钟内，数万东柏林人开始聚集在柏林墙的各个关卡，要求根据"沙博夫斯基宣布的新规定"出境。关卡守卫（每人仅配有手枪和少量弹药）面对数量上占压倒优势且越来越激动的群众，在徒劳地试图联系上级而上级完全不知所措（没有人敢下令开枪又不能不下令）之后，选择了不阻止群众通过。到午夜时分，柏林墙的所有关卡实际上已经开放。东柏林人涌入西柏林，与西柏林市民在勃兰登堡门和柏林墙上狂欢庆祝——人们用锤子和凿子敲下柏林墙的碎片作为纪念品（"柏林墙啄木鸟"Mauerspechte）。在接下来的数周内，柏林墙被系统地拆除。1990年10月3日，经过"2+4会谈"（两德+美英法苏四国）的密集外交谈判，两德正式统一——统一后的德国留在北约、苏联/俄罗斯军队撤离东德、德国放弃核武器和生化武器、德国承诺削减军队规模至37万人。柏林墙倒塌没有开一枪——1989年11月9日的夜晚证明了"和平革命"的可能性。`,
significance:`柏林墙的倒塌是20世纪最具象征性的事件之一——它不是一个军事胜利的结果，而是一个误读文件的口误+数十万群众的和平勇气+边境守卫的"不服从不杀人"的人性选择三者结合的奇迹之夜。柏林墙在28年间代表了冷战的凝固和分裂——它的倒塌同样代表了冷战以和平而非第三次世界大战的方式结束。1989年11月9日之后，"冷战结束"不再是一个地缘政治预测，而是一个正在发生的历史事实。`,
related:['berlin-crises','gorbachev','eastern-europe-revolutions-1989','german-division','brandt-ostpolitik'],
tags:['柏林墙','1989','德国统一','冷战结束','和平革命','东德']});

_o('eastern-europe-revolutions-1989',{
name_zh:`1989年东欧剧变`,name_en:`Revolutions of 1989 / Fall of Communism in Eastern Europe`,date:'1989-01-01',end_date:'1989-12-29',region:'soviet',category:'movement',treeBranch:`东欧格局`,
summary:`1989年，东欧六个华约社会主义国家在不到一年的时间内接连发生政权更迭：波兰（圆桌会议和半自由选举）、匈牙利（民主转型）、东德（柏林墙倒塌）、捷克斯洛伐克（天鹅绒革命）、保加利亚（党内政变）和罗马尼亚（暴力革命）。除罗马尼亚外全部以和平方式完成了从一党制到多党民主制的过渡，苏联未进行任何军事干预。`,
detail:`1989年东欧剧变的速度之快和和平程度之高（除罗马尼亚外）令全世界的观察家和分析家震惊。在不到一年之内，苏联在第二次世界大战中付出约2700万生命换来的整个东欧帝国，几乎在没有开一枪的情况下解体。剧变的"多米诺序列"——波兰（1月至8月）：2月至4月共产党政府与团结工会举行圆桌会议（Polish Round Table Talks），达成半自由选举方案。6月4日选举中团结工会赢得了所有自由竞争席位。8月24日塔德乌什·马佐维耶茨基就任总理，成为战后东欧首位非共产党政府首脑。波兰打开了第一个缺口。匈牙利（5月至10月）：5月拆除与奥地利的边境铁丝网。6月为被处决的前总理纳吉·伊姆雷举行重新安葬仪式（约10万人参加），标志着对1956年革命的公开平反和共产主义合法性的崩溃。10月匈牙利社会主义工人党改组为匈牙利社会党，国会通过宪法修正案将国名从"匈牙利人民共和国"改为"匈牙利共和国"，正式结束一党制。东德（9月至11月）：莱比锡等城市的"星期一示威"从数万人发展到数十万人。10月18日昂纳克被迫辞职。11月9日柏林墙意外倒塌。捷克斯洛伐克（11月至12月）：11月17日学生示威被警察暴力镇压引发更大规模的抗议。11月19日"公民论坛"（Civic Forum）在布拉格成立，瓦茨拉夫·哈维尔（Václav Havel）成为领袖。"天鹅绒革命"（Velvet Revolution）——以不流血、非暴力的公民不服从和总罢工迫使共产党在12月初交出政权。12月29日哈维尔被议会选举为总统。保加利亚（11月至12月）：党内温和派发动"宫廷政变"迫使日夫科夫（Todor Zhivkov，执政35年）下台，保加利亚共产党改组为社会党，开启多党制转型——是东欧各国中变革最"自上而下"和最少群众动员的。罗马尼亚（12月16日至25日）：这是1989年东欧巨变中唯一演变为大规模暴力和流血的事件。12月16日蒂米什瓦拉（Timișoara）的匈牙利族新教牧师拉斯洛·托克什（László Tőkés）的抗议引发了安全部队与群众的暴力冲突（数十至数百人被杀）。12月21日齐奥塞斯库在布加勒斯特的公众集会试图动员群众支持，反而遭到嘘声和抗议——这一史无前例的场面通过国家电视台直播震撼全国。12月22日军队转而支持抗议者，齐奥塞斯库夫妇乘直升机逃离但当天被抓获。12月25日（圣诞节）齐奥塞斯库夫妇被军事法庭以"种族灭绝"（造成约6万人死亡）等罪名在不到一小时内审判并立即执行死刑。罗马尼亚救国阵线（主要由前共产党改革派组成）接管了政权。为什么戈尔巴乔夫没有出兵？1989年戈尔巴乔夫不仅没有像1956年和1968年那样命令华约军队镇压东欧各国的抗议运动，反而在事前向各华约保守派领导人明确表示"苏联不会用武力维持你们的政权"。戈尔巴乔夫将不干涉东欧各国内政的原则形象地概括为"辛纳屈主义"（Sinatra Doctrine——取自弗兰克·辛纳屈的歌《My Way》/"我行我素"——每个国家可以走自己的路）。1989年东欧剧变的根本原因——深层的经济失败（经互会体制的技术落后和效率低下，1980年代东欧各国普遍陷入债务危机和生活水平停滞）、戈尔巴乔夫的"不干预"政策（抽掉了支撑东欧保守政权的最终暴力支柱）、苏联体制的意识形态合法性的崩溃（公开性使苏联模式的"最佳制度"叙事无法再维持）和东欧社会内部数十年来积累的不满和反对运动的成熟（波兰团结工会、捷克斯洛伐克七七宪章、匈牙利民主论坛等）在1989年同时爆发。`,
significance:`1989年东欧剧变是世界历史上最密集的和平政权更迭浪潮——六个国家在一年内从一党制和平过渡到多党制（罗马尼亚的暴力是个例外）。"辛纳屈主义"（戈尔巴乔夫的不干预承诺）是1989年剧变能够和平发生的决定性外部条件——1956年和1968年血的教训使东欧反对派深知苏联武力的毁灭性，而1989年苏联的"非武力"使和平变革成为可能。1989年也证明了"公民社会"在推翻威权体制中的强大力量——波兰和捷克斯洛伐克的最大反对派力量不是武装游击队而是罢工工人、地下刊物、剧场和教堂里的异议知识分子。`,
related:['berlin-wall-fall','solidarity-movement','gorbachev','brezhnev-doctrine','velvet-revolution'],
tags:['1989','东欧剧变','和平革命','辛纳屈主义','戈尔巴乔夫','冷战结束']});

_o('opec',{
name_zh:`石油输出国组织（欧佩克）`,name_en:`OPEC / Organization of the Petroleum Exporting Countries`,date:'1960-09-14',region:'middle-east',category:'organization',treeBranch:`中东与国际经济`,
summary:`1960年9月由伊朗、伊拉克、科威特、沙特阿拉伯和委内瑞拉五国在巴格达成立的石油生产国政府间组织。旨在协调成员国的石油政策，以保障产油国的公平价格和稳定收入。1973年石油禁运使其一举成为影响全球经济的核心力量。`,
detail:`1960年9月10日至14日，伊朗、伊拉克、科威特、沙特阿拉伯和委内瑞拉五国的石油部长在巴格达举行会议，决定成立石油输出国组织（Organization of the Petroleum Exporting Countries, OPEC）。成立的直接导火索是1959-1960年西方石油公司（主要是"七姐妹"Seven Sisters——埃克森Exxon、壳牌Shell、英国石油BP、美孚Mobil、雪佛龙Chevron、海湾Gulf和德士古Texaco等跨国石油巨头）单方面降低原油标价（posted price）。产油国根据标价的一定比例收取矿区使用费和税收，降低标价直接削减了产油国的财政收入，而产油国对此没有任何发言权。OPEC的创始宗旨——协调和统一成员国的石油政策，确保产油国获得公平和稳定的价格；确保消费国获得高效、经济和定期的石油供应；确保石油工业投资者获得公平的资本回报。总部于1965年从日内瓦迁至维也纳（至今）。OPEC的前十年（1960-1970年）在国际上的影响力有限——产油国仍然没有实际控制石油定价权，西方"七姐妹"通过长期特许权合同（concession agreements）掌握着从勘探、开采、运输、提炼到零售的全产业链。转折点——1970年代：利比亚（卡扎菲1969年通过政变上台后）率先以减产威胁迫使西方石油公司接受了更高的标价和税率，打破了产油国之间的"竞相降价"困境。1971-1972年OPEC成员国相继获得了对其石油资源的更大控制权——部分或全部国有化石油工业。1973年10月赎罪日战争期间，阿拉伯石油输出国组织（OAPEC，阿拉伯成员国组成的次级组织）宣布对美国和其他支持以色列的西方国家实施石油禁运和大幅减产。油价在数月内从每桶约3美元飙升至约12美元——全球经济陷入了第一次石油危机和"滞胀"。这是OPEC（特别是阿拉伯成员国）首次将石油作为地缘政治武器——虽然禁运最终未能迫使以色列撤出1967年被占领土，但其对全球经济的冲击彻底改变了国际能源政治格局。此后OPEC在1979年伊朗革命和1980-1988年两伊战争（第二次石油危机——油价再次翻倍至约32美元）期间继续发挥着影响全球油价的重要角色。但OPEC的权力也存在局限——1980年代中期非OPEC产油国（北海英国和挪威、墨西哥、阿拉斯加）的大规模增产和OPEC内部的"欺诈"超产导致1986年油价暴跌至每桶约10美元；2014-2016年美国的"页岩油革命"（shale oil revolution）使美国成为世界最大的石油生产国，进一步削弱了OPEC对全球油价的传统控制力。OPEC与以俄罗斯为首的非OPEC产油国于2016年组成了"OPEC+"联盟以联合减产稳定油价。`,
significance:`OPEC是发展中国家"资源民族主义"和建立国际经济新秩序的最成功案例。它将石油定价权从西方跨国石油公司（"七姐妹"）部分转移到了产油国政府手中，彻底改变了全球石油政治的格局。1973年石油禁运是OPEC历史上最具冲击力的地缘政治行动——虽然政治目标未实现，但"石油武器"的概念从此深植于国际政治思维。OPEC的兴衰反映了全球能源格局的持续演变——从"石油稀缺、OPEC主导"到"页岩革命、多极供应"的时代。`,
related:['oil-crisis','yom-kippur-war','iranian-revolution','bretton-woods'],
tags:['OPEC','石油','能源','禁运','七姐妹','产油国']});


_o('thatcherism',{
name_zh:`撒切尔主义`,name_en:`Thatcherism`,date:'1979-05-04',end_date:'1990-11-28',region:'europe',category:'doctrine',treeBranch:`西欧政治`,
summary:`1979年至1990年英国首相玛格丽特·撒切尔（"铁娘子"）推行的一整套保守主义政治经济政策。以货币主义对抗通胀、大规模私有化国有企业、削弱工会力量、削减福利开支和强调个人责任为核心。对外密切英美特殊关系、坚决反苏、发动马岛战争。深刻改变了英国的经济社会结构和政治文化。`,
detail:`1979年5月英国大选中保守党获胜，撒切尔成为英国（也是欧洲主要大国中）首位女首相。她继承的是一个"欧洲病夫"（sick man of Europe）——1978-1979年"不满的冬天"（Winter of Discontent）期间，大规模的公共部门罢工（垃圾堆积街头、尸体积压在太平间无人处理）使工党政府垮台。撒切尔的经济政策（被称为"撒切尔主义"的核心）——货币主义：将控制通胀（不再追求充分就业）作为宏观经济的第一要务，通过提高利率和紧缩财政来遏制货币供应增长。通胀率从1980年的约18%降至1983年的约5%（但失业率在1980年代初期飙升至300万以上，是1930年代以来的最高水平）。私有化（privatisation）：将数十家大型国有企业和公用事业（英国石油BP、英国航空BA、英国电信BT、英国天然气British Gas、英国钢铁British Steel、电力公司、水利公司、铁路和机场等）出售给私人投资者。私有化不仅改变了企业所有权，更重要的是使数百万普通英国人首次成为股东（"大众资本主义"popular capitalism）——股东人数从1979年的约300万人增至1990年的约1100万人。工会改革：1980-1984年通过一系列《就业法》和《工会法》逐步限制工会的权力——禁止次级罢工（secondary strike）和同情罢工（sympathy strike）、规定罢工必须在工会会员中进行不记名投票（secret ballot）并获得多数支持、禁止"排外性雇佣制企业"（closed shop）、规定工会领导人由不记名投票选举产生。最关键的一战——1984-1985年煤矿工人大罢工（Miners\' Strike）：全国矿工工会（NUM）在阿瑟·斯卡吉尔（Arthur Scargill）领导下罢工近一年以抗议政府关闭亏损煤矿的计划，撒切尔政府顽强抵抗（预先储备了大量煤炭、动员警察保护运输车队），罢工最终失败——这一失败标志着英国工会在国家政治中作为否决力量的时代的终结。削减福利和教育开支、减少对地方政府的拨款、推行人头税（Community Charge/"Poll Tax"——以人头而非财产价值为基准征收地方税，引发了1990年伦敦特拉法加广场的大规模暴力抗议，是撒切尔最终下台的重要原因之一）。外交政策——马岛战争（Falklands War）：1982年4月阿根廷军政府入侵英国在南大西洋的殖民地福克兰群岛（马尔维纳斯群岛），撒切尔果断派遣海军特遣队远赴8000英里外以武力收复群岛。两个半月的战争以阿根廷投降告终。马岛战争的胜利极大地提升了撒切尔在国内的人气（"铁娘子"Iron Lady的绰号最初由苏联媒体讽刺性地创造，马岛战争后变成了正面标签）和英国的民族自豪感。"英美特殊关系"：撒切尔与美国总统里根（两人同为坚定的反共保守主义者，个人关系密切）建立了战后最亲密的英美领导人关系。撒切尔强烈支持里根对苏联的强硬政策，允许美国使用英国基地在1986年空袭利比亚（的黎波里和班加西）。对欧态度：撒切尔是坚定的疑欧派——反对欧洲一体化的联邦主义方向，1988年在比利时布鲁日发表著名演说，宣称"我们没有成功地缩小英国的国家边界，只是为了在欧洲层面上重新将它们强加回去，由欧洲超级国家从布鲁塞尔行使新的统治。"（"No, no, no."）1990年她因内阁分裂（主要是副首相贺维和财政大臣劳森的离职）以及党内对其对欧强硬姿态和人头税的不满而在党领袖选举中被迫辞职。撒切尔主义深远地重塑了英国——打破了二战后近35年的"战后共识"（post-war consensus，混合经济、福利国家和强大的工会），使英国在1980年代从停滞的制造业经济转型为以金融服务业为中心的市场经济。`,
significance:`撒切尔主义是战后西方保守主义革命的旗舰——与美国的里根主义（"里根经济学"）同步但也各自独立地颠覆了战后的"大政府-高福利-强工会"共识。大规模私有化和工会改革深刻改变了英国的经济结构和阶级力量对比。马岛战争的胜利重塑了英国的民族自信心。"英美特殊关系"在冷战的最后阶段达到了历史密度最高的程度。但撒切尔去工业化的代价（英格兰北部和苏格兰老工业区的长期衰败）和社区撕裂的遗产至今仍在英国政治中持续发酵。`,
related:['reagan-doctrine','suez-crisis','british-disease','falklands-war'],
tags:['撒切尔','英国','私有化','工会改革','马岛战争','保守主义']});

_o('gaullism',{
name_zh:`戴高乐主义`,name_en:`Gaullism`,date:'1958-06-01',end_date:'1969-04-28',region:'europe',category:'doctrine',treeBranch:`西欧外交`,
summary:`法国总统夏尔·戴高乐（1958-1969年执政）奉行的独立自主外交政策。核心要素：追求法国的大国地位和战略自主、退出北约军事一体化、发展独立核力量（"打击力量"Force de frappe）、推动以法德为轴心的"欧洲人的欧洲"、反对英国加入欧共体、承认中华人民共和国和批评美国的越南战争。`,
detail:`1958年6月戴高乐在阿尔及利亚危机中重新执政，创建法兰西第五共和国（加强了总统权力）。戴高乐主义在不到十年内彻底重塑了法国的国际地位和欧洲外交格局。核心要素——独立的核威慑力量（Force de frappe/"打击力量"）：戴高乐坚信"没有独立的国防就没有独立的外交"。法国于1960年2月在阿尔及利亚撒哈拉沙漠成功试验了第一颗原子弹，此后独立地建立了包括陆基中程弹道导弹（"冥王星"Pluton）、海基潜射弹道导弹（"可畏"级核潜艇Redoutable）和空基核打击（"幻影IV"Mirage IV战略轰炸机）的"三位一体"核力量。戴高乐的基本逻辑——"美国的核保护伞是否真的会为了保护巴黎而冒纽约被苏联核弹摧毁的风险？"他认为不能把自己的生存托付给另一个国家的"自杀意愿"。退出北约军事一体化（1966年）：法国于1966年正式退出了北约一体化军事指挥结构，但没有退出北约组织本身（保留了政治成员资格）。戴高乐要求所有美国和其他北约国家的军队及北约总部（包括SHAPE欧洲盟军最高司令部）必须在1967年4月1日前撤离法国领土。北约总部被迫从巴黎迁至布鲁塞尔。"欧洲人的欧洲"（L\'Europe européenne）：戴高乐主张欧洲应该是由民族国家组成的"从大西洋到乌拉尔的欧洲"——独立于美国的控制，但也不是一个超国家的联邦。"富歇计划"（Fouchet Plan, 1961-1962）试图建立一个以法国为领导的"欧洲政治联盟"（以政府间合作而非超国家一体化为原则），但遭到荷兰和比利时的反对（这些小国认为只有超国家制度和美国的存在才能保证小国的安全和平等）。否决英国加入欧共体（1963年和1967年）：戴高乐认为英国是美国的"特洛伊木马"——英国的加入将使欧共体变得"不再是欧洲的，而是大西洋的"。1963年1月戴高乐在记者会上公开宣布法国将否决英国的入盟申请——此后直到戴高乐于1969年辞职后，英国才于1973年在蓬皮杜任内加入。法德和解与合作的制度化：戴高乐与西德总理阿登纳于1963年1月签署了《爱丽舍条约》（Elysée Treaty），建立了法德两国在安全政策、外交协调和教育交流领域的制度化双边合作机制——法德轴心从此成为欧洲一体化的发动机。向东方开放（détente, entente, coopération/"缓和、谅解、合作"）：1966年戴高乐访问苏联（约30万莫斯科市民沿途欢迎），这是冷战中西方最高领导人对苏联的首次大型访问，开启了法国之后的东方政策——以及对"从大西洋到乌拉尔的欧洲"的愿景。承认中华人民共和国（1964年）：法国成为第一个与中华人民共和国建立正式大使级外交关系的西方大国，这一决定引发美国强烈不满（美国当时的政策是对北京进行外交孤立）。`,
significance:`戴高乐主义为战后法国重新确立了独立的大国身份和战略自主路线。退出北约军事一体化和独立的核力量至今仍是法国国防政策的核心要素（虽然法国于2009年在萨科齐任内重新加入了北约军事一体化，但保持了独立的核威慑）。法德《爱丽舍条约》确立的法德轴心至今仍是欧盟决策的核心动力。戴高乐主义体现了"中等强国"在冷战两极格局中如何通过"独立自主"来博取远超于其物质实力的国际影响力——这一策略被后来的中国等其他国家学习和借鉴。`,
related:['nato','hallstein-doctrine','brandt-ostpolitik','schuman-plan','elysee-treaty'],
tags:['戴高乐','法国','独立外交','核威慑','北约退出','法德轴心']});

_o('asean',{
name_zh:`东南亚国家联盟（东盟）`,name_en:`ASEAN / Association of Southeast Asian Nations`,date:'1967-08-08',region:'asia-pacific',category:'organization',treeBranch:`全球南方与非殖民化`,
summary:`1967年8月8日由印度尼西亚、马来西亚、菲律宾、新加坡和泰国五国在曼谷成立的东南亚区域合作组织。以促进经济增长、社会进步、文化发展和地区和平稳定为宗旨。后陆续吸纳越南、老挝、缅甸、柬埔寨等国，实现东南亚十国全覆盖。`,
detail:`1967年8月8日，印度尼西亚、马来西亚、菲律宾、新加坡和泰国五国外长在曼谷签署了《东南亚国家联盟宣言》（又称《曼谷宣言》Bangkok Declaration），正式成立东盟。创始背景——1960年代东南亚正处于高度动荡之中：越南战争正酣（美国大规模派遣地面部队始自1965年）；印度尼西亚刚经历1965年九三〇政变和随后的大规模反共屠杀与苏哈托上台执政（1966年）；马来西亚与印度尼西亚之间的"对抗"（Konfrontasi, 1963-1966年）刚刚结束；菲律宾与马来西亚之间关于沙巴（Sabah）的领土争议悬而未决。东盟的创建在某种程度上是上述各国认识到相互对抗只会让共产主义运动（特别是在越南战争中胜利势头的越共以及各国国内的共产党游击队）从中受益，而寻求区域团结与合作的产物。东盟的运作方式——"东盟方式"（ASEAN Way）：以不干涉内政、共识决策（consensus decision-making）、非正式和渐进式合作为核心原则，与欧盟的超国家机构模式形成鲜明对比。没有超国家的委员会或法院，没有共同的货币，没有跨国议会——东盟是政府间主义（intergovernmentalism）的极端体现。经济合作——1992年东盟自由贸易区（AFTA）成立，逐步取消区域内部关税和非关税壁垒。2015年东盟经济共同体（AEC）正式启动，目标是在东南亚建立一个具有高度竞争力的单一市场和生产基地。但在实际执行中，非关税壁垒的取消比关税减让要慢得多和困难得多。政治安全——东盟地区论坛（ARF, 1994年）：包括中国、美国、日本、俄罗斯、印度、欧盟等27个对话伙伴的外长级安全对话平台，是亚太地区最重要的多边安全对话机制之一。东盟还推动了东亚峰会（EAS, 2005年）等以东盟为中心的地区多边机制（"东盟中心性"ASEAN Centrality）。但东盟在处理南海争端（多个成员国与中国之间存在主权和海洋权益争端）和缅甸人权问题（特别是罗兴亚穆斯林危机和2021年军事政变）等棘手的地区议题时，共识决策和不干涉内政的"东盟方式"受到了严重的结构性制约——无法对中国和缅甸军政府施加有效压力。扩员——文莱于1984年加入；越南于1995年（越美关系正常化后不久）；老挝和缅甸于1997年；柬埔寨于1999年——实现了东南亚十国全覆盖。`,
significance:`东盟是发展中国家区域合作组织中最成功的案例之一。在冷战高峰期，它将五个意识形态和政治体制各异（但都属反共阵营）的东南亚国家团结在一个共同的经济和安全合作框架内。"东盟方式"（共识和不干涉内政）使得意识形态各异、发展阶段悬殊的各成员国能够在一个相对宽松的框架内合作——但这一方式在处理南海争端和缅甸危机等议题时也暴露了其结构性软弱。东盟建立的以自身为中心的地区多边机制（ARF、EAS等）使东南亚中小国家在亚太大国（中美日）的权力博弈中保持了某种"小国联盟引导大国议程"的能动性。`,
related:['vietnam-war','bandung-conference','non-aligned-movement','asian-tigers'],
tags:['东盟','东南亚','区域合作','东盟方式','AFTA','亚太安全']});

_o('non-aligned-movement',{
name_zh:`不结盟运动`,name_en:`Non-Aligned Movement (NAM)`,date:'1961-09-01',region:'global',category:'organization',treeBranch:`全球南方与非殖民化`,
summary:`1961年9月由南斯拉夫、印度、埃及、印度尼西亚和加纳五国发起在贝尔格莱德举行的首次不结盟国家首脑会议。主张独立于美国和苏联两大军事集团的中立和不结盟政策，反殖民主义、反种族主义和支持民族自决。至2020年已有120个成员国，是联合国之外最大的国家间政治组织。`,
detail:`不结盟运动的思想和外交前身可追溯至1955年的万隆会议（Bandung Conference）。1961年，在南斯拉夫总统铁托（Josip Broz Tito）、印度总理尼赫鲁（Jawaharlal Nehru）、埃及总统纳赛尔（Gamal Abdel Nasser）、印度尼西亚总统苏加诺（Sukarno）和加纳总统恩克鲁玛（Kwame Nkrumah）五位第三世界民族主义领导人的共同倡议下，于1961年9月1日至6日在贝尔格莱德召开了第一届不结盟国家首脑会议。出席会议的有25个国家的国家元首/政府首脑以及3个观察员国。会议通过了《贝尔格莱德宣言》，制定了不结盟运动的五项核心标准（又称"不结盟的资格条件"）：1) 执行独立于大国集团的政策；2) 支持民族解放运动；3) 不参加与大国冲突相关的多边军事同盟；4) 不缔结与大国冲突相关的双边军事协定；5) 不向大国提供用于冲突的军事基地。这些标准相当严格——使一些"形式上不结盟但实质上亲美"（如巴基斯坦的部分时期）或"亲苏"的国家面临加入资格的考验。不结盟运动的核心理念——"不结盟"（Non-alignment）不等于"中立"（Neutrality）、"消极被动"或"孤立主义"，而是一种"积极的不结盟"（Active Non-alignment）——积极参与国际事务，在各个具体问题上根据事情本身的是非曲直（而非集团的立场）自主作出判断。在实践中，不结盟运动多数成员国在反殖民主义、反种族隔离（ apartheid in South Africa）、支持巴勒斯坦事业、推动建立国际经济新秩序（NIEO, 1974年联合国大会通过的《建立国际经济新秩序的宣言》）和裁军（特别是反对核武器扩散和军备竞赛）等议题上保持了高度的共识和一致性。但在冷战时期，不结盟运动内部的尖锐分裂也是显而易见的——古巴（卡斯特罗1979-1983年担任不结盟运动轮值主席）和越南等激进成员国试图将运动推向亲苏反美立场，而新加坡、沙特阿拉伯等温和成员国则试图保持与西方的良好关系。1979年苏联入侵阿富汗——一个不结盟运动创始成员国（阿富汗于1961年加入了运动）被超级大国武装入侵——使不结盟运动内部关于"谁是第三世界的真正威胁"的争吵达到了顶点。冷战结束后，不结盟运动面临着严重的"身份危机"和"目标危机"——两极格局消失了，"不结盟"的原初意义何在？运动试图转向发展议题、全球治理改革（安理会改革、国际金融机构的民主化）和南南合作，但其凝聚力和国际影响力已远不如1960-1970年代的鼎盛时期。截至2020年，不结盟运动共有120个成员国（主要分布在非洲、亚洲和拉丁美洲），17个观察员国和10个观察员组织。它是联合国大会中的最大投票集团，但其决议的实际影响力有限。`,
significance:`不结盟运动是万隆会议之后第三世界崛起的第二个里程碑。它为亚非拉新独立国家在冷战两极格局中提供了一个非军事集团的集体身份和外交平台——使中小国家能够以集体的声音影响国际议程（特别是非殖民化、反种族隔离和国际经济新秩序）。不结盟运动的核心困境在于——"不与美苏结盟"的自律在实践中很难与"各成员国自主选择外交伙伴"的权利之间的张力。冷战后的"身份危机"反映了后两极时代中小国家集体行动面临的根本性挑战。`,
related:['bandung-conference','tito-stalin-split','decolonization','group-of-77'],
tags:['不结盟','第三世界','铁托','尼赫鲁','纳赛尔','非殖民化','NIEO']});

_o('group-of-77',{
name_zh:`七十七国集团`,name_en:`Group of 77 (G77)`,date:'1964-06-15',region:'global',category:'organization',treeBranch:`全球南方与非殖民化`,
summary:`1964年6月15日在日内瓦联合国贸易和发展会议（UNCTAD）首届会议结束时，77个发展中国家（最初数量）联合发表了《七十七国联合宣言》，要求建立更加公平的国际经济新秩序。是发展中国家在联合国体系内协调经济和贸易立场的最大的政府间集团。`,
detail:`1964年3月至6月，联合国贸易和发展会议（UNCTAD）的首届会议在日内瓦举行。这是发展中国家在万隆会议（1955年）和不结盟运动（1961年）之后，首次尝试利用联合国的多边机制推动其经济议程——即改变由发达国家主导的全球贸易和金融体系的不平等结构。6月15日会议结束时，77个发展中国家（实际上此时已有78个，但"77"的名称被固定下来）共同发表了一份联合宣言——《七十七个发展中国家联合宣言》。宣言的核心主张——国际贸易的游戏规则是由发达国家制定的，从结构上不利于发展中国家的初级产品出口和工业化努力（"不公平的贸易条件"declining terms of trade——发展中国家出口的初级产品价格相对于其进口的工业制成品的价格长期趋于下降）；发达国家之间的贸易壁垒（如关税和配额）对发展中国家的制成品出口构成了不公平的歧视；国际货币和金融体系（布雷顿森林体系的IMF和世界银行）的决策权完全由发达国家垄断（投票权与出资额挂钩，美国拥有事实上的否决权），发展中国家的声音被系统性地边缘化。因此七十七国集团呼吁召开一次"全球贸易和发展会议"以建立"公正和公平"的国际经济新秩序。此后，七十七国集团成为了联合国体系内发展中国家在经济和发展议题上协调立场的核心平台——在每届UNCTAD会议（每四年一次）之前，七十七国集团都召开部长级会议以统一谈判立场。1974年，在石油危机的冲击和OPEC成功的鼓舞下，七十七国集团和不结盟运动在联合国大会推动通过了《建立国际经济新秩序宣言》（NIEO Declaration）和《各国经济权利和义务宪章》（Charter of Economic Rights and Duties of States）——这是发展中国家对现有国际经济秩序最全面的改革要求和纲领性文件。但NIEO的雄心勃勃的改革要求（包括对跨国公司活动的限制、对自然资源永久主权的绝对承认、初级产品的"指数化"价格稳定计划和"技术转让"的强制性要求等）遭到了发达国家的强烈反对和抵制。到1980年代，随着新自由主义全球化的兴起、"华盛顿共识"以及发展中国家债务危机的爆发（拉美和非洲），NIEO的议程被实质上搁置了。截至2023年，七十七国集团已有134个成员国（中国虽参与其活动，但自称为"不是成员，而是合作伙伴"）。集团的实际权力和影响力远不如20世纪70年代的鼎盛时期，但它是联合国大会中最大的国家集团之一。`,
significance:`七十七国集团是第三世界在经济领域要求建立"国际经济新秩序"的最重要平台。它将发展中国家的"贸易条件恶化"结构性问题提上了联合国议程，挑战了由发达国家制定的全球经济规则的合法性。虽然1974年的NIEO纲领未能实现（多数要求被发达国家拒绝或淡化），但七十七国集团作为一个协调发展中国家在多边谈判中集体立场的平台的功能至今仍在运作——在气候变化（"共同但有区别的责任"原则，1992年）和世界贸易组织谈判（多哈发展回合Doha Development Round, 2001年）等议题上发挥了不可替代的作用。`,
related:['non-aligned-movement','bandung-conference','bretton-woods','oil-crisis','opec'],
tags:['七十七国集团','发展中国家','NIEO','UNCTAD','南南合作','国际经济新秩序']});


_o('wwi-sarajevo',{name_zh:`萨拉热窝事件`,name_en:`Sarajevo Assassination / Assassination of Archduke Franz Ferdinand`,date:'1914-06-28',region:'europe',category:'crisis',treeBranch:`一战导火索`,summary:`1914年6月28日奥匈帝国皇储弗兰茨·斐迪南大公夫妇在波斯尼亚首府萨拉热窝被塞尔维亚民族主义组织"青年波斯尼亚"成员加夫里洛·普林西普刺杀。奥匈帝国在德国支持下于7月28日向塞尔维亚宣战，连锁触发欧洲各大国的同盟体系，引爆第一次世界大战。`,detail:`1914年6月28日（这一天也是塞尔维亚的民族耻辱日——1389年科索沃战役纪念日），奥匈帝国皇储弗兰茨·斐迪南大公和他的妻子索菲在波斯尼亚-黑塞哥维那首府萨拉热窝进行正式访问。奥匈帝国于1908年正式吞并了原奥斯曼帝国的波斯尼亚省，这一举动激化了塞尔维亚民族主义者的愤怒——他们视波斯尼亚为"大塞尔维亚"（Greater Serbia）的不可分割部分。当大公夫妇乘坐敞篷汽车在萨拉热窝街道上缓慢行驶时，事先埋伏在沿路的六名刺客（均为"青年波斯尼亚"秘密组织的成员）中的第一个——内杰利科·查布里诺维奇（Nedeljko Čabrinović）向大公的汽车投掷了一枚炸弹，但炸弹弹开了车身，在后面的汽车下爆炸，炸伤了几名随从和围观者。大公的汽车加速逃过了这一劫，到达了萨拉热窝市政厅。在市政厅发表完致辞后，大公决定去医院探望伤者。司机在拉丁桥（Latin Bridge）附近拐错了弯，当汽车停下来倒车时，正好停在了一家咖啡馆前。当时年仅19岁的刺客加夫里洛·普林西普（Gavrilo Princip）恰好就在这家咖啡馆里——他从咖啡馆里走出来，拔出一支比利时制造的勃朗宁手枪，在数米之内向大公夫妇连续射击。斐迪南大公颈部中弹，他的妻子腹部中弹，两人均在数分钟内死亡。普林西普当场被捕（因未满20岁，根据奥匈法律不能被判处死刑，被判20年监禁，1918年死于狱中的肺结核）。"七月危机"——奥匈帝国利用刺杀事件作为借口向塞尔维亚发出了一份蓄意设计得让塞尔维亚无法完全接受的最后通牒（共10条要求，其中包括允许奥匈帝国官员在塞尔维亚领土上进行调查和镇压反奥组织的活动——这实际上是要求塞尔维亚放弃部分主权）。塞尔维亚在48小时内出人意料地接受了最后通牒中的绝大部分要求，但拒绝了两条侵犯主权的核心条款。1914年7月28日奥匈帝国对塞尔维亚宣战。俄国作为塞尔维亚的保护国（泛斯拉夫主义）开始部分动员军队；德国作为奥匈帝国的盟友要求俄国停止动员，遭到拒绝后于8月1日对俄宣战；德国于8月3日对法国宣战（施里芬计划——通过比利时进攻法国的预定战略）；8月4日德国入侵中立的比利时导致英国对德宣战。欧洲各大国的同盟体系在不到一周内相继触发，第一次世界大战由此全面爆发。"萨拉热窝的枪声"因此被称为"引发世界大战的刺杀"——当然，更深层的原因（大国联盟、军国主义、帝国主义和民族主义的矛盾累积）早已将欧洲变成了一个火药桶，萨拉热窝只是那颗点燃火药桶的火花。`,significance:`"萨拉热窝的枪声"是20世纪最具命运性的一颗子弹——它不仅引爆了第一次世界大战（约1000万军人死亡、约700万平民死亡），而且是此后贯穿整个20世纪的一系列连锁灾难的起点：一战→凡尔赛和约→魏玛共和国危机→纳粹上台→二战→冷战。"萨拉热窝"从此成为"偶然事件引发巨大历史灾难"的代名词。1982年历史学家A. J. P. 泰勒关于"定时表"（timetable）——欧洲各国军队的动员时间表本身成为了战争不可避免的机械机制——的论点至今仍是关于一战起源的最具影响力的学术论述之一。`,related:['treaty-versailles','wwi-marne'],tags:['一战','萨拉热窝','斐迪南','普林西普','导火索','七月危机']});

_o('fourteen-points',{name_zh:`十四点原则`,name_en:`Wilson\'s Fourteen Points`,date:'1918-01-08',region:'global',category:'doctrine',treeBranch:`一战结束与凡尔赛`,summary:`1918年1月8日美国总统伍德罗·威尔逊在国会发表的建立战后世界和平秩序的纲领性演说，提出了包括公开外交、海洋自由、自由贸易、裁减军备、民族自决和建立国际联盟等十四项原则。成为巴黎和会的理想主义旗帜，但其大部分核心条款在凡尔赛和约的谈判中被英法削弱或抛弃。`,detail:`1918年1月，一战已持续了三年半，俄国已于1917年12月与德国签订了停战协定（布列斯特-立托夫斯克谈判正在进行中），协约国军队在西线陷入僵局。威尔逊试图以"十四点"作为停战和媾和的基础——不仅是为了结束这场战争，更是为了重塑国际关系的基本准则。十四点原则简列——（1）公开外交，废除秘密条约；（2）海上航行自由；（3）消除经济壁垒、建立平等的贸易条件；（4）裁减军备至最低限度；（5）公正处理殖民地要求、兼顾被殖民人民利益；（6-13）根据民族自决原则调整欧洲各国边界（包括撤离和恢复被占领的俄国领土、比利时、法国领土——阿尔萨斯-洛林归还法国、意大利边界的调整、奥匈帝国各民族自治、巴尔干各国的独立和领土保障、奥斯曼帝国各民族的自治以及波兰独立——拥有出海口）；（14）成立一个普遍性的国际联盟以保证所有国家——无论大小——的政治独立和领土完整。十四点原则在德国和奥匈帝国国内产生了巨大的心理冲击——德奥内部的主和派（特别是德国自由派和社会民主党人）将十四点视为可以接受的和平基础；当德国最高统帅部（鲁登道夫和兴登堡）在1918年9月军事形势崩溃后要求政府停战媾和时，正是援引了威尔逊的十四点原则作为停战的基础。巴黎和会（1919年1-6月）上，威尔逊带着十四点原则来到巴黎。但他很快发现英法（特别是法国总理克列孟梭——"老虎"Tiger）对理想主义的"公正和平"毫无兴趣——法国要的是彻底削弱德国的"惩罚性和平"和切实的安全保障（莱茵兰缓冲区、德国非军事化和巨额赔款），英国坚持海上封锁和殖民地利益的保留。在激烈的谈判中，威尔逊被迫在几乎所有具体领土条款上让步（民族自决在东欧造成了大量少数民族问题，德国人聚居的苏台德被划归捷克斯洛伐克就是最典型的例子——但威尔逊对此也基本上默认了），唯独自认为"他的孩子"——国际联盟——被保留了下来。然而，威尔逊最终在法国、英国和意大利的最后通牒下，被迫接受了凡尔赛和约中远比自己原先设想苛刻得多的条款，以期换来他们接受国联。当他回到美国时，参议院拒绝批准凡尔赛和约和加入国联——威尔逊为十四点原则和国联进行的全国演讲旅行中中风，此后半身不遂，直到1921年任期结束前始终无法有效参政权。十四点原则的"失败"成为了威尔逊一生的悲剧和理想主义外交的经典教训。`,significance:`威尔逊的十四点原则是20世纪国际关系自由主义理想的奠基宣言。"民族自决"概念（虽然威尔逊本人在巴黎和会上未能将其一致地应用于所有民族）在此后一个世纪中持续地影响着全球的非殖民化运动和民族主义运动。"国际联盟"是十四点原则的最具体制度遗产——虽然国联本身最终失败但其后继者联合国成为了战后世界秩序的核心支柱。"威尔逊主义"的矛盾——理想主义的言辞（"民主必须是安全的"、"为民主而战"）与强权政治的现实之间的鸿沟——至今仍是美国外交政策的核心张力。`,related:['treaty-versailles','league-of-nations','paris-peace-conference'],tags:['威尔逊','十四点','民族自决','国际联盟','理想主义','巴黎和会']});

_o('new-economic-policy',{name_zh:`新经济政策`,name_en:`New Economic Policy (NEP)`,date:'1921-03-15',end_date:'1928-00-00',region:'soviet',category:'economic',treeBranch:`苏联合集`,summary:`1921年3月俄共（布）十大通过列宁提出的以粮食税取代余粮征集制为核心的"新经济政策"。允许农民在纳税后自由支配余粮和在手工业及小商业领域恢复私人经营，是苏维埃政权从战时共产主义的部分"战略退却"。该政策于1928年被斯大林终止，转向强制集体化和五年计划。`,detail:`1921年春天，苏俄面临着自内战以来最严重的政治和经济危机——农民因余粮征集制（武装征粮队强行征粮而仅支付毫无购买力的纸卢布）对苏维埃政权的愤怒达到了顶点（1920年底至1921年初遍及坦波夫省、乌克兰和西伯利亚的农民起义），工人因饥饿和失业对布尔什维克的不满日益高涨（1921年2月彼得格勒工人罢工和3月喀琅施塔得水兵起义——起义的水兵正是1917年十月革命中布尔什维克最忠实的支持者——被托洛茨基和图哈切夫斯基指挥的红军血腥镇压）。列宁深刻地认识到，"我们犯了错误：我们试图直接过渡到共产主义生产和分配，而忽视了农民的私人利益。"1921年3月俄共（布）第十次代表大会通过了《关于以实物税代替余粮征集制》的决议，标志着新经济政策的开始。核心改革——农业：以粮食税（prodnalog）代替余粮征集制（prodrazverstka）——农民在缴纳税收后（税率比余粮征集制低得多）可以自由支配和出售剩余农产品。1922年《土地法典》进一步允许农民有限地出租土地和雇佣劳动力。商业和工业：恢复私人贸易和货币流通——从1921年的产品物物交换过渡到1922年的货币经济（金卢布chervonets的稳定发行）。允许私人经营小规模工业企业（雇用20人以下），恢复货币工资制以取代配给制。大型工业和银行、交通、外贸仍由国家垄断——"制高点"（commanding heights）控制在国家手中。"国家资本主义"——通过租让制（concessions）将一些工厂和矿山租给外国资本家经营（实际上由于外国政府对苏俄的敌视和投资风险，租让制很少实现）。新经济政策的效果——农业生产迅速恢复（到1926年已超过战前水平），市场活跃，恐慌性的饥荒（1921年伏尔加河流域大饥荒约有500万人死亡，原因包括余粮征集制的后续效应和干旱灾害）得到缓解。"新经济政策的俄国"（NEP Russia）成为了一个奇特的混合经济——政治上一党专政和克格勃（格别乌GPU）的镇压体制与经济上"混合所有制"并存。列宁于1924年去世后，党内关于新经济政策的辩论升级为权力斗争——布哈林（Bukharin）捍卫新经济政策（"发财吧！"）、主张与农民阶级长期合作；托洛茨基（Trotsky）和"左翼反对派"批评新经济政策是对资本主义的投降、要求加速工业化；斯大林则在新经济政策的持续时期（1924-1927年）先与布哈林合作击败了托洛茨基，然后于1928年突然"向左转"——宣布废除新经济政策，开始强制集体化和第一个五年计划。`,significance:`新经济政策是列宁主义理论中"国家资本主义"和"过渡时期"概念的经典实践。它证明了马克思-列宁主义政权在面临内部崩溃危机时，可以灵活地从纯行政命令和征用退回到市场的混合经济（"退一步、进两步"策略）。新经济政策的"存续还是废除"的辩论是1920年代苏共党内权力斗争的核心议题——斯大林1928年"大转变"的"向左转"标志着苏联体制走上了完全排斥市场的全面中央计划经济道路。戈尔巴乔夫在1980年代末的改革中多次引用新经济政策作为"早期列宁主义灵活性的先例"。`,related:['stalin-model','great-purge','gorbachev','war-communism'],tags:['苏联','新经济政策','列宁','粮食税','混合经济','市场经济']});

_o('stalin-model',{name_zh:`斯大林模式`,name_en:`Stalinist Model / Stalinism`,date:'1928-00-00',end_date:'1953-03-05',region:'soviet',category:'domestic',treeBranch:`苏联合集`,summary:`1928年至1953年斯大林领导苏联时期形成的高度集中的政治经济体制。政治上以共产党一党专政和领袖个人独裁、大规模政治恐怖（大清洗）和意识形态全面控制为特征；经济上以国家指令性计划（五年计划）、重工业绝对优先、全盘农业集体化和消灭私有制为核心。斯大林模式在短期内实现了苏联的快速工业化，但付出了极为惨痛的人道代价。`,detail:`斯大林模式起始于1928年——斯大林在这一年宣布放弃列宁的新经济政策并推行"自上而下的革命"。核心要素——超高速工业化：第一个五年计划（1928-1932年）设定了几乎是虚幻的、但出人意料地在相当程度上被实现了的工业增长目标。在不到十年内，苏联从一个农业国转变为世界第二大工业强国（仅次于美国），建立了完整的重工业体系（钢铁、机械、军工、化工和电力）。工业化的资金来源主要是通过对农业的"抽取"（以极低的国家定价强制收购农产品然后以高价出口换取工业设备和技术）、压制人民消费水平、强迫劳动（古拉格劳改营体系内的约150-200万囚犯被强制投入到大型工程项目中——如白海-波罗的海运河和科雷马金矿等）和赤字财政来实现。全盘农业集体化（1929-1933年）：将个体农户的约2500万个家庭农场强制合并为集体农庄（Kolkhoz）和国营农场（Sovkhoz），消灭了"富农"（Kulaks，实际上包括了数十万稍富裕和抵抗集体化的普通农民，他们被"作为一个阶级"来消灭）。集体化导致了灾难性的大饥荒——特别是1932-1933年乌克兰大饥荒（霍洛多莫尔Holodomor，约300-400万人死亡）和哈萨克斯坦大饥荒（约100-150万游牧民族死亡），以及高加索和伏尔加河下游的饥荒。政治恐怖和大清洗（Great Purge, 1936-1938年）：斯大林体制的最极端特征——NKVD（内务人民委员部，克格勃的前身）利用严刑逼供给罗织的"供词"和秘密审判程序——"莫斯科大审判"（1936-1938年间公开审判并处决季诺维也夫Zinoviev、加米涅夫Kamenev、布哈林Bukharin、李可夫Rykov等几乎所有老布尔什维克——列宁时代的全部政治局委员中，除了斯大林本人和已故的列宁外，全部被处决或暗杀）。图哈切夫斯基元帅（红军现代化之父）和约3.5万名红军军官（约占红军高级军官的50%）被清洗处决——这正是1941年德国入侵时红军在最初几个月惨败的重要原因。古拉格（GULAG，劳改营管理总局）劳动营体系扩张至顶峰时约关押了250万囚犯，他们被迫在极寒的西伯利亚矿山和森林中从事奴隶劳动。对日常生活的全面控制——"伟大的转变"（1928-1932年）全面消灭了市场、私营商业和私人企业——所有的经济活动均由中央计划（Gosplan国家计划委员会）分配，国民经济的每一个部门都由相应的部委垂直管理。斯大林模式在第二次世界大战（1941-1945年）的战争中经受了极端的考验——苏联工业在东迁（将约1500座工厂和数百万人从西部前线搬到乌拉尔山脉和西伯利亚）中展现了惊人的动员能力，坦克（T-34）、大炮和飞机的产量在战争中超过德国，为反法西斯胜利提供了物质基础。但这也加大了对"苏联模式是成功的"的信仰——包括在西方左翼知识分子（如萧伯纳和费边社）中的某种误读。斯大林于1953年3月5日去世——但他的制度遗产（中央计划经济、克格勃监控社会和意识形态控制体系的基本架构）在很大程度上一直延续到1980年代末戈尔巴乔夫的改革为止。`,significance:`斯大林模式是人类历史上最极端的全面国家控制社会实验之一。它在约10年内通过命令式手段将一个农业国工业化——这是人类工业化速度的记录之一——但付出的代价（大清洗、大饥荒和古拉格体制的死亡总数据最保守估计超千万人）令人不寒而栗。斯大林模式对苏联在此后数十年内的路径依赖性影响——包括1970-80年代的技术停滞和生产率的持续下滑——是1991年苏联解体的深层结构性原因。`,related:['new-economic-policy','great-purge','gorbachev','cold-war'],tags:['苏联','斯大林','五年计划','集体化','工业化','极权主义']});

_o('great-purge',{name_zh:`大清洗运动`,name_en:`Great Purge / Great Terror (1936-1938)`,date:'1936-08-19',end_date:'1938-11-17',region:'soviet',category:'domestic',treeBranch:`苏联合集`,summary:`1936年至1938年苏联由斯大林发动的大规模政治镇压高潮。以"莫斯科大审判"为标志，以"清理托洛茨基分子"和"人民公敌"为名义，处决了约68万人（仅1937-1938年），并将约150万人投入古拉格劳改营。几乎所有老布尔什维克领导层、约3.5万名红军军官和数以万计的普通党员、知识分子、少数民族和宗教人士被系统性地"清洗"。`,detail:`1934年12月1日列宁格勒市委书记谢尔盖·基洛夫（Sergei Kirov）在斯莫尔尼宫的办公室外被一名前党员列昂尼德·尼古拉耶夫（Leonid Nikolayev）枪杀。至今仍然无法确定这究竟是斯大林的授意（许多历史学家认为斯大林利用基洛夫之死作为发动恐怖行动的借口）还是尼古拉耶夫的个人行动。无论真相如何，斯大林在基洛夫被刺的当天深夜亲自紧急颁布了一项法令（"12月1日法"）——规定被指控犯有"恐怖主义罪行"的人须在10天内被审判、不得辩护、判决立即执行和不得上诉——为大清洗提供了"法律外衣"。清洗的第一阶段（1936年8月-1937年1月）——莫斯科第一次大审判：审讯和处决"托洛茨基-季诺维也夫恐怖中心"的16名被告，包括前布尔什维克领袖季诺维也夫和加米涅夫。1937年1月第二次莫斯科审判：审讯和处决"反苏托洛茨基中心"的17名被告。清洗的第二阶段——1937年6月——图哈切夫斯基案：八名红军最高级指挥官（元帅和将军们）被秘密军事法庭在一天内审判并立即处决，罪名是与纳粹德国和日本的间谍部门密谋推翻苏维埃政权。"图哈切夫斯基案"开启了对红军的大清洗——在1937-1939年期间约3.5万名红军军官（约占全体军官的50%）被清洗处决。1938年3月第三次莫斯科大审判：审讯和处决"右派-托洛茨基联盟"的21名被告，包括前布尔什维克的主要理论家布哈林（Bukharin）、前人民委员会主席李可夫（Rykov）和前NKVD首领雅戈达（Yagoda——雅戈达本人是清洗的最初执行者之一，最后自己也被清洗）。"斯大林式大清洗"的基层运作——NKVD通过"定额系统"（每个省和地区分配了固定的"镇压名额"——如"NKVD第00447号命令"具体规定了每个地区应"镇压"的"富农分子、刑事犯罪分子和其他反苏分子"的人数，分为"第一类"即死刑和"第二类"即8-10年劳改），数以十万计的普通农民、工人、教师、工程师、神职人员和中下级党政官员因告密、诽谤和"定额抓捕"而被捕、审讯（通常只有短短几分钟的"程序"即被定罪）和处决，或者在劳改营中等待死亡。大清洗在1938年11月突然"刹车"——斯大林和莫洛托夫联名发出指示，停止了大清洗运动，清洗了NKVD内部的一些最为臭名昭著的刽子手（如叶若夫Nikolai Yezhov——"叶若夫体制"Yezhovshchina——是1937-1938年最暴力的清洗阶段——被撤职并于1940年被处决。贝利亚Lavrenti Beria随后接管了重新"整顿"的NKVD并结束了公开的大规模审判）。大清洗的深远影响——苏联党和国家的最高领导层经历了极其剧烈的"人事更替"：1934年联共（布）十七大选出的139名中央委员中，约98人在1937-1939年被处决（约70%）。这意味着整个在列宁时代经过锻炼和具有独立判断力的老一代干部被消灭，取而代之的是在大恐怖的恐惧中全凭斯大林恩宠生存的新的"唯命是从"的干部——这在很大程度上决定了此后苏联领导层在面对危机时缺乏独立思考和灵活反应能力（即"效率陷阱"）。对苏联社会的创伤——大清洗在苏联社会内部培育了深刻的"互不信任文化"（"谁都可以被告密，谁都可以在一夜之间变成人民公敌"），形成了在恐惧和沉默中生存的普遍的防御性文化（"内部移民"——个体退缩到私人生活的极小的安全空间）——这一文化在斯大林去世后的数十年间深刻地塑造了苏联社会的精神面貌。`,significance:`大清洗是20世纪最恐怖的国家针对本国公民的系统性政治暴力巅峰之一——受害者的数量之巨大（仅1937-1938年在"NKVD特别会议"程序下被处决的人数保守统计约为68万人，整个大清洗时期古拉格体系内死亡超过100万）和行为之残忍——使其成为了理解"极权主义"概念的核心经验材料。"清洗掉整个列宁时代的老干部"的历史后果是——当斯大林在1953年去世时，他身后的苏联领导层是一群在大恐怖中"幸存"的、以绝对服从为最高政治生存技巧的人——这在很大程度上可以解释为什么苏联体制在积累了足够多的问题后，无法从内部进行有效的改革直到不可挽回的崩溃。`,related:['stalin-model','khrushchev-reforms','destalinization','nuremberg-trials'],tags:['苏联','大清洗','斯大林','恐怖','古拉格','莫斯科审判']});

_o('great-depression',{name_zh:`1929年世界经济危机`,name_en:`Great Depression (1929-1933/1939)`,date:'1929-10-24',end_date:'1939-00-00',region:'americas',category:'economic',treeBranch:`两次大战之间`,summary:`1929年10月美国华尔街股市崩盘（"黑色星期四"）引发的人类历史上迄今为止最严重和波及最广的经济大危机。在导致全球工业生产萎缩约40%、国际贸易崩溃约60%、美国失业率高达25%、德国约600万人失业。大萧条是导致纳粹上台、日本军国主义抬头和第二次世界大战爆发的深层经济根源。`,detail:`1920年代美国经济表面繁荣但结构脆弱——农业价格整个1920年代持续低迷（美国农民在一战后大量借贷扩大生产但出口市场萎缩）、工业生产过剩与工薪阶层购买力不足的矛盾、以及最危险的是——华尔街疯狂的股票投机狂潮（1924-1929年间道琼斯工业平均指数从约100点上升到1929年9月3日的约381点）。1929年10月24日（"黑色星期四"Black Thursday）纽约股票交易所出现恐慌性抛售——当天交易量达创纪录的1290万股。10月28日（"黑色星期一"）和29日（"黑色星期二"）的更大规模的崩盘——在短短数天内市场市值蒸发约300亿美元（相当于当时美国GDP的约三分之一）。但这只是大萧条的开始而非结束。银行倒闭潮——1930-1933年间美国约9000家银行倒闭（存款人恐慌性挤兑→银行贱卖资产→资产价格暴跌→进一步挤兑→更多银行倒闭的恶性循环）。工业生产崩溃——美国工业生产在1929-1932年间下降约46%，汽车产量下降了约75%，钢铁产量降至1929年的约12%。失业率从1929年的约3%飙升至1933年的约25%（约1300万人失业）——如果不计入农业和非正规经济，这一数字可能超过30%。全球传播——危机通过三个渠道迅速蔓延到全球——国际贸易的断崖式下滑、美国的资本从欧洲（特别是从债务缠身的德国和奥地利）撤回国内、和竞争性货币贬值（各国为促进出口争相贬值本币——"以邻为壑"beggar-thy-neighbor政策）和关税战（美国1930年《斯穆特-霍利关税法》Smoot-Hawley Tariff Act将美国关税提高到美国历史最高水平，引发全球连锁报复性关税）。到1932年，全球国际贸易总额萎缩至1929年的约三分之一。德国的崩溃——德国银行系统于1931年崩溃（奥地利信贷银行Creditanstalt的破产引发了整个中欧银行系统的连锁危机），德国工业生产和就业崩溃——失业率在1932年超过30%（约600万人失业）——这直接使德国选民大量倒向纳粹党和共产党两个极端反民主政党（纳粹党的得票率从1928年的约2.6%飙升至1932年7月的约37.3%）。希特勒于1933年1月30日被任命为总理——没有大萧条就没有希特勒的掌权——这是大萧条最为灾难性的地缘政治后果。美国的政策反应——胡佛政府最初坚持"预算平衡"和"自由市场自行调节"的保守教条。1932年罗斯福当选总统后推行"新政"（New Deal）——国家积极干预经济——但美国的失业率直到第二次世界大战前夕的1939年仍然在约17%，大萧条在美国的真正结束是由于战时军事动员（1941-1945年）。大萧条在英国、法国和北欧引起的政治后果相对温和——民主制度在这些国家虽然经受了重大的社会压力但基本上得以维持。但在德国和日本（日本1931年发动侵略满洲的一大动机也是全球经济危机——日本的生丝出口价格崩溃导致农村极端贫困化，军队内部的"皇道派"军官主张以武力获取殖民地资源和市场）大萧条直接催化了法西斯主义和军国主义的上台——从而为第二次世界大战埋下了经济根源。`,significance:`大萧条是资本主义历史上最深重和持久的危机，彻底动摇了19世纪以来的"自由市场会自动调整"的经济信仰。它的直接政治后果——希特勒在德国掌权、日本军国主义抬头和民主制度在多个欧洲国家的崩溃——为第二次世界大战的爆发提供了不可或缺的条件。凯恩斯主义经济学（"需求不足→国家干预"）正是从大萧条中诞生并在此后近40年间主导了西方经济政策。"新政"确立了国家在管理经济中的永久角色。大萧条也是全球经济治理体系（布雷顿森林体系）创建的"负面教训"——IMF、世界银行和GATT/WTO的创建者们深知"斯穆特-霍利关税战"和"竞争性贬值"的毁灭性，因此设计了旨在防止贸易战和货币战的国际规则和制度。`,related:['new-deal','bretton-woods','nazi-rise','weimar-inflation','keynesianism'],tags:['大萧条','经济危机','华尔街崩盘','失业','斯穆特-霍利','通货紧缩']});

_o('munich-agreement',{name_zh:`慕尼黑协定`,name_en:`Munich Agreement`,date:'1938-09-30',region:'europe',category:'treaty',treeBranch:`二战前奏`,summary:`1938年9月30日德、意、英、法四国首脑在慕尼黑签署的关于捷克斯洛伐克割让苏台德地区给德国的协定。捷克斯洛伐克代表被拒之门外。英法以牺牲捷克斯洛伐克的领土换取了"我们时代的和平"（张伯伦语）的虚假承诺。协定是英国和法国对纳粹德国实行"绥靖政策"（appeasement）的顶峰，次年希特勒撕毁协定吞并捷克全境。`,detail:`1938年捷克斯洛伐克是一个民主共和国和法国在东欧的关键军事盟友（1924年法捷同盟条约），拥有中东欧最强大的陆军和坚固的边境防御工事（"捷克斯洛伐克的马奇诺防线"）。苏台德地区（Sudetenland）居住着约300万德意志族人——他们在奥匈帝国时期曾被支配的民族，在凡尔赛和约后成为了捷克斯洛伐克境内的少数民族。希特勒于1938年春命令苏台德德意志党（由康拉德·亨莱因Konrad Henlein领导，实际受纳粹德国指挥）提出一系列捷克斯洛伐克政府无法完全接受的要求——目的在于制造危机。9月中旬局势紧张——希特勒公开宣称德国"不能再容忍苏台德德意志人遭受的迫害"（大规模宣传了被纳粹煽动的少数冲突事件），德国国防军进行大规模动员准备入侵捷克斯洛伐克。9月15日英国首相张伯伦（Neville Chamberlain，69岁，平生第一次乘飞机——飞到德国巴伐利亚阿尔卑斯山的希特勒别墅贝希特斯加登Berchtesgaden，就苏台德问题进行会谈）会见希特勒，希特勒要求苏台德地区"自决"（即割让给德国）。张伯伦与法国总理达拉第（Édouard Daladier）同意向捷克斯洛伐克施压要求其接受苏台德地区的割让。9月22日张伯伦第二次飞往德国（在莱茵河畔的巴特戈德斯贝格Bad Godesberg）会见希特勒，希特勒此时将要求升级——不仅苏台德地区必须立即割让（10月1日前），而且波兰和匈牙利对捷克斯洛伐克的领土要求也必须同时满足。张伯伦愤怒但无力抗拒。9月29-30日，在意大利独裁者墨索里尼的调停倡议（实际上墨索里尼是应希特勒的要求提出的）下，德、意、英、法四国首脑在慕尼黑的元首宫（Führerbau）召开了慕尼黑会议。捷克斯洛伐克代表团被禁止进入会场，在隔壁房间等待判决——苏联（捷克斯洛伐克的另一个条约盟友）同样未被邀请。9月30日凌晨约1点，慕尼黑协定签署——苏台德地区立即割让给德国（10月1日至10月10日之间分阶段撤离），所有军事设施和工业设备须"不受损害"地交给德国。捷克斯洛伐克被剥夺了其核心防线（边境要塞在苏台德地区内——随着该地区的割让，捷克斯洛伐克剩下的波西米亚-摩拉维亚领土在军事上完全暴露无掩），丧失了约三分之一的领土和约500万人口。9月30日下午张伯伦返回伦敦，在唐宁街10号前挥舞着与希特勒签署的一纸《英德和平宣言》——"我相信这是我们时代的和平"（I believe it is peace for our time）。6个月后（1939年3月15日）希特勒撕毁了慕尼黑协定的承诺——德军占领了捷克全境（波西米亚和摩拉维亚成为德国的"保护国"），斯洛伐克成为德国的傀儡国。张伯伦在希特勒吞并捷克后放弃绥靖政策——宣布如果波兰受到攻击，英国和法国将向波兰提供安全保障（1939年3月31日）。1939年9月1日德国入侵波兰，第二次世界大战爆发。慕尼黑协定从此成为了"绥靖主义"（appeasement）的代名词——以牺牲弱国和小国的主权来满足侵略者的贪婪胃口不仅不道德而且自掘坟墓——侵略者不会因一次让步而满足，只会将让步解读为软弱并进一步升级其侵略要求。`,
significance:`慕尼黑协定是20世纪最臭名昭著的"绥靖政策"案例。它为英语世界政治文化贡献了"慕尼黑"这一专用隐喻——每当面对侵略者时，任何谈判让步都会被批评为"又一个慕尼黑"。"我们时代的和平"（张伯伦回国时的话）与6个月后希特勒吞并捷克斯洛伐克和一年后二战爆发之间的讽刺性对比，至今仍被引用为"自欺欺人的和平"的经典。慕尼黑对大国政治的教训——在没有任何实质保证（希特勒签字的那张"英德和平宣言"纸张甚至今天还保存在英国国家档案馆——只是废纸一张）的情况下单方面让步，不是和平而是灾难的邀请函。`,
related:['treaty-versailles','treaty-st-germain','nazi-rise','molotov-ribbentrop','wwii-dday'],tags:['慕尼黑','绥靖','张伯伦','希特勒','捷克斯洛伐克','苏台德']});

_o('molotov-ribbentrop',{name_zh:`苏德互不侵犯条约`,name_en:`Molotov-Ribbentrop Pact / Nazi-Soviet Non-Aggression Pact`,date:'1939-08-23',end_date:'1941-06-22',region:'europe',category:'treaty',treeBranch:`二战前奏`,summary:`1939年8月23日苏联外长莫洛托夫和德国外长里宾特洛甫在莫斯科签署的互不侵犯条约。苏德两国承诺在未来十年内相互不采取任何侵略行动。秘密附加议定书划分了苏德在东欧的势力范围——波兰被两国瓜分、波罗的海三国（爱沙尼亚、拉脱维亚）和芬兰以及比萨拉比亚划归苏联势力范围。条约扫除了希特勒入侵波兰的最后外交障碍——九天后（9月1日）二战爆发。`,detail:`1939年春夏，英法和苏联之间关于建立反德国同盟的谈判在莫斯科进行但进展缓慢且互不信任——苏联怀疑英法在"引德向东进攻苏联"（让苏德两国互相撕杀而西方观战），英法怀疑斯大林的真实意图。8月中旬，希特勒（急于在计划于8月26日入侵波兰之前消除苏联参战的可能性）向斯大林发出了急切的外交信号——愿意派外长里宾特洛甫亲自飞往莫斯科进行最高级别的谈判。8月23日里宾特洛甫飞抵莫斯科。当晚会谈在克里姆林宫斯大林办公室进行。苏方参加的有斯大林、莫洛托夫和外交部的官员。会谈在数小时内达成协议——《苏德互不侵犯条约》于8月24日凌晨签署。条约正文共计7条——双方承诺互不使用武力、如果一方成为第三方敌对行动的对象则另一方不得对该第三方给予支持、双方不参加直接或间接针对另一方的任何国家集团等。正文本身不违反国际法——是两个主权国家之间正常的外交安排。真正爆炸性的是《秘密附加议定书》——两个意识形态仇敌在桌子底下划分了东欧各大小国家的命运：波兰被纳雷夫河、维斯瓦河和桑河一线分割为两个"势力范围"（西部归德国，东部——包括西白俄罗斯和西乌克兰的大部分——归苏联）；在波罗的海国家（芬兰、爱沙尼亚、拉脱维亚和立陶宛）中，芬兰、爱沙尼亚和拉脱维亚被分配到苏联的势力范围，立陶宛被分配到德国的势力范围（在1939年9月28日的一份修改协议中，立陶宛的大部分被"交换"为苏联势力范围，以换取德国获得更多波兰领土）；比萨拉比亚（Bessarabia，当时属于罗马尼亚的大部分摩尔多瓦领土）被划归苏联的势力范围。"秘密议定书"是强权政治中最赤裸裸的——两个大国在没有当事国参与的情况下，在纸面上瓜分了至少六个已经存在的主权国家的领土。希特勒在确保了苏联的中立后，于9月1日下令国防军入侵波兰——第二次世界大战在欧洲爆发。9月17日苏联按照秘密议定书的"约定"从东部入侵了波兰，波兰被德苏两军分占。被瓜分的波兰军队的2.2万名军官于1940年4月至5月在斯摩棱斯克附近的卡廷森林（Katyn）及多地由苏联内务人民委员部（NKVD）以颈部手枪近距射击的方式被集体处决。1941年6月22日希特勒撕毁条约入侵苏联——"巴巴罗萨行动"开始。莫洛托夫-里宾特洛甫条约的秘密议定书副本在二战结束后被盟军在德国外交部档案中发现。1989年苏联承认秘密议定书的存在并宣布其"自签署之始即为非法"。`,
significance:`苏德互不侵犯条约（莫洛托夫-里宾特洛甫条约）是20世纪最冷酷的现实政治交易——两个互相憎恶的意识形态仇敌联手瓜分了六个主权国家。"秘密附加议定书"是强权政治丑恶的极端——赤裸裸的领土和人口掠夺以签署文件的桌面外交方式完成。条约签署后一周内二战爆发——两者之间的因果关系在历史法庭上无可辩驳。斯大林对希特勒动机的悲剧性误判——他真心以为与纳粹"合作"至少能赢得2-3年的备战时间——在1941年6月22日（巴巴罗萨行动）以灾难性的方式被粉碎。`,
related:['munich-agreement','katyn-massacre','barbarossa','yalta-conference'],tags:['苏德条约','莫洛托夫','里宾特洛甫','秘密议定书','波兰瓜分','二战']});

_o('pearl-harbor',{name_zh:`偷袭珍珠港`,name_en:`Attack on Pearl Harbor`,date:'1941-12-07',region:'asia-pacific',category:'war',treeBranch:`二战太平洋战场`,summary:`1941年12月7日（夏威夷时间当地时间清晨7:48），日本帝国海军航空兵对美国夏威夷珍珠港海军基地发动了突袭，击沉或重创了美国太平洋舰队的8艘战列舰和300余架飞机，造成约2400名美军死亡。次日美国对日宣战，正式加入第二次世界大战。"珍珠港"从此成为美国历史上"耻辱日"的代名词。`,detail:`1941年美日关系持续恶化——日本于1940年9月进驻法属印度支那（越南）北部、1941年7月进驻南部，美国对此的反应是（连同荷兰和英国）冻结日本在美资产并实施对日本包括石油在内的关键战略物资的全面禁运（日本约80%的石油来自美国进口）。日本军方——特别是以联合舰队司令长官山本五十六（Isoroku Yamamoto）大将为首——认为战争不可避免、越早打击美国太平洋舰队越好——否则美国庞大工业机器一旦完全转入战时轨道将使日本毫无取胜机会。袭击计划于1941年1月由山本五十六的作战参谋开始研究，到10月海军军令部最终批准。11月26日一支由6艘航空母舰（赤城Akagi、加贺Kaga、飞龙Hiryū、苍龙Sōryū、翔鹤Shōkaku、瑞鹤Zuikaku——搭载共约414架舰载机）为核心、由27艘舰艇组成的"机动部队"（Kidō Butai）从日本北方千岛群岛的单冠湾（Hitokappu Bay）秘密启航，以无线电静默横渡了约3500海里的北太平洋——在完全未被美国情报和巡逻发现的情况下，于12月7日拂晓到达了距瓦胡岛（Oahu）以北约230海里的攻击发起点。第一波攻击由183架飞机（鱼雷轰炸机、俯冲轰炸机和战斗机）在清晨6:00从航母起飞，7:48分开始对珍珠港的攻击。停在港口内的8艘美国战列舰（"战列舰大街"Battleship Row）排列整齐——是鱼雷轰炸机的理想目标。"亚利桑那"号（USS Arizona）被一颗穿甲炸弹击中前部弹药库，发生了巨大的爆炸，舰体折断，约1177名水兵随船沉没——至今仍躺在珍珠港海底。第二波攻击于8:54开始——由约170架飞机对机场、机库和剩余的舰艇进行轰炸和扫射。整个攻击持续约2小时。美国的损失——约2403人死亡（军人和平民——绝大多数是军人）、约1178人受伤；8艘战列舰中4艘沉没（其中"亚利桑那"号和"俄克拉荷马"号Oklahoma永久损失，其余被打捞和修复后在战争中重返战场）；还有3艘巡洋舰和3艘驱逐舰被击沉或严重损坏；约188架飞机在地面上被摧毁。日本的"未竟之功"——美国航空母舰（"企业"号Enterprise、"列克星敦"号Lexington和"萨拉托加"号Saratoga，此时均运载飞机正在海上或进行演习）全部不在港内，毫发无损——这些航母在6个月后的中途岛海战中给了日本致命一击。珍珠港的油库、船坞和潜艇基地等重要设施也未被轰炸——这些设施在太平洋战争初期为美国海军提供了急需的后勤支撑。12月7日当天下午，美国总统富兰克林·D·罗斯福在国会参众两院联席会议上发表了"耻辱日"（a date which will live in infamy）演说，国会以参议院82票对0票、众议院388票对1票通过了向日本宣战。12月11日德国和意大利对美国宣战——美国至此正式加入第二次世界大战。`,
significance:`珍珠港事件一夜之间结束了美国长达6年（1935年以来）的外交孤立主义和中立法案——在不到24小时内美国从一个隔岸观火的巨人在全国怒火中被一个瞬间拖入了世界大战。12月7日在美国人的集体记忆中成为了与'9/11\'并列的"国家创伤日"——"珍珠港"一词本身成为了"致命的突袭和战备疏忽"的同义词。日本在珍珠港取得的巨大战术胜利却激发了毁灭性的战略后果——他们唤醒了"沉睡的巨人"（山本五十六自己曾预言"我恐怕我们只是唤醒了一个沉睡的巨人，而且给了他可怕的决心"）。美国庞大的工业生产力（在战争期间制造了约30万架飞机、约1200艘军舰——包括约28艘航空母舰和约10艘战列舰、约8.8万辆坦克）在不到四年的战争中将日本帝国海军和本土城市完全碾碎——1945年8月在广岛和长崎投下的原子弹是珍珠港的终极回响。`,
related:['pacific-war','midway','hiroshima','cairo-declaration','japan-surrender'],tags:['珍珠港','日本','太平洋战争','罗斯福','耻辱日','山本五十六']});

_o('dday-normandy',{name_zh:`诺曼底登陆`,name_en:`D-Day / Normandy Landings (Operation Overlord)`,date:'1944-06-06',region:'europe',category:'war',treeBranch:`二战欧洲战场`,summary:`1944年6月6日（D-Day），由美国、英国和加拿大为主的盟军约15.6万人在法国诺曼底海岸实施了人类历史上规模最大的两栖登陆作战——"霸王行动"（Operation Overlord）的首日。登陆成功地在法国北部建立了桥头堡，开辟了欧洲第二战场，使德国陷入东西两线作战的困境。至8月底巴黎解放，诺曼底战役以盟军的决定性胜利告终。`,detail:`1943年德黑兰会议上，罗斯福和斯大林联合向丘吉尔施压，要求在1944年春季（而非丘吉尔仍然偏好的巴尔干"软腹部"战略）开辟西欧第二战场。"霸王行动"的总司令由美国将军德怀特·D·艾森豪威尔（Dwight D. Eisenhower）担任，地面部队司令是英国将军伯纳德·蒙哥马利（Bernard Montgomery）。登陆地点选择在诺曼底——而非离英国更近的加莱（Pas-de-Calais），正因如此德军将大部分装甲预备队部署在了加莱方向（"坚韧行动"Operation Fortitude——盟军以假坦克、假无线电通讯和虚构的"美国第一集团军群"FUSAG——由巴顿将军名义指挥——的庞大假象成功欺骗了德国最高统帅部，使希特勒和隆美尔始终认为诺曼底只是佯攻而主攻将在加莱。这一欺骗行动是人类历史上最大规模和最成功的军事欺骗之一）。D-Day（1944年6月6日）——登陆分五个海滩：犹他海滩（Utah，美军）、奥马哈海滩（Omaha，美军——是五个登陆滩头中德军抵抗最顽强和盟军伤亡最惨重的，当天约2000美军阵亡）、黄金海滩（Gold，英军）、朱诺海滩（Juno，加拿大军——加军在D-Day的登陆规模在所有盟军中比例最高）和宝剑海滩（Sword，英军）。空降兵——美军第82和第101空降师在犹他海滩后方、英军第6空降师在宝剑海滩后方进行了大规模夜间空降——伞兵们在黑暗和混乱中分散在诺曼底乡间的田野和沼泽中（许多单位"落单"混编成一团，但以即兴的方式完成了大部分任务），占领了关键桥梁（如佩加索斯桥Pegasus Bridge——由英军滑翔机着陆的步兵在数分钟内以惊人精度奇袭夺取的咽喉要道）、阻截了德军增援的路线。D-Day当天约15.6万盟军登上了法国海岸——约1万盟军士兵在这一天阵亡、受伤或失踪。在随后的几周内（至6月底）盟军将约87.5万人和近15万辆车辆运过英吉利海峡。诺曼底登陆后的后续战役——"树篱战斗"（Battle of the Hedgerows）：诺曼底乡间密集的树篱地形（bocage）对防守的德军极其有利，盟军每推进一公里都付出了血腥的代价——登陆后数周内盟军的进展远慢于计划。7月25日"眼镜蛇行动"（Operation Cobra）——美军从圣洛（Saint-Lô）的树篱中突破并在数日内冲出了诺曼底进入布列塔尼和法国中部。8月16-25日法莱斯口袋（Falaise Pocket）——德军B集团军约5万-10万人被围困并大部被歼灭（"法莱斯走廊"成为了数百辆燃烧和炸裂的坦克、卡车和——被盟军喷火战斗轰炸机沿着狭窄的撤退路线屠杀——累累人畜尸首的地狱景象）。诺曼底登陆战总计盟军约22.6万人阵亡、受伤或失踪（其中美军约12.4万人），德军损失约40万人（阵亡、受伤和被俘——约20万人被俘）。诺曼底在军事史上的地位不仅在于其前所未有之规模——这是人类迄今为止最大规模、最复杂的跨海两栖作战，更在于其战略后果——它为在西欧的战略上配合1944年6月22日开始的苏联红军在东线的"巴格拉季昂行动"（Operation Bagration，就在D-Day两周后——苏军在中路以约250万人和6000辆坦克的规模突破了德国中央集团军群），使德国在不到两周内被东西夹击而战线完全崩溃。`,
significance:`诺曼底登陆是人类历史上规模最大的两栖作战——"D-Day"（D日）至今仍是最能唤起对二战牺牲记忆的军事代号之一。诺曼底登陆的成功开辟了欧洲的第二战场——使纳粹德国在东西两线同时承受了毁灭性的兵力压力，这在不到11个月后德国的无条件投降中起到了决定性的军事作用。同时诺曼底的政治意义是——西欧（特别是法国）的解放是由西方盟军而非苏联红军完成的——这决定了战后西欧将留在美国的势力范围和民主阵营之内。`,
related:['tehran-conference','yalta-conference','stalingrad','potsdam-conference','marshall-plan'],tags:['诺曼底','D-Day','艾森豪威尔','第二战场','西欧解放','两栖作战']});

_o('keynesianism',{name_zh:`凯恩斯主义`,name_en:`Keynesianism / Keynesian Economics`,date:'1936-02-04',region:'global',category:'economic',treeBranch:`两次大战之间`,summary:`1936年英国经济学家约翰·梅纳德·凯恩斯出版《就业、利息和货币通论》（The General Theory of Employment, Interest and Money），系统提出以国家通过财政政策和货币政策干预经济——特别是通过扩大公共支出和降低利率来刺激"有效需求"——以实现充分就业的理论。凯恩斯主义彻底颠覆了自由放任的古典经济学教条，成为二战后至1970年代西方经济政策的理论基础。`,detail:`凯恩斯的经济理论诞生于大萧条这一"古典经济学无法解释的灾难"之中。在凯恩斯之前，支配西方经济学（特别是英美）的正统教条是"萨伊定律"（Say's Law——供给会自动创造自己的需求）、"财政预算必须平衡"和"失业是劳动力市场失灵（工资过高）和个人自愿选择的结果"。面对大萧条中英国的失业率超过20%和美国的约25%——而古典经济学提供的"治疗方案"是降低工资（使劳动力更便宜以鼓励企业雇用更多工人）和等待市场自行恢复——凯恩斯认为这是极其错误和灾难性的。在1936年出版的《就业、利息和货币通论》中，凯恩斯的革命性论点——经济衰退和失业不是由于劳动力市场的失灵（工资太高），而是由于"有效需求不足"（aggregate demand failure）——具体地说，是由于投资者信心崩溃导致私人投资锐减，而消费又因失业和收入下降而进一步萎缩——形成了一个自我强化的下降螺旋。在这种情况下，市场无法自行恢复——因为"在长期中我们都已经死了"（In the long run we are all dead）。因此，政府必须——也必须只能——通过扩大公共支出（"赤字开支"deficit spending）来"填补"私人投资和消费不足留下的需求缺口。凯恩斯甚至半开玩笑地说——"如果财政部把钞票塞进旧瓶子里，埋在废弃煤矿中，然后再把煤矿填满城市垃圾，让私人企业再把它们挖出来——这也会增加国民收入和就业。"（乘数效应Multiplier Effect——每1美元的政府支出可以通过经济中的连锁消费效应产生数倍于原始支出的国民收入增长）。凯恩斯主义的政策工具——财政政策（政府支出和税收）：在经济衰退时增加公共支出和减税（赤字财政）以扩大总需求；在经济繁荣时减少支出和增加税收（产生财政盈余）以"冷却"过热和预防通胀。货币政策（中央银行调节利率和货币供应量）：降低利率以鼓励投资和消费。二战后至1970年代的"凯恩斯共识"——美国1946年《就业法》使联邦政府承诺"使用一切实际手段……以促进最大就业、生产和购买力"；英国、北欧国家、法国和西欧各国广泛接受了以凯恩斯主义需求管理为基础的"混合经济"和"福利国家"。然而，1970年代的"滞胀"（stagflation——高通胀率和高失业率同时出现——凯恩斯主义认为两者不可能同时出现）对凯恩斯主义构成了严重的理论挑战并导致了货币主义（Friedman\'s Monetarism）和新古典经济学的复兴。但凯恩斯主义的核心理念——"在经济衰退时期，政府不能无所作为、等待市场的自行调节"——在2008年全球金融危机和2020年新冠疫情期间的大规模政府经济刺激中再次被大规模应用。`,
significance:`凯恩斯主义是20世纪最具影响力的经济学革命——它打破了自由放任的古典经济学教条，为大萧条后西方民主国家广泛接受"国家干预经济"和"福利国家"提供了理论合法性和政策工具。"凯恩斯共识"在二战后约30年的资本主义"黄金时代"（1945-1973年）高增长和低失业中发挥了核心作用。"在长期中我们都已经死了"这句话体现了凯恩斯对自由放任政策"等待市场自行调节"的猛烈批判。凯恩斯本人于1944年代表英国参加了布雷顿森林会议——他是IMF和世界银行构想的共同设计者——虽因美国不支持"超主权货币"方案而未能实现创设"班科"（Bancor）的愿景。`,
related:['great-depression','new-deal','bretton-woods','oil-crisis','reaganomics'],tags:['凯恩斯','经济学','有效需求','赤字财政','宏观经济学','福利国家']});

_o('reaganomics',{name_zh:`里根经济学`,name_en:`Reaganomics / Supply-Side Economics`,date:'1981-01-20',end_date:'1989-01-20',region:'americas',category:'economic',treeBranch:`美国内政`,summary:`1981年里根总统上台后推行的一整套以供给学派（supply-side economics）为核心的经济政策——大规模减税（特别是对高收入阶层和企业）、放松经济管制、紧缩货币以遏制通胀和削减社会福利开支。短期内通胀率从两位数降至4%以下但付出了国债暴涨（从约1万亿增至约3万亿美元）和贫富差距急剧扩大的代价。`,detail:`1981年里根上任时，美国经济面临着自大萧条以来最深重的危机——"滞胀"（通胀率约13.5%和失业率约7.5%同时存在）已困扰了美国近十年（自1973年石油危机以来）。里根的经济政策（被称为"里根经济学"）有四个核心支柱：第一，供给学派减税——1981年《经济复苏税法》（Economic Recovery Tax Act）在三年内将个人所得税率削减约25%（最高边际税率从70%降至50%——后来在1986年《税制改革法》Tax Reform Act中进一步降至28%），企业投资税率也大幅下调。供给学派的核心理论——以拉弗曲线闻名（"税率太高会抑制投资和劳动积极性→减税→投资增加→经济增长→税收总额增加"）——在实际操作中税收总额并未因减税而增加（"税收自我融资"被事实否定），但高收入群体的税负确实大幅降低了。第二，放松管制——里根政府撤销或大幅削弱了航空、电信、能源、金融和环保等领域的数百项联邦管制规定。第三，紧缩货币——美联储主席保罗·沃尔克（Paul Volcker，1979年由卡特任命、里根续任）以前所未有的高利率（联邦基金利率一度超过20%，1981年）"痛击"通胀——1982年通胀率从两位数降至约4%——代价是1981-1982年严重的经济衰退，失业率飙升至10.8%（1982年11月）——是自大萧条以来的最高水平。第四，削减社会福利开支——"向贫困宣战"的许多项目（如CETA就业培训计划等）被大幅削减，里根宣称"政府不是解决问题的方案——政府本身就是问题。"（Government is not the solution to our problem; government is the problem.）。结果——1983-1989年美国经济经历了连续七年的强劲增长，股市繁荣，通胀被遏制。但贫富差距急剧扩大——最富有1%的家庭的收入份额从1981年的约10%上升到1989年的约14%以上（此后继续上升），联邦债务从1981年的约1万亿美元暴涨至1989年的约3万亿美元（在很大程度上是由于减税+国防开支剧增——星球大战和军事建设——而财政支出未能相应削减）；"双赤字"（财政赤字+贸易逆差）成为1980年代美国经济的标志性特征；储蓄与贷款协会危机（Savings and Loan Crisis, 1986-1995年）的根源之一也是放松金融管制的政策后果。`,
significance:`里根经济学标志着凯恩斯主义在西方经济政策中主导地位的终结和"新自由主义"的兴起。里根的"政府本身就是问题"被广泛引用为保守主义和小政府主义的政治箴言。供给学派减税的影响在此后历届共和党政府中反复重现（小布什2001年和2003年的减税、特朗普2017年的减税）——"减税刺激增长"成为了共和党经济政策的基因。联邦债务的急剧增长（从GDP的约30%到约50%）带来的长期财政压力在里根卸任后持续困扰着美国政治。`,
related:['thatcherism','star-wars-sdi','oil-crisis','new-deal','keynesianism'],tags:['里根','减税','供给学派','放松管制','滞胀','赤字']});

_o('gorbachev-new-thinking',{name_zh:`新思维外交`,name_en:`Gorbachev\'s New Thinking / Novoye Myshleniye`,date:'1986-01-15',end_date:'1991-12-25',region:'soviet',category:'doctrine',treeBranch:`苏联合集`,summary:`1986年戈尔巴乔夫在苏共二十七大上正式提出的苏联外交政策新理论——"新政治思维"。核心主张——全人类的价值高于阶级价值、核战争不能以任何方式打赢也不能以任何方式被允许发生、安全是不可分割的（一国的安全不能以他国的不安全为代价）、各国都有选择自己发展道路的自由。新思维外交直接导致了苏联从东欧和阿富汗等地的全面战略收缩和冷战的和平结束。`,detail:`戈尔巴乔夫的"新思维"（Novoye Myshleniye）是在苏联内部深刻的经济停滞和与西方的技术差距急剧扩大（特别是在信息技术和微电子领域的根本性落后）的背景下产生的。戈尔巴乔夫认识到苏联已经无法承受与美国在军事-技术领域继续进行对等竞赛（星球大战SDI计划使这种不对称竞争达到了危机点），苏联外交必须从"以军事实力求安全"的旧范式转向"以政治对话和相互信任求安全"的新范式。1986年1月15日戈尔巴乔夫发表了后来被称为"1986年裁军倡议"的声明——提出在2000年之前分阶段全部消除核武器的惊人方案。1986年苏共二十七大正式确立了"新政治思维"为苏联外交政策的指导理论。核心信条——"全人类的价值高于阶级价值"：这是对列宁主义外交理论的根本性修正——列宁主义一直认为外交政策从属于阶级斗争和无产阶级国际主义。新思维主张各国——无论其社会制度如何——应该从"全球相互依存"和"人类共同生存"的视角来处理国际关系。核时代的安全是不可分割的——安全只能是"相互的"（mutual）和"普遍的"（universal），一国不能以牺牲他国的安全来追求自己的安全——"要么所有人一起生存，要么所有人一起毁灭。"（Either all of us survive, or no one does.）"选择的自由"（freedom of choice）：戈尔巴乔夫公开声明每个国家都有权自由选择自己的社会政治制度和发展道路——不得以"输出革命"或"输出反革命"为名进行干涉——这一原则直接否定了勃列日涅夫主义（"有限主权"论）。在实践中，新思维外交导致了——1987年12月美苏签署《中程核力量条约》（INF Treaty）：全部销毁射程在500-5500公里范围内的陆基中程核导弹（美国和苏联各自的SS-20、"潘兴-II"Pershing II和巡航导弹等），是美苏核军控史上第一次销毁整类核武器。1988年2月戈尔巴乔夫宣布苏联将从阿富汗撤军（1989年2月15日最后一名苏联士兵离开阿富汗）。1988年12月戈尔巴乔夫在联合国大会发表演说，宣布苏联将在两年内单方面裁减50万军队和从东欧撤出6个坦克师——这一"历史上最大规模的单方面裁军承诺"使东欧各国和西方的听众震惊得难以置信。1989年苏联没有干预东欧剧变——辛纳屈主义（Sinatra Doctrine）取代了勃列日涅夫主义。1990年两德统一——戈尔巴乔夫以惊人的速度接受了统一后的德国留在北约。1991年7月美苏签署《第一阶段削减战略武器条约》（START I），大幅削减洲际弹道导弹（ICBM）和潜射弹道导弹（SLBM）的数量——此次削减是真正的、深入的核裁军。`,
significance:`新思维外交在约五年内(1986-1991年)从根本上改变了国际关系——苏联从一个以军事威慑和意识形态对抗为核心的外交理念转向了以"相互安全"和"选择自由"为核心的新外交哲学。"新思维"直接导致了苏联在1989年放手允许东欧和平转轨（没有干涉东欧剧变）以及苏联自身在1991年以相对和平的方式解体。"全人类的价值高于阶级价值"对马克思-列宁主义思想的挑战是颠覆性的——它实际上是承认苏联70年来的意识形态战争（阶级斗争的国际战线）已经失败了，取而代之的是一种"人类共同命运"的话语。新思维外交的"未被回答的问题"是——当苏联接受"相互安全"这一逻辑而美国（里根和布什政府）的实际政策仍然是追求"以实力求和平"的优势时，这种单方面的"思维转变"导致了苏联在没有得到对等让步的情况下做出了大多数战略性让步——这在很大程度上影响了后冷战时代俄罗斯对自身"被羞辱"的深重叙事。`,
related:['gorbachev','brezhnev-doctrine','star-wars-sdi','eastern-europe-revolutions-1989','berlin-wall-fall'],tags:['新思维','戈尔巴乔夫','裁军','全人类价值','辛纳屈主义','冷战结束']});
